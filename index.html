async function loadAll() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/requests?select=id,data&order=updated_at.desc", { headers: SB_HEADERS });
    if (!res.ok) return [];
    const rows = await res.json();
    return rows.map(r => r.data).filter(Boolean);
  } catch { return []; }
}

async function saveAll(list) {
  try {
    // Upsert all current requests
    if (list.length > 0) {
      const rows = list.map(r => ({ id: r.id, data: r, updated_at: new Date().toISOString() }));
      await fetch(SUPABASE_URL + "/rest/v1/requests", {
        method: "POST",
        headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
        body: JSON.stringify(rows),
      });
    }
    // Find and delete rows no longer in the list
    const curRes = await fetch(SUPABASE_URL + "/rest/v1/requests?select=id", { headers: SB_HEADERS });
    if (curRes.ok) {
      const curRows = await curRes.json();
      const keepIds = new Set(list.map(r => r.id));
      const toDelete = curRows.filter(r => !keepIds.has(r.id));
      for (const r of toDelete) {
        await fetch(SUPABASE_URL + "/rest/v1/requests?id=eq." + encodeURIComponent(r.id), {
          method: "DELETE", headers: SB_HEADERS,
        });
      }
    }
    return true;
  } catch (e) { console.error("save failed", e); return false; }
}

async function authenticateUser(email, password) {
  const e = email.trim().toLowerCase();
  // Check Supabase users table first (includes password overrides)
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/users?email=eq." + encodeURIComponent(e) + "&select=*", { headers: SB_HEADERS });
    if (res.ok) {
      const rows = await res.json();
      if (rows.length > 0) {
        if (rows[0].password !== password) return "bad_password";
        return { role: rows[0].role, name: rows[0].name };
      }
    }
  } catch {}
  // Fall back to hardcoded ROLE_MAP
  const hardcoded = ROLE_MAP[e];
  if (hardcoded) {
    if (hardcoded.password !== password) return "bad_password";
    return { role: hardcoded.role, name: hardcoded.name };
  }
  return null;
}

const genId = () =>

const genProjectId = (customerName, existingIds = [], dateOverride = null) => {
  if (!customerName || !customerName.trim()) return genId();
  const prefix = customerName.trim().replace(/[^a-zA-Z]/g, "").slice(0, 3).toUpperCase();
  if (!prefix) return genId();
  const d = dateOverride ? new Date(dateOverride) : new Date();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yyyy = d.getFullYear();
  const base = `${prefix}${mm}${dd}${yyyy}`;
  // Check for duplicates
  const existing = existingIds.filter(id => id === base || id.match(new RegExp("^" + base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "(-\\d+)?$")));
  if (existing.length === 0) return base;
  return `${base}-${existing.length + 1}`;
};

const fmtMoney = (n) => {
  const v = parseFloat(n);

};

const fmtNum = (n) => {
  const v = parseFloat(n);
  if (isNaN(v)) return "—";
  return v.toLocaleString("en-US");
};

const fmtDate = (d) => {
  if (!d) return "—";
  try {
    // Anchor to noon to avoid UTC midnight timezone rollback
    const parsed = new Date(String(d).length === 10 ? d + "T12:00:00" : d);
    if (isNaN(parsed.getTime())) return "—";
    const yr = parsed.getFullYear();
    if (yr < 2000 || yr > 2100) return `⚠ Invalid date`;
    return parsed.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  } catch { return "—"; }
};

const fmtDateTime = (d) => {
  if (!d) return "—";
  try {
    return new Date(d).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  } catch { return "—"; }
};

const fmtDuration = (startISO) => {
  if (!startISO) return "—";
  const ms = Date.now() - new Date(startISO).getTime();
  if (ms < 0) return "—";
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + "m";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h " + (mins % 60) + "m";
  const days = Math.floor(hrs / 24);
  return days + "d " + (hrs % 24) + "h";
};

const footprintSqft = (l, w) => {
  const a = parseFloat(l) || 0, b = parseFloat(w) || 0;
  if (!a || !b) return null;
  return (a * b) / 144;
};

const totalFootprint = (items) => {
  return (items || []).reduce((acc, it) => {
    const perUnit = footprintSqft(it.dimL, it.dimW);
    const qty = parseFloat(it.quantity) || 0;
    if (perUnit === null || !qty) return acc;
    return acc + perUnit * qty;
  }, 0);
};

// Flatten a nested object to dot-notation paths
function flattenObj(obj, prefix = "", out = {}) {
  if (obj === null || obj === undefined) return out;
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? `${prefix}.${k}` : k;
    if (Array.isArray(v)) {
      out[key] = JSON.stringify(v); // arrays compared as JSON string
    } else if (v && typeof v === "object") {
      flattenObj(v, key, out);
    } else {
      out[key] = v === null || v === undefined ? "" : String(v);
    }
  }
  return out;
}

// Compare two request snapshots and return array of { field, label, from, to }
function diffRequests(prev, next) {
  if (!prev) return []; // first save — no diff
  const SKIP = new Set([
    "updatedAt","createdAt","touchLog","changeLog","sharedNotes","sharedAttachments",
    "csr.submittedAt","procurement.submittedAt","finance.decidedAt",
    "csr.locationLat","csr.locationLng","procurement.facilityLat","procurement.facilityLng",
    "csrRevision.requestedAt",
  ]);

  const prevFlat = flattenObj({ csr: prev.csr, procurement: prev.procurement, finance: prev.finance });
  const nextFlat = flattenObj({ csr: next.csr, procurement: next.procurement, finance: next.finance });

  const changes = [];
  const allKeys = new Set([...Object.keys(prevFlat), ...Object.keys(nextFlat)]);
  for (const key of allKeys) {
    if (SKIP.has(key)) continue;
    // Skip internal lat/lng/international keys
    if (key.includes("Lat") || key.includes("Lng") || key.endsWith("International")) continue;
    // Skip item arrays (too granular for now — logged as "Items updated")
    if (key.includes(".items")) continue;
    if (key.includes("handlingCosts")) continue;
    if (key.includes("attachments")) continue;

    const from = prevFlat[key] ?? "";
    const to   = nextFlat[key] ?? "";
    if (from !== to) {
      const label = FIELD_LABELS[key] || key.split(".").pop().replace(/([A-Z])/g, " $1").trim();
      changes.push({ field: key, label, from: from || "(blank)", to: to || "(blank)" });
    }
  }

  // Check if items array changed (just flag it, don't enumerate every sub-field)
  const prevItems = JSON.stringify(prev.csr?.items || []);
  const nextItems = JSON.stringify(next.csr?.items || []);
  if (prevItems !== nextItems) {
    changes.push({ field: "csr.items", label: "Item Breakdown", from: "(see form)", to: "(updated)" });
  }
  const prevHandling = JSON.stringify(prev.procurement?.handlingCosts || []);
  const nextHandling = JSON.stringify(next.procurement?.handlingCosts || []);
  if (prevHandling !== nextHandling) {
    changes.push({ field: "procurement.handlingCosts", label: "Handling Costs", from: "(see form)", to: "(updated)" });
  }

  return changes;
}

// ============================================================
// TOOLTIP — hover to reveal context, math, or explanations
// ============================================================
// Positions tip above the anchor, with a small arrow. Accepts simple string
// or rich JSX as the `content`. Underlines the child on hover to signal interactivity.
function Tooltip({ content, children, placement = "top", dotted = true, style }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({ left: 0, top: 0 });
  const anchorRef = useRef(null);

  useEffect(() => {
    if (!open || !anchorRef.current) return;
    const rect = anchorRef.current.getBoundingClientRect();
    const top = placement === "bottom" ? rect.bottom + 8 : rect.top - 8;
    setPos({ left: rect.left + rect.width / 2, top });
  }, [open, placement]);

  if (!content) return <span style={style}>{children}</span>;

  return (
    <Fragment>
      <span
        ref={anchorRef}
        onMouseEnter={() => setOpen(true)}
        onMouseLeave={() => setOpen(false)}
        onFocus={() => setOpen(true)}
        onBlur={() => setOpen(false)}
        tabIndex={0}
        style={{
          borderBottom: dotted ? "1px dotted var(--text-faint)" : undefined,
          cursor: "help",
          outline: "none",
          ...style,
        }}
      >
        {children}
      </span>
      {open && (
        <div
          style={{
            position: "fixed",
            left: pos.left,
            top: pos.top,
            transform: placement === "bottom" ? "translate(-50%, 0)" : "translate(-50%, -100%)",
            background: "#0C0A07",
            border: "1px solid var(--accent-dim)",
            borderRadius: 4,
            padding: "10px 13px",
            fontSize: 12,
            color: "var(--text)",
            lineHeight: 1.55,
            maxWidth: 340,
            minWidth: 160,
            zIndex: 10000,
            boxShadow: "0 6px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(232,184,78,0.06)",
            pointerEvents: "none",
            fontFamily: "Geist, system-ui, sans-serif",
            fontWeight: 400,
            letterSpacing: 0,
            textTransform: "none",
            whiteSpace: "normal",
          }}
        >
          {content}
          <div style={{
            position: "absolute",
            left: "50%", transform: "translateX(-50%)",
            [placement === "bottom" ? "top" : "bottom"]: -5,
            width: 8, height: 8,
            background: "#0C0A07",
            borderRight: "1px solid var(--accent-dim)",
            borderBottom: placement === "bottom" ? "none" : "1px solid var(--accent-dim)",
            borderTop: placement === "bottom" ? "1px solid var(--accent-dim)" : "none",
            borderLeft: placement === "bottom" ? "1px solid var(--accent-dim)" : "none",
            rotate: placement === "bottom" ? "225deg" : "45deg",
          }} />
        </div>
      )}
    </Fragment>
  );
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleLogin = async () => {
    const e = email.trim().toLowerCase();
    if (!e || !e.includes("@")) {
      setError("Enter a valid email address.");
      return;
    }
    if (!password) {
      setError("Enter your password.");
      return;
    }
    const result = await authenticateUser(e, password);
    if (result === "bad_password") {
      setError("Incorrect password.");
      return;
    }
    if (!result) {
      setError("Access denied — this email isn't authorized. Contact your admin to be added.");
      return;
    }
    const auth = { email: e, role: result.role, name: result.name };
    try { localStorage.setItem(AUTH_KEY, JSON.stringify(auth)); } catch {}
    onLogin(auth);
  };

  return (
    <div className="app-root">
      <StyleBlock />
      <div className="content-layer" style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        minHeight: "100vh", padding: 28,
      }}>
        <div style={{ width: "100%", maxWidth: 400 }}>
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div style={{
              width: 48, height: 48, borderRadius: 5,
              background: "var(--accent)",
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              color: "#1a1407", marginBottom: 14,
            }}>
              <Warehouse size={24} strokeWidth={2.5} />
            </div>
            <div className="font-display" style={{ fontSize: 28, letterSpacing: "0.05em" }}>
              SOLVR<span className="font-italic-serif" style={{ color: "var(--accent)" }}>.</span>
            </div>
            <div className="eyebrow" style={{ marginTop: 6 }}>Warehouse Quote Pipeline</div>
          </div>

          <div className="panel" style={{ padding: 28 }}>
            <div style={{ fontSize: 15, color: "var(--text)", fontWeight: 500, marginBottom: 4 }}>
              Sign in
            </div>
            <div style={{ fontSize: 13, color: "var(--text-dim)", marginBottom: 20 }}>
              Enter your email to access your workflow area.
            </div>

            <div className="field-label">Email</div>
            <input
              type="email"
              className="input"
              value={email}
              onChange={e => { setEmail(e.target.value); setError(""); }}
              onKeyDown={e => { if (e.key === "Enter") document.getElementById("solvr-pw")?.focus(); }}
              placeholder="you@company.com"
              autoFocus
            />

            <div className="field-label" style={{ marginTop: 12 }}>Password</div>
            <input
              id="solvr-pw"
              type="password"
              className="input"
              value={password}
              onChange={e => { setPassword(e.target.value); setError(""); }}
              onKeyDown={e => { if (e.key === "Enter") handleLogin(); }}
              placeholder="••••••••"
            />

            {error && (
              <div style={{
                marginTop: 10, padding: "10px 12px",
                fontSize: 12.5, color: "var(--warning)",
                border: "1px solid var(--warning-dim)",
                borderRadius: 3,
                background: "rgba(232,155,111,0.06)",
              }}>
                {error}
              </div>
            )}

            <button
              className="btn btn-primary"
              style={{ width: "100%", justifyContent: "center", marginTop: 16, padding: "12px" }}
              onClick={handleLogin}
            >
              Continue
            </button>
          </div>

          <div style={{ textAlign: "center", marginTop: 16, fontSize: 11.5, color: "var(--text-faint)" }}>
            Don't have access? Contact your admin to be added.
          </div>
        </div>
      </div>
    </div>
  );
}

  const [newName, setNewName] = useState("");

  const [newRole, setNewRole] = useState("csr");
  const [error, setError] = useState("");

  const refresh = async () => {
    const list = await loadManagedUsers();
    // Never allow primary admin to appear in editable managed users list
    setUsers(list.filter(u => u.email !== PRIMARY_ADMIN_EMAIL));
    setLoadingUsers(false);
  };

  useEffect(() => { refresh(); }, []);

  const handleAdd = async () => {
    const e = newEmail.trim().toLowerCase();
    if (!e || !e.includes("@")) { setError("Enter a valid email address."); return; }
    if (!newName.trim()) { setError("Enter a display name for this user."); return; }
    if (!newPassword.trim()) { setError("Set a password for this user."); return; }
    if (users.some(u => u.email === e)) { setError("This email is already in the list. Remove it first to change details."); return; }
    await saveManagedUser({ email: e, role: newRole, name: newName.trim(), password: newPassword });
    setNewEmail(""); setNewName(""); setNewPassword(""); setNewRole("csr"); setError("");
    refresh();
  };

  const handleRemove = async (email) => {
    await deleteManagedUser(email);
    refresh();
  };

  const handleChangeRole = async (email, role) => {
    const u = users.find(x => x.email === email);
    if (u) { await saveManagedUser({ ...u, role }); refresh(); }
  };

  const handleChangePassword = async (email, newPw) => {
    const u = users.find(x => x.email === email);
    if (u) { await saveManagedUser({ ...u, password: newPw }); refresh(); }

                  onChange={async (e) => {

                    await saveManagedUser({ email: u.email, name: u.name, role: e.target.value, password: hardcodedInfo?.password || "solvr2024" });
                    refresh();
                  }}
                  style={{ fontSize: 12, padding: "4px 8px" }}
                >
                  <option value="csr">CSR / Ops</option>
                  <option value="procurement">Procurement</option>
                  <option value="finance">Finance</option>
                  <option value="admin">Admin</option>
                </select>
              ) : (
                <span style={{
                  fontSize: 10.5, letterSpacing: "0.12em", textTransform: "uppercase",
                  padding: "3px 8px", borderRadius: 2,
                  border: "1px solid var(--accent)", color: "var(--accent)",
                }}>Admin</span>
              )}
            </div>
            {canEdit ? (
              <button className="btn btn-ghost btn-xs"
                onClick={async () => {
                  const pw = prompt("New password for " + u.name + ":");
                  if (pw && pw.trim()) {
                    const hardcodedInfo = ROLE_MAP[u.email];
                    await saveManagedUser({ email: u.email, name: u.name, role: u.role, password: pw.trim() });
                    refresh();
                  }
                }}
                title="Reset password" style={{ color: "var(--cool)" }}>
                <Hash size={13} />
              </button>
            ) : <div style={{ width: 32 }} />}
          </div>
          );
        })}

        {/* Managed users */}
        {users.map(u => (
          <div key={u.email} style={{
            display: "grid", gridTemplateColumns: "2fr 1fr auto",
            alignItems: "center", gap: 14,
            padding: "12px 20px",
            borderBottom: "1px solid var(--border)",
          }}>
            <div>
              <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{u.name}</div>
              <div style={{ fontSize: 11.5, color: "var(--text-dim)" }}>{u.email}</div>
            </div>
            <div>
              <select
                className="select"
                value={u.role}
                onChange={e => handleChangeRole(u.email, e.target.value)}
                style={{ fontSize: 12, padding: "4px 8px" }}
              >
                <option value="csr">CSR / Ops</option>
                <option value="procurement">Procurement</option>
                <option value="finance">Finance</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <button
              className="btn btn-ghost btn-xs"
              onClick={() => {
                const pw = prompt("New password for " + u.name + ":");
                if (pw && pw.trim()) handleChangePassword(u.email, pw.trim());
              }}
              title="Reset password"
              style={{ color: "var(--cool)" }}
            >
              <Hash size={13} />
            </button>
            <button
              className="btn btn-ghost btn-xs"
              onClick={() => handleRemove(u.email)}
              title="Remove user"
              style={{ color: "var(--warning)" }}
            >
              <Trash2 size={13} />
            </button>
          </div>
        ))}

        {users.length === 0 && hardcoded.length === 0 && (
          <div style={{ padding: 28, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>
            No users configured yet. Add someone above.
          </div>
        )}
        {users.length === 0 && hardcoded.length > 0 && (
          <div style={{ padding: 20, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>
            No additional users added yet. Use the form above to invite team members.
          </div>
        )}
      </div>

      <div style={{ marginTop: 16, fontSize: 12, color: "var(--text-faint)", lineHeight: 1.6 }}>
        Changes take effect on next login. If someone is already logged in, they'll keep their current session until they sign out.
        User list is stored in this browser's local storage — it won't sync across devices until you move to a hosted backend.
      </div>
    </div>
  );
}

// ============================================================
// DEFAULT ASSUMPTIONS ADMIN PAGE
// ============================================================
function DefaultAssumptionsAdmin({ onBack }) {
  const [assumptions, setAssumptions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newText, setNewText] = useState("");
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    loadDefaultAssumptions().then(a => {
      // Seed with the standard assumption if empty
      if (a.length === 0) {
        const seeded = [{ id: genRowId(), text: "No half-month storage on first or last month; all recurring storage charges calculated on the first of each month.", active: true }];
        setAssumptions(seeded);
        saveDefaultAssumptions(seeded);
      } else {
        setAssumptions(a);
      }
      setLoading(false);
    });
  }, []);

  const save = async (updated) => {
    setSaving(true);
    await saveDefaultAssumptions(updated);
    setSaving(false);
  };

  const handleAdd = async () => {
    if (!newText.trim()) return;
    const updated = [...assumptions, { id: genRowId(), text: newText.trim(), active: true }];
    setAssumptions(updated);
    setNewText("");
    await save(updated);
  };

  const handleToggle = async (id) => {
    const updated = assumptions.map(a => a.id === id ? { ...a, active: !a.active } : a);
    setAssumptions(updated);
    await save(updated);
  };

  const handleDelete = async (id) => {
    const updated = assumptions.filter(a => a.id !== id);
    setAssumptions(updated);
    await save(updated);
  };

  const handleEdit = async (id, text) => {
    const updated = assumptions.map(a => a.id === id ? { ...a, text } : a);
    setAssumptions(updated);
    await save(updated);
  };

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 800, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13}/> Back to Dashboard
      </button>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <FileText size={18} style={{ color: "var(--accent)" }}/>
        <h1 className="font-display" style={{ fontSize: 28, margin: 0, fontWeight: 400 }}>Default Assumptions</h1>
      </div>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: "0 0 24px" }}>
        Active assumptions auto-populate the Disclaimers & Assumptions field on every new Procurement form. Toggle off to disable without deleting.
      </p>

      {loading ? (
        <div style={{ padding: 40, textAlign: "center", color: "var(--text-dim)" }}><Loader2 className="spin" size={18}/></div>
      ) : (
        <div className="panel" style={{ padding: 0, overflow: "hidden" }}>
          {assumptions.length === 0 && (
            <div style={{ padding: 28, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>No assumptions yet. Add one below.</div>
          )}
          {assumptions.map((a, i) => (
            <div key={a.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "14px 20px", borderBottom: i < assumptions.length-1 ? "1px solid var(--border)" : "none" }}>
              {/* Toggle */}
              <div style={{ paddingTop: 3 }}>
                <label style={{ display: "flex", alignItems: "center", cursor: "pointer" }}>
                  <input type="checkbox" checked={a.active} onChange={() => handleToggle(a.id)} style={{ accentColor: "var(--accent)", width: 16, height: 16 }}/>
                </label>
              </div>
              {/* Text */}
              <textarea className="textarea" value={a.text}
                onChange={e => handleEdit(a.id, e.target.value)}
                style={{ flex: 1, minHeight: 60, fontSize: 13, opacity: a.active ? 1 : 0.4, resize: "vertical" }}/>
              <button className="btn btn-ghost btn-xs" onClick={() => handleDelete(a.id)} style={{ color: "var(--warning)", paddingTop: 4 }}>
                <Trash2 size={13}/>
              </button>
            </div>
          ))}
          {/* Add new */}
          <div style={{ padding: "14px 20px", borderTop: "1px solid var(--border-hi)", background: "var(--panel-hi)" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <textarea className="textarea" value={newText} onChange={e => setNewText(e.target.value)}
                placeholder="Add a new default assumption..."
                style={{ flex: 1, minHeight: 56, fontSize: 13, resize: "vertical" }}
                onKeyDown={e => { if (e.key === "Enter" && (e.metaKey||e.ctrlKey)) handleAdd(); }}/>
              <button className="btn btn-primary" onClick={handleAdd} style={{ whiteSpace: "nowrap" }}>
                <Plus size={13}/> Add
              </button>
            </div>
            <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 6 }}>⌘/Ctrl+Enter to add</div>
          </div>
        </div>
      )}
      {saving && <div style={{ marginTop: 10, fontSize: 12, color: "var(--text-faint)" }}>Saving…</div>}
    </div>
  );
}

function Dashboard({ role, requests, onOpen, onNew, searchQuery, setSearchQuery, searchResults, onSearch, initialTab }) {
  const [tab, setTab] = useState(initialTab || "actionable");

  // Jump to initialTab if it changes (e.g. Admin clicks Archive in menu)
  useEffect(() => { if (initialTab) setTab(initialTab); }, [initialTab]);

  const groups = useMemo(() => {
    const byRole = {
      csr: {
        actionable: requests.filter(r => ["draft_csr", "revision_csr"].includes(r.status)),
        inflight:   requests.filter(r => ["awaiting_procurement","draft_procurement","awaiting_finance","follow_up"].includes(r.status)),
        closed:     requests.filter(r => r.status === "approved"),
        archived:   requests.filter(r => r.status === "archived"),
      },
      procurement: {
        actionable: requests.filter(r => ["awaiting_procurement","draft_procurement","follow_up"].includes(r.status)),
        inflight:   requests.filter(r => ["awaiting_finance","revision_csr","draft_csr"].includes(r.status)),
        closed:     requests.filter(r => r.status === "approved"),
        archived:   requests.filter(r => r.status === "archived"),
      },
      finance: {
        actionable: requests.filter(r => r.status === "awaiting_finance"),
        inflight:   requests.filter(r => ["awaiting_procurement","draft_procurement","follow_up","revision_csr","draft_csr"].includes(r.status)),
        closed:     requests.filter(r => r.status === "approved"),
        archived:   requests.filter(r => r.status === "archived"),
      },
    };
    return byRole[role];
  }, [role, requests]);

  const tabs = {
    csr:         { actionable: "My Queue", inflight: "In Flight", closed: "Approved" },
    procurement: { actionable: "My Queue", inflight: "In Flight", closed: "Approved" },
    finance:     { actionable: "My Queue", inflight: "In Flight", closed: "Approved" },
  }[role];

  const active = groups[tab] || [];

  const roleHeadline = {
    csr: { line: "Capture the ask", sub: "Submit customer warehouse requests to Procurement." },
    procurement: { line: "Quote the space", sub: "Pick up incoming requests and submit facility offers." },
    finance: { line: "Align & approve", sub: "Review aligned requests and offers, decide on pricing." },
  }[role];

  return (
    <div className="fade-in" style={{ padding: "32px 28px" }}>
      {/* Headline */}
      <div style={{ marginBottom: 28, display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 20, flexWrap: "wrap" }}>
        <div>
          <div style={{ marginBottom: 8 }}>
            <StageMarker num={role === "csr" ? 1 : role === "procurement" ? 2 : 3} label={`${ROLES.find(r => r.id === role)?.label} View`} />
          </div>
          <h1 className="font-display" style={{ fontSize: 42, margin: 0, lineHeight: 1.05, fontWeight: 400 }}>
            {roleHeadline.line}
            <span className="font-italic-serif" style={{ color: "var(--accent)" }}>.</span>
          </h1>
          <p style={{ color: "var(--text-mid)", fontSize: 14, marginTop: 8, maxWidth: 560 }}>
            {roleHeadline.sub}
          </p>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end", minWidth: 300 }}>
          <div style={{ position: "relative", width: "100%" }}>
            <input
              type="text"
              className="input"
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && searchQuery.trim()) onSearch(searchQuery.trim()); }}
              placeholder="Search by customer, project ID, city, state…"
              style={{ paddingLeft: 34, fontSize: 13, height: 38, width: "100%" }}
            />
            <div style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--text-dim)", pointerEvents: "none" }}>
              <Hash size={14} />
            </div>
            {searchQuery.trim().length >= 2 && searchResults && searchResults.length > 0 && (
              <div style={{
                position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4,
                background: "var(--panel)", border: "1px solid var(--border-hi)",
                borderRadius: 4, maxHeight: 300, overflowY: "auto", zIndex: 50,
                boxShadow: "0 12px 32px rgba(0,0,0,0.5)",
              }}>
                {searchResults.slice(0, 8).map(r => (
                  <div
                    key={r.id}
                    onClick={() => { setSearchQuery(""); onSearch(null, r.id); }}
                    style={{
                      padding: "10px 14px", cursor: "pointer",
                      borderBottom: "1px solid var(--border)",
                      transition: "background 100ms",
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = "var(--panel-hi)"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span className="font-mono" style={{ fontSize: 11.5, color: "var(--accent)" }}>{r.id}</span>
                      <StatusBadge status={r.status} />
                    </div>
                    <div style={{ fontSize: 12.5, color: "var(--text)", fontWeight: 500, marginTop: 3 }}>
                      {r.csr.customerName || "Unnamed"}
                    </div>
                    <div style={{ fontSize: 11, color: "var(--text-dim)", marginTop: 2 }}>
                      {r.csr.locationCity}{r.csr.locationState ? ", " + r.csr.locationState : ""}
                    </div>
                  </div>
                ))}
                {searchResults.length > 8 && (
                  <div
                    onClick={() => onSearch(searchQuery.trim())}
                    style={{ padding: "10px 14px", textAlign: "center", fontSize: 12, color: "var(--accent)", cursor: "pointer" }}
                  >
                    View all {searchResults.length} results →
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Metrics */}
      {/* Clickable metric cards — these ARE the tabs */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(4, 1fr)",
        gap: 12,
        marginBottom: 24,
      }}>
        {[
          { id: "actionable", label: "My Queue",     value: groups.actionable.length, icon: Inbox,        tone: groups.actionable.length > 0 ? "accent" : "neutral" },
          { id: "inflight",   label: "In Flight",    value: groups.inflight.length,   icon: Clock,        tone: "neutral" },
          { id: "closed",     label: "Approved",     value: groups.closed.length,     icon: CheckCircle2, tone: groups.closed.length > 0 ? "success" : "neutral" },
          { id: null,         label: "Total Open",   value: requests.filter(r => !["approved","archived"].includes(r.status)).length, icon: Files, tone: "neutral" },
        ].map((card, i) => {
          const isActive = card.id && tab === card.id;
          const isClickable = !!card.id;
          const color = isActive
            ? (card.tone === "accent" ? "var(--accent)" : card.tone === "success" ? "var(--success)" : "var(--text)")
            : card.tone === "accent" ? "var(--accent)" : card.tone === "success" ? "var(--success)" : "var(--text-mid)";
          return (
            <div key={i}
              onClick={isClickable ? () => setTab(card.id) : undefined}
              style={{
                padding: "16px 18px",
                background: isActive ? "var(--panel-hi)" : "var(--panel)",
                border: `1px solid ${isActive ? "var(--accent-dim)" : "var(--border)"}`,
                borderRadius: 4,
                cursor: isClickable ? "pointer" : "default",
                transition: "border-color 140ms, background 140ms",
                position: "relative",
              }}
              onMouseEnter={e => { if (isClickable && !isActive) e.currentTarget.style.borderColor = "var(--border-hi)"; }}
              onMouseLeave={e => { if (isClickable && !isActive) e.currentTarget.style.borderColor = "var(--border)"; }}
            >
              {isActive && (
                <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 2, background: "var(--accent)", borderRadius: "0 0 4px 4px" }}/>
              )}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>

            <div className="data-cell-head">Preferred Location</div>

              <div className="data-cell" style={{ color: "var(--text)" }}>
                {r.csr.customerName || <span style={{ color: "var(--text-faint)", fontStyle: "italic" }}>Unnamed</span>}

              <div className="data-cell" style={{ color: "var(--text-mid)" }}>
                {r.csr.locationCity ? `${r.csr.locationCity}${r.csr.locationState ? ", " + r.csr.locationState : ""}` : "—"}
              </div>
              <div className="data-cell font-mono" style={{ fontSize: 12.5, color: "var(--text-mid)" }}>
                {fmtDate(r.csr.storageStartDate)} → {fmtDate(r.csr.storageEndDate)}
              </div>
              <div className="data-cell"><StatusBadge status={r.status} /></div>
              <div className="data-cell" style={{ justifyContent: "flex-end", textAlign: "right" }}>
                <div className="font-mono" style={{ fontSize: 12, color: "var(--text-mid)" }}>{fmtDuration(r.createdAt)}</div>
                <div className="font-mono" style={{ fontSize: 10.5, color: "var(--text-faint)" }}>stage {fmtDuration(r.updatedAt)}</div>
                <div className="font-mono" style={{ fontSize: 10, color: "var(--text-faint)", marginTop: 2 }}>updated {fmtDuration(r.updatedAt)} ago</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function haversineMiles(lat1, lng1, lat2, lng2) {
  if (lat1==null||lng1==null||lat2==null||lng2==null) return null;
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// CityAutocomplete — Census Bureau geocoder, with international override
function CityAutocomplete({ city, state, lat, lng, international, disabled, onChange }) {
  const [query, setQuery] = useState(city || "");
  const [suggestions, setSuggestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(false);
  const [intl, setIntl] = useState(international || false);
  const debounceRef = useRef(null);
  const wrapRef = useRef(null);

  // Sync if parent resets
  useEffect(() => { setQuery(city || ""); setIntl(international || false); }, [city, international]);

  // Close on outside click
  useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const search = async (val) => {
    if (val.length < 3) { setSuggestions([]); setOpen(false); return; }
    setLoading(true);
    try {
      const url = `https://geocoding.geo.census.gov/geocoder/locations/address?street=&city=${encodeURIComponent(val)}&state=&benchmark=Public_AR_Current&format=json`;
      // Census doesn't do city-only well — use their city search via nominatim instead
      const nomUrl = `https://nominatim.openstreetmap.org/search?city=${encodeURIComponent(val)}&countrycodes=us&format=json&addressdetails=1&limit=7`;
      const res = await fetch(nomUrl, { headers: { "Accept-Language": "en" } });
      const data = await res.json();
      const results = data
        .filter(r => r.address?.city || r.address?.town || r.address?.village || r.address?.county)
        .map(r => {
          const cityName = r.address.city || r.address.town || r.address.village || r.address.county;
          const stateAbbr = r.address?.["ISO3166-2-lvl4"]?.split("-")[1] || r.address?.state_code || "";
          return { city: cityName, state: stateAbbr, display: `${cityName}, ${stateAbbr || r.address?.state || ""}`, lat: parseFloat(r.lat), lng: parseFloat(r.lon) };
        })
        .filter((r,i,arr) => r.city && arr.findIndex(x => x.display===r.display)===i);
      setSuggestions(results);
      setOpen(results.length > 0);
    } catch { setSuggestions([]); }
    setLoading(false);
  };

  const handleInput = (val) => {
    setQuery(val);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => search(val), 320);
    // Allow freeform if they're typing without picking
    onChange({ city: val, state: state || "", lat: null, lng: null, international: intl });
  };

  const handleSelect = (s) => {
    setQuery(s.display);
    setOpen(false);
    onChange({ city: s.city, state: s.state, lat: s.lat, lng: s.lng, international: false });
  };

  const handleIntlToggle = (checked) => {
    setIntl(checked);
    onChange({ city: query, state: "", lat: null, lng: null, international: checked });
    setSuggestions([]); setOpen(false);
  };

  if (intl) {
    return (
      <div>
        <div style={{ display:"flex", gap:8 }}>
          <input className="input" value={query} disabled={disabled}
            onChange={e => { setQuery(e.target.value); onChange({ city: e.target.value, state:"", lat:null, lng:null, international:true }); }}
            placeholder="City, Country" style={{ flex:1 }} />
        </div>
        {!disabled && (
          <div style={{ marginTop:5, display:"flex", alignItems:"center", gap:6 }}>
            <input type="checkbox" checked={intl} onChange={e=>handleIntlToggle(e.target.checked)} style={{ accentColor:"var(--accent)", cursor:"pointer" }}/>
            <label style={{ fontSize:11, color:"var(--accent)", cursor:"pointer" }} onClick={()=>handleIntlToggle(!intl)}>International location (Canada / Mexico / other)</label>
          </div>
        )}
      </div>
    );
  }

  return (
    <div ref={wrapRef} style={{ position:"relative" }}>
      <div style={{ display:"flex", gap:8 }}>
        <div style={{ flex:1, position:"relative" }}>
          <input className="input" value={query} disabled={disabled}
            onChange={e => handleInput(e.target.value)}
            onFocus={() => suggestions.length > 0 && setOpen(true)}
            placeholder="Start typing a city…"
            autoComplete="off"
          />
          {loading && (
            <div style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)" }}>
              <Loader2 size={12} className="spin" style={{ color:"var(--text-faint)" }}/>
            </div>
          )}
          {open && suggestions.length > 0 && (
            <div style={{
              position:"absolute", top:"calc(100% + 4px)", left:0, right:0, zIndex:50,
              background:"#1a1710", border:"1px solid var(--border-hi)", borderRadius:4,
              boxShadow:"0 8px 24px rgba(0,0,0,0.5)", overflow:"hidden",
            }}>
              {suggestions.map((s,i) => (
                <div key={i} onMouseDown={() => handleSelect(s)}
                  style={{
                    padding:"9px 12px", fontSize:13, cursor:"pointer", color:"var(--text)",
                    borderBottom: i < suggestions.length-1 ? "1px solid var(--border)" : "none",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(232,184,78,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{ fontWeight:500 }}>{s.city}</span>
                  {s.state && <span style={{ color:"var(--accent)", marginLeft:6, fontSize:12 }}>{s.state}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
        {/* State badge — auto-filled from selection, read-only display */}
        {state && !intl && (
          <div style={{
            padding:"0 12px", display:"flex", alignItems:"center",
            background:"var(--bg-2)", border:"1px solid var(--border)", borderRadius:3,
            fontSize:13, fontWeight:600, color:"var(--accent)", minWidth:48, justifyContent:"center",
          }}>{state}</div>
        )}
      </div>
      {!disabled && (
        <div style={{ marginTop:5, display:"flex", alignItems:"center", gap:6 }}>
          <input type="checkbox" checked={intl} onChange={e=>handleIntlToggle(e.target.checked)} style={{ accentColor:"var(--accent)", cursor:"pointer" }}/>
          <label style={{ fontSize:11, color:"var(--text-dim)", cursor:"pointer" }} onClick={()=>handleIntlToggle(!intl)}>International location (Canada / Mexico / other)</label>
        </div>
      )}
    </div>
  );
}

function CSRForm({ request, onSaveDraft, onSubmit, onBack, readOnly, role, userName, onAddNote, onAddAttachments, onRemoveAttachment, onDelete, allRequests, onUpdateId, isAdmin }) {
  const [data, setData] = useState({
    locationLat: null, locationLng: null, locationInternational: false,
    ...request.csr,
    items: (request.csr?.items || []).map(it => ({ handlingRequired: "", outboundHandling: "", itemsPerShipment: "", ...it })),
  });
  const [editingId, setEditingId] = useState(false);
  const [customId, setCustomId] = useState(request.id);
  const submitter = request.csr.submittedBy || userName || "";

  const setField = (k, v) => setData(d => ({ ...d, [k]: v }));

  // Auto-regenerate project ID when customer name changes (draft only)
  // Only updates locally while typing — persists on blur to avoid Supabase re-render loop
  const handleCustomerNameChange = (name) => {
    setField("customerName", name);
    if (request.status === "draft_csr" && name.trim().length >= 2) {
      const existingIds = (allRequests || []).filter(r => r.id !== request.id).map(r => r.id);
      const newId = genProjectId(name, existingIds);
      setCustomId(newId);
    }
  };

  const setItem = (id, patch) => setData(d => ({
    ...d,
    items: d.items.map(it => it.id === id ? { ...it, ...patch } : it),
  }));
  const addItem = () => setData(d => ({ ...d, items: [...d.items, blankItem()] }));
  const removeItem = (id) => setData(d => ({
    ...d,
    items: d.items.length > 1 ? d.items.filter(it => it.id !== id) : d.items,
  }));

  const validate = () => {
    const errs = [];
    if (!data.customerName.trim()) errs.push("Customer name");
    if (!data.storageStartDate) errs.push("Storage start date");
    if (!data.storageEndDate) errs.push("Storage end date");
    if (!data.locationCity.trim()) errs.push("Preferred city");
    if (!data.locationInternational && !data.locationState) errs.push("Preferred state");
    if (!submitter.trim()) errs.push("Your name");
    data.items.forEach((it, i) => {
      if (!it.name.trim() || !it.arrivalDate || !it.quantity || !it.dimL || !it.dimW || !it.dimH || !it.weight) {
        errs.push(`Item ${i + 1} is incomplete`);
      }
    });
    return errs;
  };

  const errors = validate();
  const canSubmit = errors.length === 0 && !readOnly;

  const buildPayload = () => ({
    ...data,
    submittedBy: submitter,
  });

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <button className="btn btn-ghost btn-xs" onClick={onBack}>
          <ChevronLeft size={13} /> Back
        </button>
        {onDelete && (
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        )}
      </div>

      <div style={{ marginBottom: 8 }}>
        <StageMarker num={1} label="CSR / Customer-Facing Submission" />
      </div>
      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        {readOnly ? "CSR Request" : "New Warehouse Request"}
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Capture what the customer needs. Procurement will use this to source a facility and quote the job.
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* CSR Revision alert */}
      {request.status === "revision_csr" && request.csrRevision?.notes && (
        <div className="panel" style={{
          padding: 20, marginBottom: 18,
          borderColor: "var(--warning-dim)",
          background: "linear-gradient(180deg, rgba(232,155,111,0.08) 0%, rgba(232,155,111,0.02) 100%)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <AlertCircle size={16} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>
              {request.csrRevision.requestedByRole === "finance" ? "Finance" : "Procurement"} Requested Revisions
            </div>
            <div style={{ flex: 1 }} />
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
              {request.csrRevision.requestedBy} · {fmtDateTime(request.csrRevision.requestedAt)}
            </span>
          </div>
          <div style={{ fontSize: 13.5, color: "var(--text)", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>
            {request.csrRevision.notes}
          </div>
        </div>
      )}

      {/* Meta info */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <UserCircle size={15} style={{ color: "var(--accent)" }} />
          <div className="eyebrow-bright">Customer & Engagement</div>
          <div style={{ flex: 1 }} />
          {editingId ? (
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <input className="input input-mono" value={customId} onChange={e => setCustomId(e.target.value)}
                style={{ width: 180, fontSize: 12, padding: "4px 8px" }}
                onKeyDown={e => { if (e.key === "Enter" && customId.trim()) { onUpdateId(customId.trim()); setEditingId(false); }}} />
              <button className="btn btn-ghost btn-xs" onClick={() => { if (customId.trim()) { onUpdateId(customId.trim()); } setEditingId(false); }}>
                <Check size={12} />
              </button>
              <button className="btn btn-ghost btn-xs" onClick={() => { setCustomId(request.id); setEditingId(false); }}>
                <X size={12} />
              </button>
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div className="font-mono" style={{ fontSize: 11.5, color: "var(--text-dim)" }}>{request.id}</div>
              {isAdmin && onUpdateId && (
                <button className="btn btn-ghost btn-xs" onClick={() => setEditingId(true)} title="Edit project ID">
                  <Edit3 size={11} />
                </button>
              )}
            </div>
          )}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 14 }}>
          <div>
            <div className="field-label field-label-required">Customer Name</div>
            <input className="input" value={data.customerName} disabled={readOnly}
              onChange={e => handleCustomerNameChange(e.target.value)}
              placeholder="e.g. Acme Industrial Co." />
          </div>
          <div>
            <div className="field-label field-label-required">Storage Start</div>
            <input type="date" className="input input-mono" value={data.storageStartDate} disabled={readOnly}
              onChange={e => setField("storageStartDate", e.target.value)} />
          </div>
          <div>
            <div className="field-label field-label-required">Storage End</div>
            <input type="date" className="input input-mono" value={data.storageEndDate} disabled={readOnly}
              onChange={e => setField("storageEndDate", e.target.value)} />
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 14, marginTop: 14 }}>
          <div>
            <div className="field-label field-label-required">Preferred Storage Location</div>
            <CityAutocomplete
              city={data.locationCity}
              state={data.locationState}
              lat={data.locationLat}
              lng={data.locationLng}
              international={data.locationInternational}
              disabled={readOnly}
              onChange={({ city, state, lat, lng, international }) => {
                setData(d => ({ ...d, locationCity: city, locationState: state, locationLat: lat, locationLng: lng, locationInternational: international }));
              }}
            />
          </div>
          <div>
            <div className="field-label field-label-required">Your Name (Submitter)</div>
            <input className="input" value={submitter} disabled
              placeholder="e.g. Jane Doe" />
          </div>
        </div>
      </div>

      {/* Items */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <Package size={15} style={{ color: "var(--accent)" }} />
          <div className="eyebrow-bright">Item Breakdown</div>
          <div style={{ flex: 1 }} />
          <span className="font-mono" style={{ fontSize: 11.5, color: "var(--text-dim)" }}>
            {data.items.length} {data.items.length === 1 ? "item" : "items"}
          </span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {data.items.map((it, idx) => (
            <ItemCard
              key={it.id}
              item={it}
              index={idx}
              onChange={(patch) => setItem(it.id, patch)}
              onRemove={() => removeItem(it.id)}
              canRemove={data.items.length > 1}
              readOnly={readOnly}
            />
          ))}
        </div>

        {!readOnly && (
          <button className="btn btn-xs" style={{ marginTop: 12 }} onClick={addItem}>
            <Plus size={12} /> Add item
          </button>
        )}
      </div>

      {/* Errors */}
      {!readOnly && errors.length > 0 && (
        <div className="panel-inset" style={{ padding: "12px 16px", marginBottom: 14, display: "flex", gap: 10, alignItems: "flex-start", borderColor: "var(--warning-dim)" }}>
          <AlertTriangle size={15} style={{ color: "var(--warning)", flexShrink: 0, marginTop: 1 }} />
          <div>
            <div style={{ fontSize: 12.5, color: "var(--warning)", fontWeight: 500, marginBottom: 4 }}>
              {errors.length} field{errors.length === 1 ? "" : "s"} still needed to submit
            </div>
            <div style={{ fontSize: 12, color: "var(--text-mid)" }}>
              {errors.slice(0, 4).join(" · ")}{errors.length > 4 ? ` · +${errors.length - 4} more` : ""}
            </div>
            <div style={{ fontSize: 11.5, color: "var(--text-dim)", marginTop: 6 }}>
              You can still <span className="kbd">Save Draft</span> to keep your progress.
            </div>
          </div>
        </div>
      )}

      {/* Actions */}
      {!readOnly && (
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 8 }}>
          <button className="btn" onClick={() => onSaveDraft(buildPayload(), customId)}>
            <Save size={14} /> Save Draft
          </button>
          <button className="btn btn-primary" onClick={() => onSubmit(buildPayload(), customId)} disabled={!canSubmit}>
            Submit to Procurement <Send size={14} />
          </button>
        </div>
      )}

      <SharedAttachments request={request} userName={userName} role={role} onAdd={onAddAttachments} onRemove={onRemoveAttachment} />
      <SharedNotesPanel request={request} role={role} userName={userName} onAddNote={onAddNote} />
      <ChangeLogPanel request={request} />
    </div>
  );
}

function ItemCard({ item, index, onChange, onRemove, canRemove, readOnly }) {
  const [open, setOpen] = useState(true);
  const fp = footprintSqft(item.dimL, item.dimW);

  return (
    <div className="panel-inset" style={{ padding: 0, overflow: "hidden" }}>
      <div
        onClick={() => setOpen(o => !o)}
        style={{
          display: "flex", alignItems: "center", gap: 10,
          padding: "10px 14px",
          cursor: "pointer",
          background: open ? "var(--panel-hi)" : "transparent",
          transition: "background 140ms",
        }}
      >
        <div style={{
          width: 22, height: 22,
          display: "flex", alignItems: "center", justifyContent: "center",
          background: "var(--bg-2)",
          border: "1px solid var(--border-mid)",
          borderRadius: 3,
          fontFamily: "'Geist Mono', monospace",
          fontSize: 11, color: "var(--accent)",
        }}>{index + 1}</div>
        <Box size={14} style={{ color: "var(--text-dim)" }} />
        <div style={{ fontSize: 13, fontWeight: 500, color: item.name.trim() ? "var(--text)" : "var(--text-dim)", fontStyle: item.name.trim() ? "normal" : "italic" }}>
          {item.name.trim() || `Item ${index + 1} — untitled`}
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: 14, fontSize: 11.5, color: "var(--text-dim)", fontFamily: "'Geist Mono', monospace" }}>
          {item.quantity && <span>Qty {fmtNum(item.quantity)}</span>}
          {fp !== null && <span>{fp.toFixed(1)} ft²</span>}
          {item.weight && <span>{fmtNum(item.weight)} lb</span>}
        </div>
        {canRemove && !readOnly && (
          <button className="btn btn-ghost btn-xs" onClick={(e) => { e.stopPropagation(); onRemove(); }} title="Remove item">
            <Trash2 size={12} />
          </button>
        )}
        {open ? <ChevronDown size={15} style={{ color: "var(--text-dim)" }} /> : <ChevronRight size={15} style={{ color: "var(--text-dim)" }} />}
      </div>

      {open && (
        <div style={{ padding: "16px", borderTop: "1px solid var(--border)" }}>
          <div style={{ marginBottom: 12 }}>
            <div className="field-label field-label-required">Item Name</div>
            <input type="text" className="input" value={item.name} disabled={readOnly}
              onChange={e => onChange({ name: e.target.value })}
              placeholder="e.g. Industrial Generator, Pallet of Widgets, Steel Racks" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 12 }}>
            <div>
              <div className="field-label field-label-required">Arrival Date</div>
              <input type="date" className="input input-mono" value={item.arrivalDate} disabled={readOnly}
                onChange={e => onChange({ arrivalDate: e.target.value })} />
            </div>
            <div>
              <div className="field-label">Expected Departure</div>
              <input type="date" className="input input-mono" value={item.expectedDeparture} disabled={readOnly}
                onChange={e => onChange({ expectedDeparture: e.target.value })} />
            </div>
            <div>
              <div className="field-label">Storage Type</div>
              <select className="select" value={item.storageType} disabled={readOnly}
                onChange={e => onChange({ storageType: e.target.value })}>
                <option value="indoor">Indoor</option>
                <option value="outdoor">Outdoor</option>
                <option value="either">Either</option>
              </select>
            </div>
            <div>
              <div className="field-label">Handling Required (Inbound)</div>
              <select className="select" value={item.handlingRequired || ""} disabled={readOnly}
                onChange={e => onChange({ handlingRequired: e.target.value })}>
                <option value="">None / TBD</option>
                {EQUIPMENT_PRESETS.map(eq => <option key={eq} value={eq}>{eq}</option>)}
              </select>
            </div>
            <div>
              <div className="field-label field-label-required">Quantity</div>
              <input type="number" min="0" className="input input-mono" value={item.quantity} disabled={readOnly}
                onChange={e => onChange({ quantity: e.target.value })} placeholder="0" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 12 }}>
            <div>
              <div className="field-label">Handling Required (Outbound)</div>
              <select className="select" value={item.outboundHandling || item.handlingRequired || ""} disabled={readOnly}
                onChange={e => onChange({ outboundHandling: e.target.value })}>
                <option value="">Same as Inbound</option>
                {EQUIPMENT_PRESETS.map(eq => <option key={eq} value={eq}>{eq}</option>)}
              </select>
            </div>
            <div>
              <div className="field-label">Items per Shipment</div>
              <input type="number" min="1" className="input input-mono" value={item.itemsPerShipment || ""} disabled={readOnly}
                onChange={e => onChange({ itemsPerShipment: e.target.value })}
                placeholder="e.g. 4" />
              <div style={{ fontSize: 10.5, color: "var(--text-faint)", marginTop: 3 }}>Units arriving per truck/load</div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "3fr 1fr 1fr", gap: 12, marginTop: 12 }}>
            <div>
              <div className="field-label field-label-required">Dimensions per Unit (inches) <span style={{ color: "var(--text-faint)", fontWeight: 400, letterSpacing: 0 }}>L × W × H</span></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                <input type="number" min="0" className="input input-mono" value={item.dimL} disabled={readOnly}
                  onChange={e => onChange({ dimL: e.target.value })} placeholder="L" />
                <input type="number" min="0" className="input input-mono" value={item.dimW} disabled={readOnly}
                  onChange={e => onChange({ dimW: e.target.value })} placeholder="W" />
                <input type="number" min="0" className="input input-mono" value={item.dimH} disabled={readOnly}
                  onChange={e => onChange({ dimH: e.target.value })} placeholder="H" />
              </div>
            </div>
            <div>
              <div className="field-label field-label-required">Weight <span style={{ color: "var(--text-faint)", fontWeight: 400, letterSpacing: 0 }}>(lb)</span></div>
              <input type="number" min="0" className="input input-mono" value={item.weight} disabled={readOnly}
                onChange={e => onChange({ weight: e.target.value })} placeholder="0" />
            </div>
            <div>
              <div className="field-label">Value per Unit <span style={{ color: "var(--text-faint)", fontWeight: 400, letterSpacing: 0 }}>(USD)</span></div>
              <input type="number" min="0" step="0.01" className="input input-mono" value={item.value} disabled={readOnly}
                onChange={e => onChange({ value: e.target.value })} placeholder="0.00" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12 }}>
            <div>
              <div className="field-label">Special Handling Instructions</div>
              <textarea className="textarea" value={item.specialHandling} disabled={readOnly}
                onChange={e => onChange({ specialHandling: e.target.value })}
                placeholder="e.g. fragile, top-heavy, requires 2-person lift, hazmat class 3…" />
            </div>
            <div>
              <div className="field-label">Special Storing Instructions</div>
              <textarea className="textarea" value={item.specialStoring} disabled={readOnly}
                onChange={e => onChange({ specialStoring: e.target.value })}
                placeholder="e.g. climate controlled, no direct sunlight, rack vs floor, segregate from X…" />
            </div>
          </div>

          {fp !== null && (
            <div style={{
              marginTop: 12, paddingTop: 12, borderTop: "1px dashed var(--border-mid)",
              display: "flex", gap: 18, fontSize: 11.5,
              color: "var(--text-dim)",
              fontFamily: "'Geist Mono', monospace",
            }}>
              <span>Footprint per unit: <span style={{ color: "var(--text-mid)" }}>{fp.toFixed(2)} ft²</span></span>
              {item.quantity && <span>Total footprint: <span style={{ color: "var(--text-mid)" }}>{(fp * parseFloat(item.quantity || 0)).toFixed(2)} ft²</span></span>}
              {item.quantity && item.weight && <span>Total weight: <span style={{ color: "var(--text-mid)" }}>{fmtNum(parseFloat(item.weight) * parseFloat(item.quantity))} lb</span></span>}
              {item.quantity && item.value && <span>Total value: <span style={{ color: "var(--text-mid)" }}>{fmtMoney(parseFloat(item.value) * parseFloat(item.quantity))}</span></span>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// PROCUREMENT FORM
// ============================================================
function ProcurementForm({ request, onSaveDraft, onSubmit, onRevisionCsr, onBack, readOnly, role, userName, onAddNote, onAddAttachments, onRemoveAttachment, onDelete }) {
  const [data, setData] = useState({
    facilityCity: "", facilityState: "", facilityLat: null, facilityLng: null, facilityInternational: false,
    handlingCosts: [], attachments: [],
    ...request.procurement,
  });
  const [csrRevNotes, setCsrRevNotes] = useState("");
  const [showCsrRev, setShowCsrRev] = useState(false);
  const submitter = request.procurement.submittedBy || userName || "";
  const fileInputRef = useRef(null);

  // Pre-populate disclaimers from active default assumptions on first load (if still empty)
  useEffect(() => {
    if (readOnly) return;
    if (data.disclaimers && data.disclaimers.trim().length > 0) return;
    loadDefaultAssumptions().then(list => {
      const active = (list || []).filter(a => a.active).map(a => a.text);
      if (active.length > 0) {
        setData(d => ({ ...d, disclaimers: active.map(t => "• " + t).join("\n") }));
      }
    }).catch(() => {});
    // eslint-disable-next-line
  }, []);

  const setField = (k, v) => setData(d => ({ ...d, [k]: v }));
  const setHandling = (id, patch) => setData(d => ({
    ...d,
    handlingCosts: d.handlingCosts.map(r => r.id === id ? { ...r, ...patch } : r),
  }));
  const addHandling = () => setData(d => ({ ...d, handlingCosts: [...d.handlingCosts, blankHandling()] }));
  const removeHandling = (id) => setData(d => ({
    ...d,
    handlingCosts: d.handlingCosts.length > 1 ? d.handlingCosts.filter(r => r.id !== id) : d.handlingCosts,
  }));

  const handleFiles = async (files) => {
    const arr = Array.from(files);
    const processed = await Promise.all(arr.map(async (f) => {
      const meta = {
        id: genRowId(),
        name: f.name,
        size: f.size,
        type: f.type,
        dataUrl: null,
      };
      // Only inline small images as data URLs for preview
      if (f.size < 5_000_000) {
        try {
          meta.dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = () => rej();
            r.readAsDataURL(f);
          });
        } catch { /* ignore */ }
      }
      return meta;
    }));
    setData(d => ({ ...d, attachments: [...d.attachments, ...processed] }));
  };

  const removeAttachment = (id) => setData(d => ({
    ...d,
    attachments: d.attachments.filter(a => a.id !== id),
  }));

  const validate = () => {
    const errs = [];
    if (!data.facilityName.trim()) errs.push("Facility name");
    if (!(data.facilityCity || data.facilityLocation || "").trim()) errs.push("Facility location");
    if (!data.squareFootage) errs.push("Square footage");
    if (!data.storageCostsIndoor && !data.storageCostsOutdoor && !data.storageCosts) errs.push("Storage cost (indoor or outdoor)");
    if (!data.insuranceCostPer1000) errs.push("Insurance cost per $1000");
    if (!data.meetsRequirements) errs.push("Meets requirements answer");
    if (!data.capacityConfirmed) errs.push("Capacity confirmation");
    if (!submitter.trim()) errs.push("Your name");
    return errs;
  };
  const errors = validate();
  const canSubmit = errors.length === 0 && !readOnly;

  const buildPayload = () => ({
    ...data,
    submittedBy: submitter,
  });

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <button className="btn btn-ghost btn-xs" onClick={onBack}>
          <ChevronLeft size={13} /> Back
        </button>
        {onDelete && (
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        )}
      </div>

      <div style={{ marginBottom: 8 }}>
        <StageMarker num={2} label="Procurement Quote" />
      </div>
      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        {readOnly ? "Procurement Offer" : "Facility Offer & Costs"}
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Submit the facility you're offering and the rate structure. Finance will use this to build the final customer quote.
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* Follow-up alert from Finance */}
      {request.status === "follow_up" && request.finance.followUpNotes && (
        <div className="panel" style={{
          padding: 20, marginBottom: 18,
          borderColor: "var(--warning-dim)",
          background: "linear-gradient(180deg, rgba(232,155,111,0.08) 0%, rgba(232,155,111,0.02) 100%)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <AlertCircle size={16} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>Finance Requested Follow-up</div>
            <div style={{ flex: 1 }} />
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
              {request.finance.decidedBy} · {fmtDateTime(request.finance.decidedAt)}
            </span>
          </div>
          <div style={{ fontSize: 13.5, color: "var(--text)", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>
            {request.finance.followUpNotes}
          </div>
          <div style={{ marginTop: 10, fontSize: 12, color: "var(--text-mid)" }}>
            Update the offer below and resubmit to send back to Finance.
          </div>
        </div>
      )}

      {/* CSR snapshot */}
      <CsrSnapshot request={request} />

      {/* Facility */}
      <div className="panel" style={{ padding: 20, marginBottom: 18, marginTop: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <Building2 size={15} style={{ color: "var(--cool)" }} />
          <div className="eyebrow-bright">Facility Details</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1.2fr 0.8fr", gap: 14 }}>
          <div>
            <div className="field-label field-label-required">Facility Name</div>
            <input className="input" value={data.facilityName} disabled={readOnly}
              onChange={e => setField("facilityName", e.target.value)}
              placeholder="e.g. Northside Logistics – Building 4" />
          </div>
          <div>
            <div className="field-label field-label-required">Facility Location</div>
            <CityAutocomplete
              city={data.facilityCity || data.facilityLocation || ""}
              state={data.facilityState || ""}
              lat={data.facilityLat}
              lng={data.facilityLng}
              international={data.facilityInternational}
              disabled={readOnly}
              onChange={({ city, state, lat, lng, international }) => {
                setData(d => ({
                  ...d,
                  facilityCity: city,
                  facilityState: state,
                  facilityLocation: state ? `${city}, ${state}` : city,
                  facilityLat: lat,
                  facilityLng: lng,
                  facilityInternational: international,
                }));
              }}
            />
            {/* Distance from CSR requested location */}
            {(() => {
              const csrLat = request.csr.locationLat;
              const csrLng = request.csr.locationLng;
              const facLat = data.facilityLat;
              const facLng = data.facilityLng;
              const csrCity = request.csr.locationCity;
              const facCity = data.facilityCity || data.facilityLocation;
              if (data.facilityInternational || request.csr.locationInternational) {
                return <div style={{ marginTop:5, fontSize:11, color:"var(--text-faint)" }}>⚠ Distance N/A — international location</div>;
              }
              if (csrLat && facLat) {
                const miles = haversineMiles(csrLat, csrLng, facLat, facLng);
                return (
                  <div style={{ marginTop:5, fontSize:11, color:"var(--text-mid)" }}>
                    <span style={{ color:"var(--cool)" }}>~{Math.round(miles)} mi</span>
                    {" "}from {csrCity || "requested location"}
                    <span style={{ color:"var(--text-faint)", marginLeft:4 }}>(straight-line, not drive distance)</span>
                  </div>
                );
              }
              if (csrCity && facCity) {
                return <div style={{ marginTop:5, fontSize:11, color:"var(--text-faint)" }}>Select from dropdown to calculate distance</div>;
              }
              return null;
            })()}
          </div>
          <div>
            <div className="field-label field-label-required">SqFt Available</div>
            <input type="number" min="0" className="input input-mono" value={data.squareFootage} disabled={readOnly}
              onChange={e => setField("squareFootage", e.target.value)}
              placeholder="0" />
          </div>
        </div>
        <div style={{ marginTop: 14 }}>
          <div className="field-label field-label-required">Your Name (Submitter)</div>
          <input className="input" value={submitter} disabled
            placeholder="e.g. Sam Patel" style={{ maxWidth: 360 }} />
        </div>
      </div>

      {/* Handling Costs */}
      {(() => {
        // Build CSR-requested equipment summary: { equipment: { totalQty, totalShipments, items: [...] } }
        const csrItems = request.csr?.items || [];
        const csrEquipSummary = {};
        csrItems.forEach(it => {
          const qty = parseFloat(it.quantity) || 0;
          if (!qty) return;
          const perShip = parseFloat(it.itemsPerShipment) || qty;
          const shipments = Math.ceil(qty / perShip);
          const inbound = it.handlingRequired;
          const outbound = it.outboundHandling || inbound;
          [inbound, outbound].forEach(eq => {
            if (!eq) return;
            if (!csrEquipSummary[eq]) csrEquipSummary[eq] = { totalQty: 0, totalShipments: 0, itemNames: new Set() };
            csrEquipSummary[eq].totalQty += qty;
            csrEquipSummary[eq].totalShipments += shipments;
            csrEquipSummary[eq].itemNames.add(it.name || "Item");
          });
        });
        const csrEquipKeys = Object.keys(csrEquipSummary);
        // Detect mismatches: procurement rows with equipment CSR didn't request
        const procEquipList = data.handlingCosts.map(r => r.equipment).filter(Boolean);
        const mismatches = procEquipList.filter(e => e && !csrEquipKeys.includes(e));

        return (
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
          <Truck size={15} style={{ color: "var(--cool)" }} />
          <div className="eyebrow-bright">Handling Costs</div>
          <div style={{ flex: 1 }} />
          <span className="font-mono" style={{ fontSize: 11.5, color: "var(--text-dim)" }}>
            {data.handlingCosts.length} line{data.handlingCosts.length === 1 ? "" : "s"}
          </span>
        </div>

        {/* CSR guidance strip — what equipment was requested & volume */}
        {csrEquipKeys.length > 0 && (
          <div style={{
            marginBottom: 14, padding: "10px 12px",
            background: "rgba(136,176,224,0.05)", border: "1px solid rgba(136,176,224,0.15)",
            borderRadius: 4, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap",
          }}>
            <span style={{ fontSize: 10.5, letterSpacing: "0.09em", textTransform: "uppercase", color: "var(--cool)", fontWeight: 600 }}>CSR requested</span>
            {csrEquipKeys.map(eq => {
              const s = csrEquipSummary[eq];
              return (
                <Tooltip key={eq} content={
                  <Fragment>
                    <div style={{ fontWeight: 600, marginBottom: 6 }}>{eq} — CSR volume</div>
                    <TipRow label="Total units" value={s.totalQty}/>
                    <TipRow label="Total shipments" value={s.totalShipments}/>
                    <TipDivider/>
                    <div style={{ fontSize: 11, color: "var(--text-dim)" }}>
                      Items: {[...s.itemNames].join(", ")}
                    </div>
                  </Fragment>
                }>
                  <span style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    padding: "3px 9px", borderRadius: 2,
                    background: "rgba(136,176,224,0.08)", border: "1px solid rgba(136,176,224,0.25)",
                    fontSize: 11.5, color: "var(--text)", fontWeight: 500,
                  }}>
                    {eq}
                    <span style={{ color: "var(--text-dim)", fontSize: 10.5, fontFamily: "'Geist Mono', monospace" }}>
                      {s.totalQty}u · {s.totalShipments}s
                    </span>
                  </span>
                </Tooltip>
              );
            })}
          </div>
        )}

        {/* Mismatch warning */}
        {mismatches.length > 0 && (
          <div style={{
            marginBottom: 12, padding: "9px 12px",
            background: "rgba(232,100,78,0.08)", border: "1px solid rgba(232,100,78,0.3)",
            borderRadius: 4, fontSize: 12, color: "#e86e6e",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <AlertTriangle size={13}/>
            <span>
              <strong>Unit mismatch:</strong> {mismatches.join(", ")} not requested by CSR — double-check or remove.
            </span>
          </div>
        )}

        <div className="panel-inset" style={{ overflow: "hidden" }}>
          <div className="data-row data-head" style={{ gridTemplateColumns: "1.3fr 0.9fr 1.1fr 70px 40px" }}>
            <div className="data-cell-head">Equipment / Service</div>
            <div className="data-cell-head">Rate (USD)</div>
            <div className="data-cell-head">Basis</div>
            <div className="data-cell-head" style={{ justifyContent: "center" }}>
              <Tooltip content="When multiple rates exist for the same equipment, the primary rate is used by default in quote creation.">
                <span style={{ fontSize: 11 }}>Primary</span>
              </Tooltip>
            </div>
            <div className="data-cell-head" />
          </div>
          {data.handlingCosts.map((row) => {
            const s = csrEquipSummary[row.equipment];
            const sameEquipRows = data.handlingCosts.filter(r => r.equipment === row.equipment && r.equipment);
            const hasMultiple = sameEquipRows.length > 1;
            return (
            <div key={row.id} className="data-row" style={{ gridTemplateColumns: "1.3fr 0.9fr 1.1fr 70px 40px" }}>
              <div className="data-cell" style={{ padding: "8px 12px", flexDirection: "column", alignItems: "stretch", gap: 3 }}>
                <input className="input" value={row.equipment} disabled={readOnly}
                  onChange={e => setHandling(row.id, { equipment: e.target.value })}
                  list={`eq-${row.id}`}
                  placeholder="e.g. Forklift" />
                <datalist id={`eq-${row.id}`}>
                  {EQUIPMENT_PRESETS.map(p => <option key={p} value={p} />)}
                </datalist>
                {s && (
                  <span style={{ fontSize: 10.5, color: "var(--cool)", fontFamily: "'Geist Mono', monospace" }}>
                    CSR: {s.totalQty}u · {s.totalShipments}s
                  </span>
                )}
              </div>
              <div className="data-cell" style={{ padding: "8px 12px" }}>
                <input type="number" min="0" step="0.01" className="input input-mono input-no-spin"
                  disabled={readOnly}
                  value={row.rate}
                  onChange={e => setHandling(row.id, { rate: e.target.value })}
                  placeholder="0.00" />
              </div>
              <div className="data-cell" style={{ padding: "8px 12px" }}>
                <select className="select" disabled={readOnly}
                  value={row.unit}
