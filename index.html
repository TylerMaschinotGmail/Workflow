// Calculate storage schedule from item arrival/departure dates
// itemHalos: { [itemId]: pct } — per-item halo overrides; globalHalo: fallback %
function buildStorageSchedule(items, globalHalo = 0, itemHalos = {}, indoorRate = 0, outdoorRate = 0) {
  if (!items || items.length === 0) return [];
  // Build separate month buckets for indoor and outdoor
  const indoor = {};
  const outdoor = {};
  items.forEach(item => {
    const qty = parseFloat(item.quantity) || 0;
    if (!qty || !item.arrivalDate || !item.expectedDeparture) return;
    const halo = (itemHalos[item.id] != null ? itemHalos[item.id] : globalHalo) / 100;
    const adjL = (parseFloat(item.dimL)||0) * (1 + halo);
    const adjW = (parseFloat(item.dimW)||0) * (1 + halo);
    const fp = (adjL * adjW) / 144;
    const totalFp = Math.ceil(fp * qty); // ROUNDUP per item group, matching spreadsheet behavior
    const arrival = new Date(item.arrivalDate + "T12:00:00");
    const departure = new Date(item.expectedDeparture + "T12:00:00");
    if (isNaN(arrival.getTime()) || isNaN(departure.getTime())) return;
    if (arrival.getFullYear() < 2000 || departure.getFullYear() < 2000) return;
    const bucket = item.storageType === "outdoor" ? outdoor : indoor;
    const cur = new Date(arrival.getFullYear(), arrival.getMonth(), 1);
    const end = new Date(departure.getFullYear(), departure.getMonth(), 1);
    while (cur <= end) {
      const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}`;
      const label = cur.toLocaleDateString("en-US", { month:"long", year:"numeric" });
      if (!bucket[key]) bucket[key] = { key, label, sqft: 0, sort: cur.getTime() };
      bucket[key].sqft += totalFp;
      cur.setMonth(cur.getMonth() + 1);
    }
  });

  const toRows = (bucket, type) =>
    Object.values(bucket).sort((a,b) => a.sort - b.sort)
      .map(m => ({ ...m, sqft: Math.ceil(m.sqft), storageType: type }));

  const indoorRows = toRows(indoor, "indoor");
  const outdoorRows = toRows(outdoor, "outdoor");

  // If only one type has data, return flat array (backward compat)
  if (outdoorRows.length === 0) return indoorRows;
  if (indoorRows.length === 0) return outdoorRows;
  // Both — return combined, sorted by date, tagged by type
  return [...indoorRows, ...outdoorRows].sort((a,b) => a.sort - b.sort || (a.storageType === "indoor" ? -1 : 1));
}

// Calculate total declared value from items
function totalDeclaredValue(items) {
  return (items||[]).reduce((s, it) => {
    const qty = parseFloat(it.quantity) || 0;
    const val = parseFloat(it.value) || 0;
    return s + qty * val;
  }, 0);
}

// Calculate handling costs from items + procurement rates
function calcHandling(items, handlingCosts, direction) {
  // Build rate map with primary flag — captures all rates per equipment
  // rateMap[equipment] = { per_unit: rate, per_shipment: rate, primaryBasis: "per_unit"|"per_shipment" }
  const rateMap = {};
  (handlingCosts||[]).forEach(h => {
    if (!h.equipment) return;
    if (!rateMap[h.equipment]) rateMap[h.equipment] = { primaryBasis: null };
    rateMap[h.equipment][h.unit] = parseFloat(h.rate) || 0;
    if (h.isPrimary) rateMap[h.equipment].primaryBasis = h.unit;
  });
  // Default primaryBasis if not set: prefer per_unit, fall back to per_shipment
  Object.keys(rateMap).forEach(eq => {
    const r = rateMap[eq];
    if (!r.primaryBasis) {
      r.primaryBasis = (r["per_unit"] > 0) ? "per_unit" : (r["per_shipment"] > 0 ? "per_shipment" : null);
    }
  });

  const consolidated = {};
  (items||[]).forEach(item => {
    const equip = direction === "inbound"
      ? (item.handlingRequired || "")
      : (item.outboundHandling || item.handlingRequired || "");
    if (!equip) return;
    const rates = rateMap[equip];
    if (!rates) return;

    const qty = parseFloat(item.quantity) || 0;
    const perShip = parseFloat(item.itemsPerShipment) || qty;
    const shipments = Math.ceil(qty / perShip);
    const perUnitRate = rates["per_unit"] || 0;
    const perShipRate = rates["per_shipment"] || 0;
    const hasBoth = perUnitRate > 0 && perShipRate > 0;

    const usePerUnit = rates.primaryBasis === "per_unit";
    const billedRate = usePerUnit ? perUnitRate : perShipRate;
    const billedUnits = usePerUnit ? qty : shipments;
    const billedLabel = usePerUnit ? "Per Pallet" : "Per Shipment";
    const basisKey = usePerUnit ? "per_unit" : "per_shipment";
    const altDesc = hasBoth ? (usePerUnit
      ? `Alt: ${shipments} shipment${shipments!==1?"s":""} × $${perShipRate}/shipment = $${(perShipRate*shipments).toFixed(2)}`
      : `Alt: ${qty} pallet${qty!==1?"s":""} × $${perUnitRate}/pallet = $${(perUnitRate*qty).toFixed(2)}`) : "";

    if (!consolidated[equip]) {
      consolidated[equip] = {
        id: genRowId(),
        description: equip,
        equipment: equip,
        ratePerUnit: billedRate,
        units: 0,
        unitLabel: billedLabel,
        basisKey,
        total: 0,
        itemBreakdown: [],
        hasDualRate: false,
        altDesc: "",
      };
    }
    consolidated[equip].units += billedUnits;
    consolidated[equip].itemBreakdown.push(`${item.name||"Item"}: ${billedUnits} ${billedLabel.toLowerCase()} × $${billedRate}`);
    if (hasBoth) { consolidated[equip].hasDualRate = true; consolidated[equip].altDesc = altDesc; }
  });

  return Object.values(consolidated).map(l => ({
    ...l,
    total: parseFloat((l.ratePerUnit * l.units).toFixed(2)),
  }));
}

function FinanceQuoteBuilder({ request, onBack, onSaveQuote, auth, isAdmin }) {
  const { csr, procurement } = request;
  const items = csr.items || [];
  const handlingCosts = procurement.handlingCosts || [];

  // Build defaults from procurement data
  const defaultSchedule = buildStorageSchedule(items);
  const defaultInbound  = calcHandling(items, handlingCosts, "inbound");
  const defaultOutbound = calcHandling(items, handlingCosts, "outbound");
  const defaultIndoorRate  = parseFloat(procurement.storageCostsIndoor || procurement.storageCosts) || 0;
  const defaultOutdoorRate = parseFloat(procurement.storageCostsOutdoor) || 0;
  const defaultStorageRate = defaultIndoorRate || defaultOutdoorRate || 0;
  const defaultInsurance = parseFloat(procurement.insuranceCostPer1000) || 0;
  const defaultDeclaredValue = totalDeclaredValue(items);

  // Quote state
  const [margin, setMargin] = useState(request.financeQuote?.margin ?? 20);
  const [showMonthlyBreakdown, setShowMonthlyBreakdown] = useState(request.financeQuote?.showMonthlyBreakdown ?? true);
  const [globalHalo, setGlobalHalo] = useState(request.financeQuote?.globalHalo ?? 20);
  const [itemHalos, setItemHalos] = useState(request.financeQuote?.itemHalos ?? {});
  const [indoorRate, setIndoorRate]   = useState(request.financeQuote?.indoorRate   ?? defaultIndoorRate);
  const [outdoorRate, setOutdoorRate] = useState(request.financeQuote?.outdoorRate  ?? defaultOutdoorRate);
  const storageRate = indoorRate || outdoorRate || 0; // keep for legacy compat in PDF/preview
  const [storageRateModified, setStorageRateModified] = useState(false);

  const computedSchedule = buildStorageSchedule(items, globalHalo, itemHalos, indoorRate, outdoorRate);
  const [schedule, setSchedule] = useState(request.financeQuote?.schedule ?? computedSchedule);
  const [scheduleManuallyEdited, setScheduleManuallyEdited] = useState(request.financeQuote?.scheduleManuallyEdited ?? false);

  // When halo changes and schedule hasn't been manually edited, recompute
  const handleHaloChange = (newGlobal, newItemHalos) => {
    setGlobalHalo(newGlobal);
    setItemHalos(newItemHalos);
    if (!scheduleManuallyEdited) {
      setSchedule(buildStorageSchedule(items, newGlobal, newItemHalos, indoorRate, outdoorRate));
    }
    markModified("halo");
  };

  const [inboundLines, setInboundLines] = useState(request.financeQuote?.inboundLines ?? defaultInbound);
  const [outboundLines, setOutboundLines] = useState(request.financeQuote?.outboundLines ?? defaultOutbound);
  const [insuranceRate, setInsuranceRate] = useState(request.financeQuote?.insuranceRate ?? defaultInsurance);
  const [insuranceRateModified, setInsuranceRateModified] = useState(false);
  const [declaredValue, setDeclaredValue] = useState(request.financeQuote?.declaredValue ?? defaultDeclaredValue);
  // Add-ons
  const [showPersonnel, setShowPersonnel] = useState(request.financeQuote?.personnel != null);
  const [personnelLines, setPersonnelLines] = useState(request.financeQuote?.personnel ?? []);
  const [showEquipment, setShowEquipment] = useState(request.financeQuote?.equipment != null);
  const [equipmentLines, setEquipmentLines] = useState(request.financeQuote?.equipment ?? []);
  const [showEscalation, setShowEscalation] = useState(request.financeQuote?.escalationPct != null);
  const [escalationPct, setEscalationPct] = useState(request.financeQuote?.escalationPct ?? 3);
  const [notes, setNotes] = useState(request.financeQuote?.notes ?? "");
  const [disclaimers, setDisclaimers] = useState(request.financeQuote?.disclaimers ?? request.procurement?.disclaimers ?? "");
  const [saved, setSaved] = useState(false);
  const [modifiedFields, setModifiedFields] = useState(new Set(request.financeQuote?.modifiedFields ?? []));

  const markModified = (field) => setModifiedFields(s => new Set([...s, field]));

  // Calculations
  const storageCost = schedule.reduce((s, m) => {
    const rate = m.storageType === "outdoor" ? (outdoorRate || indoorRate || 0) : (indoorRate || outdoorRate || 0);
    return s + (m.sqft * rate);
  }, 0);
  const inboundTotal = inboundLines.reduce((s, l) => s + ((parseFloat(l.ratePerUnit)||0) * (parseFloat(l.units)||1)), 0);
  const outboundTotal = outboundLines.reduce((s, l) => s + ((parseFloat(l.ratePerUnit)||0) * (parseFloat(l.units)||1)), 0);
  const insuranceCost = (declaredValue / 1000) * insuranceRate;
  const personnelTotal = personnelLines.reduce((s, l) => s + (parseFloat(l.cost)||0), 0);
  const equipmentTotal = equipmentLines.reduce((s, l) => s + (parseFloat(l.cost)||0), 0);
  const subtotal = storageCost + inboundTotal + outboundTotal + insuranceCost + personnelTotal + equipmentTotal;
  const marginAmt = subtotal * (margin / 100);
  const total = subtotal + marginAmt;

  const ModifiedBadge = () => (
    <span style={{ fontSize: 9.5, padding: "1px 5px", borderRadius: 2, background: "rgba(232,184,78,0.12)", color: "var(--accent)", border: "1px solid var(--accent-dim)", marginLeft: 6 }}>modified</span>
  );

  const handleSave = () => {
    const quote = {
      margin, storageRate, schedule, inboundLines, outboundLines,
      insuranceRate, declaredValue, notes, disclaimers, escalationPct: showEscalation ? escalationPct : null,
      personnel: showPersonnel ? personnelLines : null,
      equipment: showEquipment ? equipmentLines : null,
      modifiedFields: [...modifiedFields],
      globalHalo, itemHalos, scheduleManuallyEdited, showMonthlyBreakdown,
      indoorRate, outdoorRate,
      builtBy: auth?.name, builtAt: new Date().toISOString(),
      total, subtotal, marginAmt,
    };
    onSaveQuote(quote);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1300, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13}/> Back to Quote
      </button>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <DollarSign size={20} style={{ color: "var(--accent)" }}/>
        <h1 className="font-display" style={{ fontSize: 36, margin: 0, fontWeight: 400 }}>Build Customer Quote</h1>
        <div style={{ flex: 1 }}/>
        <div className="font-mono" style={{ fontSize: 12, color: "var(--text-dim)" }}>{request.id} · {csr.customerName}</div>
      </div>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: "0 0 28px" }}>
        Review auto-calculated values from the quote data, adjust as needed, then export.
        <span style={{ color: "var(--text-faint)", marginLeft: 8, fontSize: 12 }}>Modified fields are flagged and logged.</span>
      </p>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 20, alignItems: "start" }}>
        {/* Left — input panels */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

          {/* Margin */}
          <div className="panel" style={{ padding: 20 }}>
            <div className="eyebrow-bright" style={{ marginBottom: 12 }}>Margin</div>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <input type="number" min="0" max="100" step="0.5" className="input input-mono"
                value={margin} onChange={e => { setMargin(parseFloat(e.target.value)||0); markModified("margin"); }}
                style={{ width: 100 }}/>
              <span style={{ fontSize: 14, color: "var(--text-mid)" }}>% applied to subtotal</span>
              <span style={{ fontSize: 13, color: "var(--accent)", fontFamily: "'Geist Mono', monospace" }}>= {fmtMoney(marginAmt)}</span>
              <div style={{ fontSize: 11.5, color: "var(--text-faint)", marginLeft: 4 }}>Not shown to customer</div>
            </div>
          </div>

          {/* Footprint Halo */}
          <div className="panel" style={{ padding: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <div className="eyebrow-bright">Footprint Clearance Halo</div>
              <div style={{ fontSize: 11.5, color: "var(--text-faint)", marginLeft: 4 }}>Applied to L and W individually before area calculation</div>
            </div>
            {/* Global halo */}
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14, padding: "12px 14px", background: "var(--panel-hi)", borderRadius: 3, border: "1px solid var(--border-hi)" }}>
              <span style={{ fontSize: 13, color: "var(--text-mid)", fontWeight: 500, minWidth: 120 }}>Global Halo</span>
              <input type="number" min="0" max="100" step="1" className="input input-mono"
                value={globalHalo}
                onChange={e => handleHaloChange(parseFloat(e.target.value)||0, itemHalos)}
                style={{ width: 80 }}/>
              <span style={{ fontSize: 13, color: "var(--text-dim)" }}>%</span>
              <span style={{ fontSize: 12, color: "var(--text-faint)", marginLeft: 4 }}>
                Applied to all items unless overridden below
              </span>
            </div>
            {/* Per-item halo overrides */}
            {items.filter(it => it.name || it.quantity).length > 0 && (
              <div>
                <div style={{ fontSize: 11, color: "var(--text-dim)", marginBottom: 8, letterSpacing: "0.08em", textTransform: "uppercase" }}>Per-Item Overrides</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {items.filter(it => it.quantity).map(item => {
                    const halo = itemHalos[item.id] != null ? itemHalos[item.id] : globalHalo;
                    const isOverridden = itemHalos[item.id] != null;
                    const adjL = (parseFloat(item.dimL)||0) * (1 + halo/100);
                    const adjW = (parseFloat(item.dimW)||0) * (1 + halo/100);
                    const adjFp = (adjL * adjW / 144) * (parseFloat(item.quantity)||0);
                    return (
                      <div key={item.id} style={{ display: "grid", gridTemplateColumns: "1.5fr 80px 60px auto 1fr", gap: 10, alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--border)" }}>
                        <div style={{ fontSize: 12.5, color: "var(--text)" }}>{item.name || "Unnamed item"}</div>
                        <input type="number" min="0" max="100" step="1" className="input input-mono"
                          value={halo}
                          onChange={e => {
                            const v = parseFloat(e.target.value);
                            const next = { ...itemHalos, [item.id]: isNaN(v) ? globalHalo : v };
                            handleHaloChange(globalHalo, next);
                          }}
                          style={{ fontSize: 12, textAlign: "right" }}/>
                        <span style={{ fontSize: 12, color: "var(--text-dim)" }}>%</span>
                        {isOverridden ? (
                          <button className="btn btn-ghost btn-xs" style={{ fontSize: 10, color: "var(--text-faint)" }}
                            onClick={() => {
                              const next = { ...itemHalos };
                              delete next[item.id];
                              handleHaloChange(globalHalo, next);
                            }}>reset</button>
                        ) : <div/>}
                        <div style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "'Geist Mono', monospace" }}>
                          {adjFp > 0 ? `→ ${adjFp.toFixed(1)} ft² total` : "—"}
                          {isOverridden && <span style={{ color: "var(--accent)", marginLeft: 6 }}>overridden</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* Storage Schedule */}
          <div className="panel" style={{ padding: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <div className="eyebrow-bright">Storage Schedule</div>
              <div style={{ flex: 1 }}/>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 11, color: "var(--text-dim)" }}>Indoor $/sqft/mo</span>
                  <input type="number" min="0" step="0.01" className="input input-mono input-no-spin"
                    value={indoorRate || ""}
                    onChange={e => { setIndoorRate(parseFloat(e.target.value)||0); setStorageRateModified(true); markModified("indoorRate");
                      if (!scheduleManuallyEdited) setSchedule(buildStorageSchedule(items, globalHalo, itemHalos, parseFloat(e.target.value)||0, outdoorRate));
                    }}
                    style={{ width: 80 }} placeholder={defaultIndoorRate||"0.00"}/>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 11, color: "var(--text-dim)" }}>Outdoor $/sqft/mo</span>
                  <input type="number" min="0" step="0.01" className="input input-mono input-no-spin"
                    value={outdoorRate || ""}
                    onChange={e => { setOutdoorRate(parseFloat(e.target.value)||0); setStorageRateModified(true); markModified("outdoorRate");
                      if (!scheduleManuallyEdited) setSchedule(buildStorageSchedule(items, globalHalo, itemHalos, indoorRate, parseFloat(e.target.value)||0));
                    }}
                    style={{ width: 80 }} placeholder={defaultOutdoorRate||"0.00"}/>
                </div>
                {storageRateModified && <ModifiedBadge/>}
              </div>
            </div>
            <div style={{ fontSize: 11.5, color: "var(--text-faint)", marginBottom: 10 }}>
              Auto-calculated from item arrival/departure dates. Full month billed for any partial month.
            </div>
            <div className="panel-inset" style={{ overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 80px 100px 100px 100px", gap: 0 }}>
                <div className="data-cell-head" style={{ padding: "7px 12px", fontSize: 11 }}>Month</div>
                <div className="data-cell-head" style={{ padding: "7px 12px", fontSize: 11 }}>Type</div>
                <div className="data-cell-head" style={{ padding: "7px 12px", fontSize: 11, justifyContent: "flex-end" }}>Sq Ft</div>
                <div className="data-cell-head" style={{ padding: "7px 12px", fontSize: 11, justifyContent: "flex-end" }}>Rate</div>
                <div className="data-cell-head" style={{ padding: "7px 12px", fontSize: 11, justifyContent: "flex-end" }}>Total</div>
              </div>
              {schedule.length === 0 ? (
                <div style={{ padding: "16px 12px", fontSize: 12, color: "var(--text-faint)", fontStyle: "italic" }}>
                  No storage schedule — check item arrival/departure dates.
                </div>
              ) : schedule.map((m, i) => {
                const rowRate = m.storageType === "outdoor" ? (outdoorRate || indoorRate || 0) : (indoorRate || outdoorRate || 0);
                return (
                  <div key={(m.key||"k")+i} style={{ display: "grid", gridTemplateColumns: "1fr 80px 100px 100px 100px", borderTop: "1px solid var(--border)" }}>
                    <div style={{ padding: "8px 12px", fontSize: 12.5, color: "var(--text)" }}>{m.label}</div>
                    <div style={{ padding: "8px 12px", display: "flex", alignItems: "center" }}>
                      <span style={{ fontSize: 9.5, padding: "1px 5px", borderRadius: 2, border: `1px solid ${m.storageType==="outdoor"?"var(--cool-dim)":"var(--border-mid)"}`, color: m.storageType==="outdoor"?"var(--cool)":"var(--text-faint)", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                        {m.storageType||"indoor"}
                      </span>
                    </div>
                    <div style={{ padding: "8px 12px", display: "flex", justifyContent: "flex-end" }}>
                      <input type="number" min="0" className="input input-mono input-no-spin"
                        value={m.sqft}
                        onChange={e => {
                          const v = parseFloat(e.target.value)||0;
                          setSchedule(s => s.map((x,j) => j===i ? {...x, sqft:v} : x));
                          setScheduleManuallyEdited(true); markModified("schedule");
                        }}
                        style={{ width: 80, textAlign: "right", fontSize: 12 }}/>
                    </div>
                    <div style={{ padding: "8px 12px", fontSize: 12, color: "var(--text-mid)", display: "flex", alignItems: "center", justifyContent: "flex-end", fontFamily: "'Geist Mono', monospace" }}>
                      {fmtMoney(rowRate)}
                    </div>
                    <div style={{ padding: "8px 12px", fontSize: 12, color: "var(--text)", display: "flex", alignItems: "center", justifyContent: "flex-end", fontFamily: "'Geist Mono', monospace" }}>
                      {fmtMoney(m.sqft * rowRate)}
                    </div>
                  </div>
                );
              })}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 80px 100px 100px 100px", borderTop: "1px solid var(--border-hi)", background: "var(--panel-hi)" }}>
                <div style={{ padding: "8px 12px", fontSize: 12, fontWeight: 600, color: "var(--text)" }}>Storage Total</div>
                <div/><div/><div/>
                <div style={{ padding: "8px 12px", fontSize: 13, fontWeight: 600, color: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "flex-end", fontFamily: "'Geist Mono', monospace" }}>
                  {fmtMoney(storageCost)}
                </div>
              </div>
            </div>
          </div>

          {/* Handling */}
          {["inbound","outbound"].map(dir => {
            const lines = dir === "inbound" ? inboundLines : outboundLines;
            const setLines = dir === "inbound" ? setInboundLines : setOutboundLines;
            const dirTotal = dir === "inbound" ? inboundTotal : outboundTotal;
            return (
              <div key={dir} className="panel" style={{ padding: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <div className="eyebrow-bright">{dir === "inbound" ? "Inbound" : "Outbound"} Handling</div>
                  <button className="btn btn-ghost btn-xs" onClick={() => {
                    setLines(l => [...l, { id: genRowId(), description: "", ratePerUnit: 0, units: 1, unitLabel: "per unit", total: 0 }]);
                    markModified(dir + "Handling");
                  }}>+ Add line</button>
                </div>
                {lines.length === 0 ? (
                  <div style={{ fontSize: 12, color: "var(--text-faint)", fontStyle: "italic" }}>No handling lines — click Add line to add manually.</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {/* Header row */}
                    <div style={{ display: "grid", gridTemplateColumns: "1.8fr 110px 120px 110px auto", gap: 10 }}>
                      {["Description","Rate","Qty / Units","Total",""].map((h,i) => (
                        <div key={i} style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-faint)", padding: "0 2px" }}>{h}</div>
                      ))}
                    </div>
                    {lines.map((l, i) => {
                      const rate = parseFloat(l.ratePerUnit) || 0;
                      const units = parseFloat(l.units) || 1;
                      const lineTotal = rate * units;
                      // Keep total in sync
                      if (lineTotal !== (parseFloat(l.total)||0)) {
                        setTimeout(() => setLines(ls => ls.map((x,j) => j===i ? {...x, total: lineTotal} : x)), 0);
                      }
                      return (
                        <div key={l.id||i}>
                          {l.hasDualRate && (
                            <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px", marginBottom:6, background:"rgba(232,184,78,0.08)", border:"1px solid var(--accent-dim)", borderRadius:3, fontSize:11.5, color:"var(--accent)" }}>
                              <AlertTriangle size={12}/>
                              <span><strong>Dual rate available:</strong> Billing per pallet. {l.altDesc}</span>
                            </div>
                          )}
                          <div style={{ display: "grid", gridTemplateColumns: "1.8fr 110px 120px 110px auto", gap: 10, alignItems: "start" }}>
                            <div>
                              <input className="input" value={l.description||l.equipment||""} placeholder="Description"
                                onChange={e => { setLines(ls => ls.map((x,j) => j===i?{...x,description:e.target.value}:x)); markModified(dir+"Handling"); }}
                                style={{ fontSize: 12 }}/>
                              <select className="select" value={l.unitLabel||"Per Pallet"}
                                onChange={e => { setLines(ls => ls.map((x,j) => j===i?{...x,unitLabel:e.target.value}:x)); markModified(dir+"Handling"); }}
                                style={{ fontSize: 11, padding: "4px 8px", marginTop: 4 }}>
                                <option value="Per Pallet">Per Pallet</option>
                                <option value="Per Shipment">Per Shipment</option>
                                <option value="Per Hour">Per Hour</option>
                                <option value="Per Day">Per Day</option>
                                <option value="Flat Fee">Flat Fee</option>
                              </select>
                              {l.itemBreakdown && l.itemBreakdown.length > 0 && (
                                <div style={{ fontSize:10, color:"var(--text-faint)", marginTop:3, lineHeight:1.5 }}>
                                  {l.itemBreakdown.map((d,bi) => <div key={bi}>{d}</div>)}
                                </div>
                              )}
                            </div>
                            <div className="dollar-input-wrap">
                              <input type="number" min="0" step="0.01" className="input input-mono input-no-spin"
                                value={l.ratePerUnit||""}
                                onChange={e => { setLines(ls => ls.map((x,j) => j===i?{...x,ratePerUnit:parseFloat(e.target.value)||0,total:(parseFloat(e.target.value)||0)*(parseFloat(l.units)||1)}:x)); markModified(dir+"Handling"); }}
                                style={{ textAlign:"right" }}/>
                            </div>
                            <input type="number" min="0" step="1" className="input input-mono input-no-spin"
                              value={l.units||""} placeholder="1"
                              onChange={e => { setLines(ls => ls.map((x,j) => j===i?{...x,units:parseFloat(e.target.value)||1,total:(parseFloat(l.ratePerUnit)||0)*(parseFloat(e.target.value)||1)}:x)); markModified(dir+"Handling"); }}/>
                            <div style={{ padding:"9px 11px", background:"var(--bg-2)", border:"1px solid var(--border-mid)", borderRadius:4, fontFamily:"'Geist Mono', monospace", fontSize:13, color:"var(--accent)", textAlign:"right" }}>
                              {fmtMoney(rate * units)}
                            </div>
                            <button className="btn btn-ghost btn-xs" onClick={() => { setLines(ls => ls.filter((_,j)=>j!==i)); markModified(dir+"Handling"); }}
                              style={{ color:"var(--warning)", marginTop:2 }}><Trash2 size={12}/></button>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{ display: "flex", justifyContent: "flex-end", paddingTop: 10, borderTop: "1px solid var(--border)" }}>
                      <span style={{ fontSize: 12, color: "var(--text-mid)", marginRight: 10 }}>{dir === "inbound" ? "Inbound" : "Outbound"} Total</span>
                      <span style={{ fontFamily: "'Geist Mono', monospace", fontSize: 14, fontWeight: 600, color: "var(--accent)" }}>{fmtMoney(lines.reduce((s,l)=>{const r=parseFloat(l.ratePerUnit)||0;const u=parseFloat(l.units)||1;return s+r*u;},0))}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {/* Insurance */}
          <div className="panel" style={{ padding: 20 }}>
            <div className="eyebrow-bright" style={{ marginBottom: 14 }}>
              Insurance {insuranceRateModified && <ModifiedBadge/>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              <div>
                <div className="field-label">Cost per $1,000 Value</div>
                <input type="number" min="0" step="0.01" className="input input-mono" value={insuranceRate}
                  onChange={e => { setInsuranceRate(parseFloat(e.target.value)||0); setInsuranceRateModified(true); markModified("insuranceRate"); }}/>
                <div style={{ fontSize: 10.5, color: "var(--text-faint)", marginTop: 3 }}>
                  Pre-filled from Procurement ({fmtMoney(defaultInsurance)}/k)
                </div>
              </div>
              <div>
                <div className="field-label">Total Declared Value</div>
                <input type="number" min="0" className="input input-mono" value={declaredValue}
                  onChange={e => { setDeclaredValue(parseFloat(e.target.value)||0); markModified("declaredValue"); }}/>
                <div style={{ fontSize: 10.5, color: "var(--text-faint)", marginTop: 3 }}>
                  Auto-summed from items ({fmtMoney(defaultDeclaredValue)})
                </div>
              </div>
            </div>
            <div style={{ marginTop: 10, fontSize: 12, color: "var(--text-mid)" }}>
              Insurance total: <span style={{ fontFamily: "'Geist Mono', monospace", color: "var(--accent)" }}>{fmtMoney(insuranceCost)}</span>
            </div>
          </div>

          {/* Add-ons */}
          <div className="panel" style={{ padding: 20 }}>
            <div className="eyebrow-bright" style={{ marginBottom: 14 }}>Optional Line Items</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

              {/* Personnel */}
              <div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", marginBottom: showPersonnel ? 10 : 0 }}>
                  <input type="checkbox" checked={showPersonnel} onChange={e => setShowPersonnel(e.target.checked)} style={{ accentColor: "var(--accent)" }}/>
                  <span style={{ fontSize: 13, color: "var(--text-mid)", fontWeight: 500 }}>Contracted Personnel</span>
                </label>
                {showPersonnel && (
                  <div style={{ marginLeft: 24 }}>
                    {personnelLines.map((l, i) => (
                      <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 120px auto", gap: 8, marginBottom: 6 }}>
                        <input className="input" value={l.desc||""} placeholder="Role / description"
                          onChange={e => setPersonnelLines(ls => ls.map((x,j)=>j===i?{...x,desc:e.target.value}:x))}
                          style={{ fontSize: 12 }}/>
                        <input type="number" min="0" className="input input-mono" value={l.cost||""} placeholder="Cost"
                          onChange={e => setPersonnelLines(ls => ls.map((x,j)=>j===i?{...x,cost:parseFloat(e.target.value)||0}:x))}/>
                        <button className="btn btn-ghost btn-xs" onClick={() => setPersonnelLines(ls=>ls.filter((_,j)=>j!==i))} style={{ color:"var(--warning)" }}><Trash2 size={12}/></button>
                      </div>
                    ))}
                    <button className="btn btn-ghost btn-xs" onClick={() => setPersonnelLines(l=>[...l,{desc:"",cost:0}])}>+ Add person</button>
                  </div>
                )}
              </div>

              {/* Equipment */}
              <div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", marginBottom: showEquipment ? 10 : 0 }}>
                  <input type="checkbox" checked={showEquipment} onChange={e => setShowEquipment(e.target.checked)} style={{ accentColor: "var(--accent)" }}/>
                  <span style={{ fontSize: 13, color: "var(--text-mid)", fontWeight: 500 }}>Additional Equipment</span>
                </label>
                {showEquipment && (
                  <div style={{ marginLeft: 24 }}>
                    {equipmentLines.map((l, i) => (
                      <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 120px auto", gap: 8, marginBottom: 6 }}>
                        <input className="input" value={l.desc||""} placeholder="Equipment / description"
                          onChange={e => setEquipmentLines(ls => ls.map((x,j)=>j===i?{...x,desc:e.target.value}:x))}
                          style={{ fontSize: 12 }}/>
                        <input type="number" min="0" className="input input-mono" value={l.cost||""} placeholder="Cost"
                          onChange={e => setEquipmentLines(ls => ls.map((x,j)=>j===i?{...x,cost:parseFloat(e.target.value)||0}:x))}/>
                        <button className="btn btn-ghost btn-xs" onClick={() => setEquipmentLines(ls=>ls.filter((_,j)=>j!==i))} style={{ color:"var(--warning)" }}><Trash2 size={12}/></button>
                      </div>
                    ))}
                    <button className="btn btn-ghost btn-xs" onClick={() => setEquipmentLines(l=>[...l,{desc:"",cost:0}])}>+ Add equipment</button>
                  </div>
                )}
              </div>

              {/* YoY Escalation */}
              <div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                  <input type="checkbox" checked={showEscalation} onChange={e => setShowEscalation(e.target.checked)} style={{ accentColor: "var(--accent)" }}/>
                  <span style={{ fontSize: 13, color: "var(--text-mid)", fontWeight: 500 }}>Year-over-Year Escalation</span>
                  {showEscalation && (
                    <Fragment>
                      <input type="number" min="0" max="20" step="0.5" className="input input-mono"
                        value={escalationPct} onChange={e => setEscalationPct(parseFloat(e.target.value)||0)}
                        style={{ width: 70, marginLeft: 8 }}/>
                      <span style={{ fontSize: 12, color: "var(--text-dim)" }}>% annual increase</span>
                    </Fragment>
                  )}
                </label>
              </div>
            </div>
          </div>

          {/* Notes */}
          <div className="panel" style={{ padding: 20 }}>
            <div className="eyebrow-bright" style={{ marginBottom: 10 }}>Quote Notes (internal)</div>
            <textarea className="textarea" value={notes} onChange={e => setNotes(e.target.value)}
              placeholder="Internal notes — not shown on customer quote..."
              style={{ minHeight: 80 }}/>
          </div>

          {/* Disclaimers & Assumptions */}
          <div className="panel" style={{ padding: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div className="eyebrow-bright">
                <Tooltip content="Appears as a section at the bottom of the customer PDF quote. Pre-filled from what Procurement entered — edit freely before export.">
                  <span>Disclaimers & Assumptions</span>
                </Tooltip>
              </div>
              <span style={{ fontSize: 10.5, color: "var(--text-faint)" }}>— appears on customer PDF</span>
              <div style={{ flex: 1 }}/>
              <button className="btn btn-ghost btn-xs" type="button"
                onClick={() => {
                  if (request.procurement?.disclaimers) {
                    setDisclaimers(request.procurement.disclaimers);
                    markModified("disclaimers");
                  }
                }}
                style={{ fontSize: 10.5 }}>
                <RotateCcw size={11}/> Pull from Procurement
              </button>
              <button className="btn btn-ghost btn-xs" type="button"
                onClick={async () => {
                  const list = await loadDefaultAssumptions();
                  const active = (list || []).filter(a => a.active).map(a => a.text);
                  if (active.length > 0) {
                    setDisclaimers(active.map(t => "• " + t).join("\n"));
                    markModified("disclaimers");
                  }
                }}
                style={{ fontSize: 10.5 }}>
                <RotateCcw size={11}/> From admin defaults
              </button>
            </div>
            <textarea className="textarea" value={disclaimers}
              onChange={e => { setDisclaimers(e.target.value); markModified("disclaimers"); }}
              placeholder="Pulled from Procurement — edit for this quote before export."
              style={{ minHeight: 110, fontSize: 12.5, lineHeight: 1.6 }}/>
          </div>

          {/* Save button */}
          <div style={{ display: "flex", gap: 12 }}>
            <button className="btn btn-primary" onClick={handleSave} style={{ flex: 1, justifyContent: "center" }}>
              {saved ? <Fragment><Check size={14}/> Saved</Fragment> : <Fragment><Save size={14}/> Save Quote</Fragment>}
            </button>
          </div>
        </div>

        {/* Right — live preview */}
        <div style={{ position: "sticky", top: 80 }}>
          <QuotePreview
            request={request}
            schedule={schedule}
            storageRate={storageRate}
            storageCost={storageCost}
            inboundLines={inboundLines}
            inboundTotal={inboundTotal}
            outboundLines={outboundLines}
            outboundTotal={outboundTotal}
            insuranceCost={insuranceCost}
            personnelLines={showPersonnel ? personnelLines : []}
            equipmentLines={showEquipment ? equipmentLines : []}
            escalation={showEscalation ? escalationPct : null}
            subtotal={subtotal}
            total={total}
            notes={notes}
            globalHalo={globalHalo}
            showMonthlyBreakdown={showMonthlyBreakdown}
            setShowMonthlyBreakdown={setShowMonthlyBreakdown}
            indoorRate={indoorRate}
            outdoorRate={outdoorRate}
            disclaimers={disclaimers}
          />
        </div>
      </div>
    </div>
  );
}

// Customer-facing quote preview + export
function QuotePreview({ request, schedule, storageRate, storageCost, inboundLines, inboundTotal, outboundLines, outboundTotal, insuranceCost, personnelLines, equipmentLines, escalation, subtotal, total, notes, globalHalo, showMonthlyBreakdown, setShowMonthlyBreakdown, indoorRate, outdoorRate, disclaimers }) {
  const { csr } = request;
  const today = new Date().toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });

  const exportCSV = () => {
    const rows = [
      ["SOLVR — Customer Quote"],
      ["Quote ID", request.id],
      ["Customer", csr.customerName],
      ["Prepared", today],
      [],
      ["STORAGE SCHEDULE"],
      ["Month", "Square Footage", "Rate/sqft/mo", "Total"],
      ...schedule.map(m => [m.label, m.sqft, storageRate, fmtMoney(m.sqft * storageRate)]),
      ["", "", "Storage Subtotal", fmtMoney(storageCost)],
      [],
      ["INBOUND HANDLING", "", "", fmtMoney(inboundTotal)],
      ["OUTBOUND HANDLING", "", "", fmtMoney(outboundTotal)],
      [],
      ["INSURANCE", "", "", fmtMoney(insuranceCost)],
      ...(personnelLines.length ? [["PERSONNEL"], ...personnelLines.map(l=>[l.desc,"","",fmtMoney(l.cost)])] : []),
      ...(equipmentLines.length ? [["EQUIPMENT"], ...equipmentLines.map(l=>[l.desc,"","",fmtMoney(l.cost)])] : []),
      [],
      ["TOTAL PROJECT COST", "", "", fmtMoney(total)],
    ];
    const csv = rows.map(r => r.map(c => `"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${request.id}_quote.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const exportPDF = () => {
    // Inline money formatter — needed because PDF opens in a new window context
    const fmt = (n) => {
      const v = parseFloat(n);
      if (isNaN(v)) return "—";
      return v.toLocaleString("en-US", { style:"currency", currency:"USD", maximumFractionDigits:2 });
    };

    // Group handling lines by direction and equipment type for PDF output
    const lineAmt = (l) => {
      const byRate = (parseFloat(l.ratePerUnit)||0) * (parseFloat(l.units)||1);
      if (byRate > 0) return byRate;
      if (parseFloat(l.total) > 0) return parseFloat(l.total);
      return 0;
    };
    // Group by equipment + preserve unit label ("Per Pallet", "Per Shipment", etc.)
    const groupLines = (lines) => {
      const out = {};
      lines.forEach(l => {
        const amt = lineAmt(l);
        if (amt <= 0) return;
        const key = l.description || l.equipment || "Handling";
        if (!out[key]) out[key] = { total: 0, unitLabel: l.unitLabel || "" };
        out[key].total += amt;
        if (!out[key].unitLabel && l.unitLabel) out[key].unitLabel = l.unitLabel;
      });
      return out;
    };
    const inboundByType = groupLines(inboundLines);
    const outboundByType = groupLines(outboundLines);
    const inboundSum = Object.values(inboundByType).reduce((s,v)=>s+v.total,0) || inboundTotal || 0;
    const outboundSum = Object.values(outboundByType).reduce((s,v)=>s+v.total,0) || outboundTotal || 0;
    if (inboundSum > 0 && Object.keys(inboundByType).length === 0) inboundByType["Handling"] = { total: inboundSum, unitLabel: "" };
    if (outboundSum > 0 && Object.keys(outboundByType).length === 0) outboundByType["Handling"] = { total: outboundSum, unitLabel: "" };

    const win = window.open("", "_blank");
    if (!win) { alert("Pop-up blocked — please allow pop-ups for this site."); return; }

    const storageSection = showMonthlyBreakdown
      ? `<table>
          <thead><tr><th>Month</th><th class="right">Type</th><th class="right">Sq Ft</th><th class="right">Rate / sqft / mo</th><th class="right">Total</th></tr></thead>
          <tbody>
            ${schedule.map(m=>{
              const r = m.storageType==="outdoor" ? (outdoorRate||indoorRate||storageRate||0) : (indoorRate||outdoorRate||storageRate||0);
              return `<tr><td>${m.label}</td><td style="text-align:right;font-size:10px;text-transform:uppercase;color:#8a7060">${m.storageType||"indoor"}</td><td class="right mono">${Math.ceil(m.sqft).toLocaleString()}</td><td class="right mono">${fmt(r)}</td><td class="right mono">${fmt(m.sqft*r)}</td></tr>`;
            }).join("")}
            <tr class="subtotal"><td colspan="4">Storage Total</td><td class="right mono">${fmt(storageCost)}</td></tr>
          </tbody>
        </table>`
      : `<table><tbody><tr><td>Storage (${schedule.length} month${schedule.length!==1?"s":""}${globalHalo>0?`, incl. ${globalHalo}% Halo`:""})</td><td class="right mono">${fmt(storageCost)}</td></tr></tbody></table>`;

    // Clean handling label: strip trailing " Handling" so "Forklift Handling" → "Forklift"
    // then template as "Inbound Forklift Handling" (no double "Handling")
    const cleanLabel = (k) => String(k || "").replace(/\s+Handling\s*$/i, "").trim();

    // Build handling label with billing basis suffix: "Inbound Forklift Handling (per pallet)"
    const buildHandlingLabel = (direction, rawKey, unitLabel) => {
      const name = cleanLabel(rawKey);
      const dir = direction === "inbound" ? "Inbound" : "Outbound";
      const base = name && name.toLowerCase() !== "handling" ? `${dir} ${name} Handling` : `${dir} Handling`;
      const basis = unitLabel ? ` (${unitLabel.toLowerCase()})` : "";
      return base + basis;
    };

    const inboundSection = inboundSum > 0
      ? `<h2>Inbound Handling</h2><table><tbody>
          ${Object.entries(inboundByType).filter(([,v])=>v.total>0).map(([k,v])=>{
            return `<tr><td>${buildHandlingLabel("inbound", k, v.unitLabel)}</td><td class="right mono">${fmt(v.total)}</td></tr>`;
          }).join("")}
          ${Object.values(inboundByType).filter(v=>v.total>0).length>1?`<tr class="subtotal"><td>Inbound Total</td><td class="right mono">${fmt(inboundSum)}</td></tr>`:""}
        </tbody></table>` : "";

    const outboundSection = outboundSum > 0
      ? `<h2>Outbound Handling</h2><table><tbody>
          ${Object.entries(outboundByType).filter(([,v])=>v.total>0).map(([k,v])=>{
            return `<tr><td>${buildHandlingLabel("outbound", k, v.unitLabel)}</td><td class="right mono">${fmt(v.total)}</td></tr>`;
          }).join("")}
          ${Object.values(outboundByType).filter(v=>v.total>0).length>1?`<tr class="subtotal"><td>Outbound Total</td><td class="right mono">${fmt(outboundSum)}</td></tr>`:""}
        </tbody></table>` : "";

    win.document.write(`<!DOCTYPE html><html><head><title>Quote ${request.id}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Georgia',serif; color:#1a1407; background:white; padding:48px; max-width:800px; margin:0 auto; }
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:40px; padding-bottom:24px; border-bottom:2px solid #E8B84E; }
  .brand { font-size:28px; font-weight:700; letter-spacing:0.06em; color:#1a1407; }
  .brand span { color:#E8B84E; }
  .brand-sub { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#8a7060; margin-top:3px; }
  .quote-meta { text-align:right; font-size:12px; color:#5a4a3a; }
  .quote-meta .id { font-size:16px; font-weight:700; color:#1a1407; font-family:'Courier New',monospace; }
  h2 { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#8a7060; margin:28px 0 12px; padding-bottom:6px; border-bottom:1px solid #e8ddd0; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 10px; background:#f8f4ee; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#8a7060; font-weight:600; }
  td { padding:9px 10px; border-bottom:1px solid #f0e8dc; }
  td.mono { font-family:'Courier New',monospace; }
  td.right { text-align:right; }
  th.right { text-align:right; }
  tr.subtotal td { font-weight:600; background:#fdf8f0; border-top:1px solid #e8ddd0; }
  .total-row { margin-top:32px; padding:16px 20px; background:#1a1407; border-radius:4px; display:flex; justify-content:space-between; align-items:center; }
  .total-row .label { color:#c4b89a; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; }
  .total-row .amount { color:#E8B84E; font-size:22px; font-family:'Courier New',monospace; font-weight:700; }
  .footer { margin-top:48px; padding-top:16px; border-top:1px solid #e8ddd0; font-size:11px; color:#8a7060; }
  .escalation-note { margin-top:16px; padding:12px 16px; background:#fdf8f0; border-left:3px solid #E8B84E; font-size:12px; color:#5a4a3a; }
</style></head><body>
  <div class="header">
    <div>
      <div class="brand">SOLVR<span>.</span></div>
      <div class="brand-sub">Warehouse Quote Platform</div>
    </div>
    <div class="quote-meta">
      <div class="id">${request.id}</div>
      <div style="margin-top:6px">${csr.customerName}</div>
      <div style="margin-top:2px">Prepared ${today}</div>
      <div style="margin-top:2px">${csr.locationCity||""}${csr.locationState?", "+csr.locationState:""}</div>
    </div>
  </div>

  <h2>Storage</h2>
  ${globalHalo>0&&showMonthlyBreakdown?`<p style="font-size:11px;color:#8a7060;margin:0 0 10px;font-style:italic">Incl. ${globalHalo}% required Halo</p>`:""}
  ${storageSection}

  ${inboundSection}
  ${outboundSection}

  <h2>Insurance</h2>
  <table><tbody><tr><td>Property Insurance</td><td class="right mono">${fmt(insuranceCost)}</td></tr></tbody></table>

  ${personnelLines.length?`<h2>Contracted Personnel</h2><table><tbody>${personnelLines.map(l=>`<tr><td>${l.desc}</td><td class="right mono">${fmt(l.cost)}</td></tr>`).join("")}</tbody></table>`:""}
  ${equipmentLines.length?`<h2>Equipment</h2><table><tbody>${equipmentLines.map(l=>`<tr><td>${l.desc}</td><td class="right mono">${fmt(l.cost)}</td></tr>`).join("")}</tbody></table>`:""}

  ${escalation?`<div class="escalation-note">This quote includes a ${escalation}% year-over-year cost escalation for multi-year engagements.</div>`:""}

  <div class="total-row">
    <div class="label">Total Project Cost</div>
    <div class="amount">${fmt(total)}</div>
  </div>

  ${disclaimers && disclaimers.trim() ? `<div class="disclaimers">
    <h2 style="margin-top:28px">Assumptions &amp; Disclaimers</h2>
    <div style="font-size:11.5px;line-height:1.7;color:#5a4a3a;white-space:pre-wrap">${String(disclaimers).replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
  </div>` : ""}

  <div class="footer">
    Quote generated via SOLVR · ${today} · Reference: ${request.id}<br>
    This document is confidential and intended solely for ${csr.customerName}.
  </div>
</body></html>`);
    win.document.close();
    setTimeout(() => { win.focus(); win.print(); }, 500);
  };

  return (
    <div className="panel" style={{ padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
        <div className="eyebrow-bright">Customer Quote Preview</div>
        <div style={{ flex: 1 }}/>
        <button className="btn btn-ghost btn-xs" onClick={exportCSV} style={{ gap: 5 }}>
          <Files size={12}/> CSV
        </button>
        <button className="btn btn-primary btn-xs" onClick={exportPDF} style={{ gap: 5 }}>
          <FileText size={12}/> PDF
        </button>
      </div>

      {/* Monthly breakdown toggle */}
      {setShowMonthlyBreakdown && (
        <label style={{ display:"flex", alignItems:"center", gap:7, marginBottom:14, cursor:"pointer" }}>
          <input type="checkbox" checked={showMonthlyBreakdown||false}
            onChange={e => setShowMonthlyBreakdown(e.target.checked)}
            style={{ accentColor:"var(--accent)" }}/>
          <span style={{ fontSize:11.5, color:"var(--text-dim)" }}>Show monthly storage breakdown in PDF</span>
          {!showMonthlyBreakdown && <span style={{ fontSize:10.5, color:"var(--text-faint)" }}>(PDF will show storage total only)</span>}
        </label>
      )}

      {/* Mini preview */}
      <div style={{ fontSize: 11, color: "var(--text-faint)", marginBottom: 14 }}>
        {csr.customerName} · {request.id}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
        {schedule.length > 0 && (
          <div style={{ marginBottom: 12 }}>
            <div className="eyebrow" style={{ marginBottom: 6 }}>Storage</div>
            {schedule.map(m => (
              <div key={m.key} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "3px 0", borderBottom: "1px solid var(--border)" }}>
                <span style={{ color: "var(--text-mid)" }}>{m.label}</span>
                <span style={{ fontFamily: "'Geist Mono', monospace", color: "var(--text)" }}>{fmtMoney(m.sqft * storageRate)}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, padding: "4px 0", color: "var(--text-dim)" }}>
              <span>Storage Total</span>
              <span style={{ fontFamily: "'Geist Mono', monospace" }}>{fmtMoney(storageCost)}</span>
            </div>
          </div>
        )}

        {inboundTotal > 0 && (
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "1px solid var(--border)" }}>
            <span style={{ color: "var(--text-mid)" }}>Inbound Handling</span>
            <span style={{ fontFamily: "'Geist Mono', monospace" }}>{fmtMoney(inboundTotal)}</span>
          </div>
        )}
        {outboundTotal > 0 && (
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "1px solid var(--border)" }}>
            <span style={{ color: "var(--text-mid)" }}>Outbound Handling</span>
            <span style={{ fontFamily: "'Geist Mono', monospace" }}>{fmtMoney(outboundTotal)}</span>
          </div>
        )}
        {insuranceCost > 0 && (

        {personnelLines.filter(l=>l.cost>0).map((l,i) => (

            <span style={{ color: "var(--text-mid)" }}>{l.desc || "Personnel"}</span>
            <span style={{ fontFamily: "'Geist Mono', monospace" }}>{fmtMoney(l.cost)}</span>
          </div>
        ))}
        {equipmentLines.filter(l=>l.cost>0).map((l,i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "4px 0", borderBottom: "1px solid var(--border)" }}>
            <span style={{ color: "var(--text-mid)" }}>{l.desc || "Equipment"}</span>
            <span style={{ fontFamily: "'Geist Mono', monospace" }}>{fmtMoney(l.cost)}</span>
          </div>
        ))}

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 12, padding: "12px 14px", background: "var(--panel-hi)", borderRadius: 3, border: "1px solid var(--border-hi)" }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>Total Project Cost</span>
          <span style={{ fontFamily: "'Geist Mono', monospace", fontSize: 16, fontWeight: 700, color: "var(--accent)" }}>{fmtMoney(total)}</span>
        </div>
      </div>
    </div>
  );
}

function TrackerView({ request, role, onBack, userName, onAddNote, onAddAttachments, onRemoveAttachment, onArchive, onUnarchive, onDelete }) {
  const stages = [
    {
      key: "csr",
      num: 1,
      label: "CSR Request",
      done: !!request.csr.submittedAt && request.status !== "revision_csr",
      who: request.csr.submittedBy,
      when: request.csr.submittedAt,
      active: ["draft_csr", "revision_csr"].includes(request.status),
    },
    {
      key: "procurement",
      num: 2,
      label: "Procurement Quote",
      done: !!request.procurement.submittedAt,
      who: request.procurement.submittedBy,
      when: request.procurement.submittedAt,
      active: ["awaiting_procurement", "draft_procurement", "follow_up"].includes(request.status),
    },
    {
      key: "finance",
      num: 3,
      label: "Finance Decision",
      done: ["approved", "archived"].includes(request.status) || request.finance.decision === "follow_up",
      who: request.finance.decidedBy,
      when: request.finance.decidedAt,
      active: request.status === "awaiting_finance",
      decision: request.finance.decision,
    },
  ];

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13} /> Back
      </button>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
        <div className="font-mono" style={{ fontSize: 12, color: "var(--text-dim)" }}>{request.id}</div>
        <StatusBadge status={request.status} />
      </div>

      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        {request.csr.customerName || <span className="font-italic-serif" style={{ color: "var(--text-faint)" }}>Unnamed request</span>}
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, marginTop: 6, marginBottom: 24 }}>
        {request.csr.locationCity}{request.csr.locationState ? ", " + request.csr.locationState : ""} · {fmtDate(request.csr.storageStartDate)} → {fmtDate(request.csr.storageEndDate)}
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* Stage tracker */}
      <div className="panel" style={{ padding: 20, marginBottom: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 20px 1fr 20px 1fr", gap: 0, alignItems: "center" }}>
          {stages.map((s, i) => (
            <Fragment key={s.key}>
              <StageTracker stage={s} />
              {i < stages.length - 1 && (
                <div style={{ display: "flex", justifyContent: "center" }}>
                  <ArrowRight size={14} style={{ color: "var(--text-faint)" }} />
                </div>
              )}
            </Fragment>
          ))}
        </div>
      </div>

      {/* Follow up notes alert */}
      {request.finance.decision === "follow_up" && request.finance.followUpNotes && (
        <div className="panel-inset" style={{ padding: 16, marginBottom: 20, borderColor: "var(--warning-dim)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <AlertCircle size={15} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>Follow-up Requested by Finance</div>
          </div>
          <div style={{ fontSize: 13, color: "var(--text)", whiteSpace: "pre-wrap" }}>{request.finance.followUpNotes}</div>
          <div style={{ marginTop: 8, fontSize: 11.5, color: "var(--text-dim)", fontFamily: "'Geist Mono', monospace" }}>
            — {request.finance.decidedBy}, {fmtDateTime(request.finance.decidedAt)}
          </div>
        </div>
      )}

      {/* Read-only sections */}
      <div className="panel" style={{ padding: 0, marginBottom: 18, overflow: "hidden" }}>
        <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10 }}>
          <UserCircle size={14} style={{ color: "var(--accent)" }} />
          <StageMarker num={1} label="CSR Request" />
        </div>
        <div style={{ padding: 20 }}>
          <CsrReadonlyView request={request} />
        </div>
      </div>

      {(request.procurement.submittedAt || ["draft_procurement"].includes(request.status)) && (
        <div className="panel" style={{ padding: 0, marginBottom: 18, overflow: "hidden", borderColor: "var(--cool-dim)" }}>
          <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10 }}>
            <Truck size={14} style={{ color: "var(--cool)" }} />
            <StageMarker num={2} label="Procurement Offer" />
          </div>
          <div style={{ padding: 20 }}>
            <ProcurementReadonlyView request={request} />
          </div>
        </div>
      )}

      {request.status === "approved" && (() => {
        const totalFp = totalFootprint(request.csr.items);
        const sqft = parseFloat(request.procurement.squareFootage) || 0;
        const utilization = totalFp > 0 && sqft > 0 ? (totalFp / sqft) * 100 : null;
        const okCap = request.procurement.capacityConfirmed === "yes";
        const noCap = request.procurement.capacityConfirmed === "no";
        const borderColor = okCap ? "var(--success-dim)" : noCap ? "var(--warning-dim)" : "var(--border-mid)";
        const utilColor = utilization === null ? "var(--text-faint)"
          : utilization <= 80 ? "var(--success)"
          : utilization <= 100 ? "var(--warning)"
          : "var(--danger)";

        return (
          <div className="panel" style={{ padding: 20, marginBottom: 18, borderColor }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <CheckCircle2 size={16} style={{ color: "var(--success)" }} />
              <div className="eyebrow-bright" style={{ color: "var(--success)" }}>Finance Approved</div>
              <div style={{ flex: 1 }} />
              <div className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
                {request.finance.decidedBy} · {fmtDateTime(request.finance.decidedAt)}
              </div>
            </div>

            {/* Capacity attestation */}
            <div className="panel-inset" style={{ padding: "14px 16px", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                {okCap
                  ? <CheckCircle2 size={14} style={{ color: "var(--success)" }} />
                  : noCap
                    ? <AlertTriangle size={14} style={{ color: "var(--warning)" }} />
                    : <AlertCircle size={14} style={{ color: "var(--text-dim)" }} />}
                <div style={{ fontSize: 13, fontWeight: 500, color: okCap ? "var(--success)" : noCap ? "var(--warning)" : "var(--text-dim)" }}>
                  {okCap
                    ? "Capacity confirmed by Procurement"
                    : noCap
                      ? "Capacity flagged as insufficient by Procurement"
                      : "Capacity not confirmed"}
                </div>
                <div style={{ flex: 1 }} />
                {request.procurement.submittedBy && (
                  <div className="font-mono" style={{ fontSize: 10.5, color: "var(--text-faint)" }}>
                    attested by {request.procurement.submittedBy}
                  </div>
                )}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: "1px solid var(--border)", borderRadius: 3, overflow: "hidden" }}>
                <div style={{ padding: "8px 12px", borderRight: "1px solid var(--border)" }}>
                  <div className="eyebrow" style={{ marginBottom: 3 }}>Footprint</div>
                  <div className="font-mono" style={{ fontSize: 13 }}>{totalFp > 0 ? totalFp.toFixed(1) + " ft²" : "—"}</div>
                </div>
                <div style={{ padding: "8px 12px", borderRight: "1px solid var(--border)" }}>
                  <div className="eyebrow" style={{ marginBottom: 3 }}>Facility</div>
                  <div className="font-mono" style={{ fontSize: 13 }}>{sqft > 0 ? fmtNum(sqft) + " ft²" : "—"}</div>
                </div>
                <div style={{ padding: "8px 12px" }}>
                  <div className="eyebrow" style={{ marginBottom: 3 }}>Utilization</div>
                  <div className="font-mono" style={{ fontSize: 13, color: utilColor }}>
                    {utilization !== null ? utilization.toFixed(0) + "%" : "—"}
                  </div>
                </div>
              </div>
            </div>

            <div style={{ fontSize: 13, color: "var(--text-mid)" }}>
              {okCap
                ? "Finance will build the customer-facing quote from the data above."
                : noCap
                  ? "Finance approved the commercial terms, but Procurement flagged capacity. Resolve before quoting."
                  : "Finance approved, but no capacity attestation exists from Procurement. Recommend confirming before quoting."}
            </div>
          </div>
        );
      })()}

      {/* Archived banner */}
      {request.status === "archived" && (
        <div className="panel" style={{ padding: 20, marginBottom: 18, borderColor: "var(--border-mid)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Inbox size={16} style={{ color: "var(--text-dim)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--text-dim)" }}>Archived</div>
            <div style={{ flex: 1 }} />
            <div className="font-mono" style={{ fontSize: 11, color: "var(--text-faint)" }}>
              {fmtDateTime(request.updatedAt)}
            </div>
          </div>
          <div style={{ fontSize: 13, color: "var(--text-dim)", marginTop: 8 }}>
            This request has been archived by Finance. It can be restored if needed.
          </div>
        </div>
      )}

      {/* CSR Revision banner */}
      {request.status === "revision_csr" && request.csrRevision?.notes && (
        <div className="panel" style={{ padding: 20, marginBottom: 18, borderColor: "var(--warning-dim)", background: "rgba(232,155,111,0.04)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <AlertCircle size={16} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>
              Awaiting CSR Revision — sent by {request.csrRevision.requestedByRole === "finance" ? "Finance" : "Procurement"}
            </div>
            <div style={{ flex: 1 }} />
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
              {request.csrRevision.requestedBy} · {fmtDateTime(request.csrRevision.requestedAt)}
            </span>
          </div>
          <div style={{ fontSize: 13, color: "var(--text)", whiteSpace: "pre-wrap" }}>{request.csrRevision.notes}</div>
        </div>
      )}

      {/* Archive / Unarchive actions for Finance */}
      {request.status === "approved" && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginBottom: 16 }}>
          {onArchive && (
            <button className="btn" onClick={onArchive} style={{ color: "var(--text-dim)" }}>
              <Inbox size={14} /> Archive this request
            </button>
          )}
          {onDelete && (
            <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
              <Trash2 size={12} /> Delete
            </button>
          )}
        </div>
      )}
      {onUnarchive && request.status === "archived" && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginBottom: 16 }}>
          <button className="btn" onClick={onUnarchive} style={{ color: "var(--success)" }}>
            <RotateCcw size={14} /> Restore from archive
          </button>
          {onDelete && (
            <button className="btn" onClick={onDelete} style={{ color: "var(--danger)" }}>
              <Trash2 size={14} /> Delete permanently
            </button>
          )}
        </div>
      )}

      {onDelete && !["approved", "archived"].includes(request.status) && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        </div>
      )}

      <SharedAttachments request={request} userName={userName} role={role} onAdd={onAddAttachments} onRemove={onRemoveAttachment} />
      <SharedNotesPanel request={request} role={role} userName={userName} onAddNote={onAddNote} />
      <ChangeLogPanel request={request} />
    </div>
  );
}

function StageTracker({ stage }) {
  const color = stage.done ? "var(--success)"
              : stage.active ? "var(--accent)"
              : "var(--text-faint)";
  const bg = stage.done ? "rgba(168,213,185,0.08)"
           : stage.active ? "rgba(232,184,78,0.08)"
           : "transparent";
  return (
    <div style={{
      padding: "14px 16px",
      border: `1px solid ${stage.active ? "var(--accent-dim)" : stage.done ? "var(--success-dim)" : "var(--border)"}`,
      background: bg,
      borderRadius: 4,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <div style={{
          width: 20, height: 20, borderRadius: "50%",
          border: `1px solid ${color}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          color,
          fontFamily: "'Geist Mono', monospace",
          fontSize: 11,
        }}>
          {stage.done ? <Check size={11} strokeWidth={3} /> : stage.num}
        </div>
        <div style={{ fontSize: 13, fontWeight: 500, color: stage.done || stage.active ? "var(--text)" : "var(--text-dim)" }}>{stage.label}</div>
      </div>
      <div style={{ fontSize: 11.5, color: "var(--text-dim)", fontFamily: "'Geist Mono', monospace", marginLeft: 28 }}>
        {stage.done
          ? <>{stage.who || "—"} · {fmtDateTime(stage.when)}{stage.decision === "follow_up" ? " · returned" : ""}</>
          : stage.active
            ? <span style={{ color: "var(--accent)" }}>In progress</span>
            : "Pending"}
      </div>
    </div>
  );
}
