// ============================================================
// REQUEST DETAIL ROUTER
// ============================================================
function RequestDetail({ request, role, onBack, onUpdate, onDelete, userName }) {
  const status = request.status;

  const handleAddNote = async (note) => {
    const nextNotes = [...(request.sharedNotes || []), note];
    await onUpdate({ ...request, sharedNotes: nextNotes, updatedAt: new Date().toISOString() }, { silent: true });
  };

  const handleAddAttachments = async (files) => {
    const next = [...(request.sharedAttachments || []), ...files];
    await onUpdate({ ...request, sharedAttachments: next, updatedAt: new Date().toISOString() }, { silent: true });
  };

  const handleRemoveAttachment = async (id) => {
    const next = (request.sharedAttachments || []).filter(a => a.id !== id);
    await onUpdate({ ...request, sharedAttachments: next, updatedAt: new Date().toISOString() }, { silent: true });
  };

  const handleCsrSaveDraft = async (csrData) => {
    await onUpdate({ ...request, csr: csrData, status: "draft_csr", updatedAt: new Date().toISOString() });
  };
  const handleCsrSubmit = async (csrData) => {
    await onUpdate({
      ...request,
      csr: { ...csrData, submittedAt: new Date().toISOString() },
      status: "awaiting_procurement",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleProcSaveDraft = async (procData) => {
    await onUpdate({ ...request, procurement: procData, status: "draft_procurement", updatedAt: new Date().toISOString() });
  };
  const handleProcSubmit = async (procData) => {
    await onUpdate({
      ...request,
      procurement: { ...procData, submittedAt: new Date().toISOString() },
      status: "awaiting_finance",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleApprove = async ({ decidedBy }) => {
    await onUpdate({
      ...request,
      finance: { decision: "approved", followUpNotes: "", decidedBy, decidedAt: new Date().toISOString() },
      status: "approved",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleFollowUp = async ({ decidedBy, followUpNotes }) => {
    await onUpdate({
      ...request,
      finance: { decision: "follow_up", followUpNotes, decidedBy, decidedAt: new Date().toISOString() },
      status: "follow_up",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleRevisionCsr = async ({ requestedBy, requestedByRole, notes }) => {
    await onUpdate({
      ...request,
      csrRevision: { requestedBy, requestedAt: new Date().toISOString(), requestedByRole, notes },
      status: "revision_csr",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleArchive = async () => {
    await onUpdate({
      ...request,
      status: "archived",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleUnarchive = async () => {
    await onUpdate({
      ...request,
      status: "approved",
      updatedAt: new Date().toISOString(),
    });
  };

  const collabProps = { userName, onAddNote: handleAddNote, onAddAttachments: handleAddAttachments, onRemoveAttachment: handleRemoveAttachment, onDelete: onDelete ? () => onDelete(request.id) : null };

  // ---- CSR view ----
  if (role === "csr") {
    if (["draft_csr", "revision_csr"].includes(status)) {
      return <CSRForm request={request} onSaveDraft={handleCsrSaveDraft} onSubmit={handleCsrSubmit} onBack={onBack} role={role} {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
  }

  // ---- Procurement view ----
  if (role === "procurement") {
    if (["awaiting_procurement", "draft_procurement", "follow_up"].includes(status)) {
      return <ProcurementForm request={request} onSaveDraft={handleProcSaveDraft} onSubmit={handleProcSubmit} onRevisionCsr={handleRevisionCsr} onBack={onBack} role={role} {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
  }

  // ---- Finance view ----
  if (role === "finance") {
    if (status === "awaiting_finance") {
      return <FinanceReview request={request} onApprove={handleApprove} onFollowUp={handleFollowUp} onRevisionCsr={handleRevisionCsr} onBack={onBack} role={role} {...collabProps} />;
    }
    if (["approved", "archived"].includes(status)) {
      return <TrackerView request={request} role={role} onBack={onBack} onArchive={handleArchive} onUnarchive={handleUnarchive} {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
  }

  return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
}

// ============================================================
// TRACKER VIEW (read-only status view)
// ============================================================
function TrackerView({ request, role, onBack, userName, onAddNote, onAddAttachments, onRemoveAttachment, onArchive, onUnarchive, onDelete }) {
  const stages = [
    {
      key: "csr",
      num: 1,
      label: "CSR Request",
      done: !!request.csr.submittedAt && request.status !== "revision_csr",
      who: request.csr.submittedBy,
      when: request.csr.submittedAt,
      active: ["draft_csr", "revision_csr"].includes(request.status),
    },
    {
      key: "procurement",
      num: 2,
      label: "Procurement Quote",
      done: !!request.procurement.submittedAt,
      who: request.procurement.submittedBy,
      when: request.procurement.submittedAt,
      active: ["awaiting_procurement", "draft_procurement", "follow_up"].includes(request.status),
    },
    {
      key: "finance",
      num: 3,
      label: "Finance Decision",
      done: ["approved", "archived"].includes(request.status) || request.finance.decision === "follow_up",
      who: request.finance.decidedBy,
      when: request.finance.decidedAt,
      active: request.status === "awaiting_finance",
      decision: request.finance.decision,
    },
  ];

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13} /> Back
      </button>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
        <div className="font-mono" style={{ fontSize: 12, color: "var(--text-dim)" }}>{request.id}</div>
        <StatusBadge status={request.status} />
      </div>

      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        {request.csr.customerName || <span className="font-italic-serif" style={{ color: "var(--text-faint)" }}>Unnamed request</span>}
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, marginTop: 6, marginBottom: 24 }}>
        {request.csr.locationCity}{request.csr.locationState ? ", " + request.csr.locationState : ""} · {fmtDate(request.csr.storageStartDate)} → {fmtDate(request.csr.storageEndDate)}
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* Stage tracker */}
      <div className="panel" style={{ padding: 20, marginBottom: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 20px 1fr 20px 1fr", gap: 0, alignItems: "center" }}>
          {stages.map((s, i) => (
            <Fragment key={s.key}>
              <StageTracker stage={s} />
              {i < stages.length - 1 && (
                <div style={{ display: "flex", justifyContent: "center" }}>
                  <ArrowRight size={14} style={{ color: "var(--text-faint)" }} />
                </div>
              )}
            </Fragment>
          ))}
        </div>
      </div>

      {/* Follow up notes alert */}
      {request.finance.decision === "follow_up" && request.finance.followUpNotes && (
        <div className="panel-inset" style={{ padding: 16, marginBottom: 20, borderColor: "var(--warning-dim)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <AlertCircle size={15} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>Follow-up Requested by Finance</div>
          </div>
          <div style={{ fontSize: 13, color: "var(--text)", whiteSpace: "pre-wrap" }}>{request.finance.followUpNotes}</div>
          <div style={{ marginTop: 8, fontSize: 11.5, color: "var(--text-dim)", fontFamily: "'Geist Mono', monospace" }}>
            — {request.finance.decidedBy}, {fmtDateTime(request.finance.decidedAt)}
          </div>
        </div>
      )}

      {/* Read-only sections */}
      <div className="panel" style={{ padding: 0, marginBottom: 18, overflow: "hidden" }}>
        <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10 }}>
          <UserCircle size={14} style={{ color: "var(--accent)" }} />
          <StageMarker num={1} label="CSR Request" />
        </div>
        <div style={{ padding: 20 }}>
          <CsrReadonlyView request={request} />
        </div>
      </div>

      {(request.procurement.submittedAt || ["draft_procurement"].includes(request.status)) && (
        <div className="panel" style={{ padding: 0, marginBottom: 18, overflow: "hidden", borderColor: "var(--cool-dim)" }}>
          <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10 }}>
            <Truck size={14} style={{ color: "var(--cool)" }} />
            <StageMarker num={2} label="Procurement Offer" />
          </div>
          <div style={{ padding: 20 }}>
            <ProcurementReadonlyView request={request} />
          </div>
        </div>
      )}

      {request.status === "approved" && (() => {
        const totalFp = totalFootprint(request.csr.items);
        const sqft = parseFloat(request.procurement.squareFootage) || 0;
        const utilization = totalFp > 0 && sqft > 0 ? (totalFp / sqft) * 100 : null;
        const okCap = request.procurement.capacityConfirmed === "yes";
        const noCap = request.procurement.capacityConfirmed === "no";
        const borderColor = okCap ? "var(--success-dim)" : noCap ? "var(--warning-dim)" : "var(--border-mid)";
        const utilColor = utilization === null ? "var(--text-faint)"
          : utilization <= 80 ? "var(--success)"
          : utilization <= 100 ? "var(--warning)"
          : "var(--danger)";

        return (
          <div className="panel" style={{ padding: 20, marginBottom: 18, borderColor }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <CheckCircle2 size={16} style={{ color: "var(--success)" }} />
              <div className="eyebrow-bright" style={{ color: "var(--success)" }}>Finance Approved</div>
              <div style={{ flex: 1 }} />
              <div className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
                {request.finance.decidedBy} · {fmtDateTime(request.finance.decidedAt)}
              </div>
            </div>

            {/* Capacity attestation */}
            <div className="panel-inset" style={{ padding: "14px 16px", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                {okCap
                  ? <CheckCircle2 size={14} style={{ color: "var(--success)" }} />
                  : noCap
                    ? <AlertTriangle size={14} style={{ color: "var(--warning)" }} />
                    : <AlertCircle size={14} style={{ color: "var(--text-dim)" }} />}
                <div style={{ fontSize: 13, fontWeight: 500, color: okCap ? "var(--success)" : noCap ? "var(--warning)" : "var(--text-dim)" }}>
                  {okCap
                    ? "Capacity confirmed by Procurement"
                    : noCap
                      ? "Capacity flagged as insufficient by Procurement"
                      : "Capacity not confirmed"}
                </div>
                <div style={{ flex: 1 }} />
                {request.procurement.submittedBy && (
                  <div className="font-mono" style={{ fontSize: 10.5, color: "var(--text-faint)" }}>
                    attested by {request.procurement.submittedBy}
                  </div>
                )}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: "1px solid var(--border)", borderRadius: 3, overflow: "hidden" }}>
                <div style={{ padding: "8px 12px", borderRight: "1px solid var(--border)" }}>
                  <div className="eyebrow" style={{ marginBottom: 3 }}>Footprint</div>
                  <div className="font-mono" style={{ fontSize: 13 }}>{totalFp > 0 ? totalFp.toFixed(1) + " ft²" : "—"}</div>
                </div>
                <div style={{ padding: "8px 12px", borderRight: "1px solid var(--border)" }}>
                  <div className="eyebrow" style={{ marginBottom: 3 }}>Facility</div>
                  <div className="font-mono" style={{ fontSize: 13 }}>{sqft > 0 ? fmtNum(sqft) + " ft²" : "—"}</div>
                </div>
                <div style={{ padding: "8px 12px" }}>
                  <div className="eyebrow" style={{ marginBottom: 3 }}>Utilization</div>
                  <div className="font-mono" style={{ fontSize: 13, color: utilColor }}>
                    {utilization !== null ? utilization.toFixed(0) + "%" : "—"}
                  </div>
                </div>
              </div>
            </div>

            <div style={{ fontSize: 13, color: "var(--text-mid)" }}>
              {okCap
                ? "Finance will build the customer-facing quote from the data above."
                : noCap
                  ? "Finance approved the commercial terms, but Procurement flagged capacity. Resolve before quoting."
                  : "Finance approved, but no capacity attestation exists from Procurement. Recommend confirming before quoting."}
            </div>
          </div>
        );
      })()}

      {/* Archived banner */}
      {request.status === "archived" && (
        <div className="panel" style={{ padding: 20, marginBottom: 18, borderColor: "var(--border-mid)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Inbox size={16} style={{ color: "var(--text-dim)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--text-dim)" }}>Archived</div>
            <div style={{ flex: 1 }} />
            <div className="font-mono" style={{ fontSize: 11, color: "var(--text-faint)" }}>
              {fmtDateTime(request.updatedAt)}
            </div>
          </div>
          <div style={{ fontSize: 13, color: "var(--text-dim)", marginTop: 8 }}>
            This request has been archived by Finance. It can be restored if needed.
          </div>
        </div>
      )}

      {/* CSR Revision banner */}
      {request.status === "revision_csr" && request.csrRevision?.notes && (
        <div className="panel" style={{ padding: 20, marginBottom: 18, borderColor: "var(--warning-dim)", background: "rgba(232,155,111,0.04)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <AlertCircle size={16} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>
              Awaiting CSR Revision — sent by {request.csrRevision.requestedByRole === "finance" ? "Finance" : "Procurement"}
            </div>
            <div style={{ flex: 1 }} />
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
              {request.csrRevision.requestedBy} · {fmtDateTime(request.csrRevision.requestedAt)}
            </span>
          </div>
          <div style={{ fontSize: 13, color: "var(--text)", whiteSpace: "pre-wrap" }}>{request.csrRevision.notes}</div>
        </div>
      )}

      {/* Archive / Unarchive actions for Finance */}
      {onArchive && request.status === "approved" && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginBottom: 16 }}>
          <button className="btn" onClick={onArchive} style={{ color: "var(--text-dim)" }}>
            <Inbox size={14} /> Archive this request
          </button>
          {onDelete && (
            <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
              <Trash2 size={12} /> Delete
            </button>
          )}
        </div>
      )}
      {onUnarchive && request.status === "archived" && (
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginBottom: 16 }}>
          <button className="btn" onClick={onUnarchive} style={{ color: "var(--success)" }}>
            <RotateCcw size={14} /> Restore from archive
          </button>
          {onDelete && (
            <button className="btn" onClick={onDelete} style={{ color: "var(--danger)" }}>
              <Trash2 size={14} /> Delete permanently
            </button>
          )}
        </div>
      )}

      {onDelete && !["approved", "archived"].includes(request.status) && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        </div>
      )}

      <SharedAttachments request={request} userName={userName} role={role} onAdd={onAddAttachments} onRemove={onRemoveAttachment} />
      <SharedNotesPanel request={request} role={role} userName={userName} onAddNote={onAddNote} />
    </div>
  );
}

function StageTracker({ stage }) {
  const color = stage.done ? "var(--success)"
              : stage.active ? "var(--accent)"
              : "var(--text-faint)";
  const bg = stage.done ? "rgba(168,213,185,0.08)"
           : stage.active ? "rgba(232,184,78,0.08)"
           : "transparent";
  return (
    <div style={{
      padding: "14px 16px",
      border: `1px solid ${stage.active ? "var(--accent-dim)" : stage.done ? "var(--success-dim)" : "var(--border)"}`,
      background: bg,
      borderRadius: 4,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <div style={{
          width: 20, height: 20, borderRadius: "50%",
          border: `1px solid ${color}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          color,
          fontFamily: "'Geist Mono', monospace",
          fontSize: 11,
        }}>
          {stage.done ? <Check size={11} strokeWidth={3} /> : stage.num}
        </div>
        <div style={{ fontSize: 13, fontWeight: 500, color: stage.done || stage.active ? "var(--text)" : "var(--text-dim)" }}>{stage.label}</div>
      </div>
      <div style={{ fontSize: 11.5, color: "var(--text-dim)", fontFamily: "'Geist Mono', monospace", marginLeft: 28 }}>
        {stage.done
          ? <>{stage.who || "—"} · {fmtDateTime(stage.when)}{stage.decision === "follow_up" ? " · returned" : ""}</>
          : stage.active
            ? <span style={{ color: "var(--accent)" }}>In progress</span>
            : "Pending"}
      </div>
    </div>
  );
}

function CsrReadonlyView({ request }) {
  return (
    <>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: "1px solid var(--border)", borderRadius: 4, overflow: "hidden", marginBottom: 16 }}>
        <SnapshotStat label="Customer" value={request.csr.customerName || "—"} />
        <SnapshotStat label="Location Preferred" value={`${request.csr.locationCity || "—"}${request.csr.locationState ? ", " + request.csr.locationState : ""}`} />
        <SnapshotStat label="Window" value={`${fmtDate(request.csr.storageStartDate)} → ${fmtDate(request.csr.storageEndDate)}`} mono last />
      </div>
      <ItemsCompactTable items={request.csr.items} />
    </>
  );
}

function ProcurementReadonlyView({ request }) {
  return (
    <>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: "1px solid var(--border)", borderRadius: 4, overflow: "hidden", marginBottom: 16 }}>
        <SnapshotStat label="Facility" value={request.procurement.facilityName || "—"} />
        <SnapshotStat label="Location" value={request.procurement.facilityLocation || "—"} />
        <SnapshotStat label="SqFt" value={request.procurement.squareFootage ? fmtNum(request.procurement.squareFootage) : "—"} mono last />
      </div>
      <CostStructure procurement={request.procurement} />
      {request.procurement.notes && (
        <div style={{ marginTop: 14, padding: 14, border: "1px solid var(--border)", borderRadius: 4, fontSize: 13, color: "var(--text-mid)", whiteSpace: "pre-wrap" }}>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Notes</div>
          {request.procurement.notes}
        </div>
      )}
    </>
  );
}

// ============================================================
// ROOT APP
// ============================================================
function App() {
  const [auth, setAuth] = useState(null);
  const [role, setRole] = useState("csr");
  const [view, setView] = useState({ name: "dashboard" });
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const saved = localStorage.getItem(AUTH_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed?.email && parsed?.role && parsed?.name) {
            setAuth(parsed);
            setRole(parsed.role);
          }
        }
      } catch {}
      const list = await loadAll();
      setRequests(list);
      setLoading(false);
    })();
  }, []);

  // Auto-refresh from Supabase every 15 seconds so users see each other's changes
  useEffect(() => {
    const interval = setInterval(async () => {
      try {
        const list = await loadAll();
        setRequests(list);
      } catch {}
    }, 15000);
    return () => clearInterval(interval);
  }, []);

  const logAudit = (action, detail = "") => {
    if (!auth) return;
    appendAuditEntry({
      id: genRowId(),
      timestamp: new Date().toISOString(),
      email: auth.email,
      name: auth.name,
      role,
      action,
      detail,
    });
  };

  const handleLogin = (authObj) => {
    setAuth(authObj);
    setRole(authObj.role);
    setView({ name: "dashboard" });
    appendAuditEntry({
      id: genRowId(), timestamp: new Date().toISOString(),
      email: authObj.email, name: authObj.name, role: authObj.role,
      action: "login", detail: "",
    });
  };

  const handleLogout = () => {
    setAuth(null);
    try { localStorage.removeItem(AUTH_KEY); } catch {}
    setView({ name: "dashboard" });
  };

  const handleSetRole = (newRole) => {
    if (auth?.role !== "finance") return;
    setRole(newRole);
    setView({ name: "dashboard" });
  };

  const showToast = (msg, tone = "ok") => {
    setToast({ msg, tone });
    setTimeout(() => setToast(null), 2800);
  };

  const persist = async (list) => {
    setRequests(list);
    const ok = await saveAll(list);
    if (!ok) showToast("Save failed — try again", "error");
  };

  const handleNew = () => {
    const req = blankRequest();
    setView({ name: "detail", id: req.id });
    persist([req, ...requests]);
    logAudit("create_request", req.id);
  };

  const handleUpdate = async (updated, opts = {}) => {
    const next = requests.map(r => r.id === updated.id ? updated : r);
    await persist(next);
    if (opts.silent) { logAudit("post_note", updated.id); return; }
    if (updated.status === "awaiting_procurement") { logAudit("submit_to_procurement", updated.id); showToast("Submitted to Procurement"); }
    else if (updated.status === "awaiting_finance") { logAudit("submit_to_finance", updated.id); showToast("Submitted to Finance"); }
    else if (updated.status === "approved") { logAudit("approve", updated.id); showToast("Approved — workflow closed"); }
    else if (updated.status === "follow_up") { logAudit("request_followup", updated.id); showToast("Follow-up sent back to Procurement"); }
    else if (updated.status === "revision_csr") { logAudit("revision_csr", updated.id); showToast("Sent back to CSR for revision"); }
    else if (updated.status === "archived") { logAudit("archive", updated.id); showToast("Request archived"); }
    else { logAudit("save_draft", updated.id); showToast("Draft saved"); }
  };

  const handleDelete = async (id) => {
    if (!confirm("Permanently delete this request? This can't be undone.")) return;
    const next = requests.filter(r => r.id !== id);
    await persist(next);
    setView({ name: "dashboard" });
    logAudit("delete_request", id);
    showToast("Request deleted");
  };

  if (!loading && !auth) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  const currentRequest = view.name === "detail" ? requests.find(r => r.id === view.id) : null;

  return (
    <div className="app-root">
      <StyleBlock />
      <div className="content-layer">
        <TopBar
          role={role}
          setRole={handleSetRole}
          onNew={handleNew}
          onHome={() => setView({ name: "dashboard" })}
          auth={auth}
          onLogout={handleLogout}
          onAdmin={() => setView({ name: "admin" })}
          onActivity={() => setView({ name: "activity" })}
          onPassword={() => setView({ name: "password" })}
        />

        {loading ? (
          <div style={{ padding: 60, textAlign: "center", color: "var(--text-dim)" }}>
            <Loader2 className="spin" size={22} />
          </div>
        ) : view.name === "dashboard" ? (
          <div style={{ maxWidth: 1360, margin: "0 auto" }}>
            <Dashboard role={role} requests={requests} onOpen={(id) => setView({ name: "detail", id })} onNew={handleNew} />
          </div>
        ) : view.name === "admin" && auth?.role === "finance" ? (
          <UserManagement onBack={() => setView({ name: "dashboard" })} />
        ) : view.name === "activity" && auth?.role === "finance" ? (
          <ActivityLog onBack={() => setView({ name: "dashboard" })} />
        ) : view.name === "password" ? (
          <PasswordChange auth={auth} onBack={() => setView({ name: "dashboard" })} onSuccess={() => logAudit("change_password")} />
        ) : currentRequest ? (
          <RequestDetail
            request={currentRequest}
            role={role}
            onBack={() => setView({ name: "dashboard" })}
            onUpdate={handleUpdate}
            onDelete={auth?.role === "finance" ? handleDelete : null}
            userName={auth?.name || ""}
          />
        ) : (
          <div style={{ padding: 40, textAlign: "center", color: "var(--text-dim)" }}>
            Request not found.
            <div style={{ marginTop: 12 }}>
              <button className="btn" onClick={() => setView({ name: "dashboard" })}>Back to dashboard</button>
            </div>
          </div>
        )}
      </div>

      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          padding: "10px 16px",
          background: toast.tone === "error" ? "var(--danger)" : "var(--panel-hi)",
          border: `1px solid ${toast.tone === "error" ? "var(--danger)" : "var(--border-hi)"}`,
          color: toast.tone === "error" ? "#1a1407" : "var(--text)",
          fontSize: 13, fontWeight: 500, borderRadius: 3, zIndex: 100,
          animation: "fadeInUp 200ms ease-out both",
          boxShadow: "0 8px 24px rgba(0,0,0,0.4)",
        }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


import { createRoot } from "react-dom/client";
const root = createRoot(document.getElementById("root"));
root.render(<App />);

</script></body></html>
