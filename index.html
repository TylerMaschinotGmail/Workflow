class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("SOLVR Error:", error, info); }
  render() {
    if (this.state.error) {
      const { onDelete, requestId, isAdmin, onBack } = this.props;
      return (
        <div style={{ minHeight: "100vh", background: "#0C0A07", display: "flex", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ maxWidth: 540, width: "100%", background: "#191510", border: "1px solid rgba(241,227,197,0.12)", borderRadius: 6, padding: "40px 36px", textAlign: "center" }}>
            <div style={{ width: 48, height: 48, borderRadius: "50%", background: "rgba(232,100,78,0.12)", border: "1px solid rgba(232,100,78,0.3)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
              <span style={{ fontSize: 22 }}>⚠</span>
            </div>
            <div style={{ fontFamily: "Fraunces, serif", fontSize: 22, color: "#f1e3c5", marginBottom: 10 }}>Something went wrong</div>
            <div style={{ fontSize: 13, color: "#8a7f6e", marginBottom: 24, lineHeight: 1.6 }}>
              An unexpected error occurred. Your data is safe — try going back to the dashboard or refreshing the page.
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 24, flexWrap: "wrap" }}>
              <button onClick={() => { this.setState({ error: null }); if (onBack) onBack(); }}
                style={{ padding: "9px 18px", background: "#E8B84E", border: "none", borderRadius: 3, color: "#1a1407", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                Back to Dashboard
              </button>
              <button onClick={() => window.location.reload()}
                style={{ padding: "9px 18px", background: "transparent", border: "1px solid rgba(241,227,197,0.2)", borderRadius: 3, color: "#c4b89a", fontSize: 13, cursor: "pointer" }}>
                Refresh Page
              </button>
              {isAdmin && onDelete && requestId && (
                <button onClick={() => {
                  if (window.confirm("Permanently delete this request? This can't be undone.")) {
                    onDelete(requestId);
                    this.setState({ error: null });
                    if (onBack) onBack();
                  }
                }}
                style={{ padding: "9px 18px", background: "transparent", border: "1px solid rgba(232,100,78,0.4)", borderRadius: 3, color: "#e86e6e", fontSize: 13, cursor: "pointer" }}>
                  Delete This Quote
                </button>
              )}
            </div>
            <details style={{ textAlign: "left" }}>
              <summary style={{ fontSize: 11, color: "#4a4535", cursor: "pointer", marginBottom: 8 }}>Error details (Admin)</summary>
              <pre style={{ fontSize: 10, color: "#6a6050", background: "#0C0A07", padding: 12, borderRadius: 3, overflow: "auto", maxHeight: 160, whiteSpace: "pre-wrap", wordBreak: "break-all" }}>
                {this.state.error?.toString()}{"\n"}{this.state.error?.stack}
              </pre>
            </details>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [auth, setAuth] = useState(null);
  const [role, setRole] = useState("csr");
  const [view, setView] = useState({ name: "dashboard" });
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");

  const searchResults = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    if (q.length < 2) return [];
    return requests.filter(r =>
      r.id.toLowerCase().includes(q) ||
      (r.csr.customerName || "").toLowerCase().includes(q) ||
      (r.csr.locationCity || "").toLowerCase().includes(q) ||
      (r.csr.locationState || "").toLowerCase().includes(q)
    );
  }, [searchQuery, requests]);

  const handleSearch = (query, directId) => {
    setSearchQuery("");
    if (directId) {
      setView({ name: "detail", id: directId });
    } else if (query) {
      setView({ name: "search", query });
    }
  };

  useEffect(() => {
    (async () => {
      try {
        const saved = localStorage.getItem(AUTH_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed?.email && parsed?.role && parsed?.name) {
            setAuth(parsed);
            setRole(parsed.role === "admin" ? "finance" : parsed.role);
          }
        }
      } catch {}
      const list = await loadAll();
      setRequests(list);
      setLoading(false);
    })();
  }, []);

  // Auto-refresh from Supabase every 15 seconds — suspended when a form is open
  // to prevent wiping unsaved user input
  useEffect(() => {
    const interval = setInterval(async () => {
      // Don't refresh if user is actively filling out a quote form
      if (view.name === "detail" || view.name === "quote_builder") return;
      try {
        const list = await loadAll();
        setRequests(list);
      } catch {}
    }, 15000);
    return () => clearInterval(interval);
  }, [view.name]);

  // System-level events only — not quote workflow actions
  const SYSTEM_AUDIT_ACTIONS = new Set(["delete_request","archive","unarchive","change_password","add_user","remove_user","change_role"]);
  const logAudit = (action, detail = "") => {
    if (!auth) return;
    if (!SYSTEM_AUDIT_ACTIONS.has(action)) return; // skip quote workflow noise
    appendAuditEntry({
      id: genRowId(),
      timestamp: new Date().toISOString(),
      email: auth.email,
      name: auth.name,
      role,
      action,
      detail,
    });
  };

  const handleLogin = (authObj) => {
    setAuth(authObj);
    setRole(authObj.role === "admin" ? "finance" : authObj.role);
    setView({ name: "dashboard" });
  };

  const handleLogout = () => {
    setAuth(null);
    try { localStorage.removeItem(AUTH_KEY); } catch {}
    setView({ name: "dashboard" });
  };

  const handleSetRole = (newRole) => {
    if (auth?.role !== "admin" && auth?.role !== "finance") return;
    setRole(newRole);
    setView({ name: "dashboard" });
  };

  const showToast = (msg, tone = "ok") => {
    setToast({ msg, tone });
    setTimeout(() => setToast(null), 2800);
  };

  const persist = async (list) => {
    setRequests(list);
    const ok = await saveAll(list);
    if (!ok) showToast("Save failed — try again", "error");
  };

  const handleNew = () => {
    const req = { ...blankRequest(), status: role === "procurement" ? "draft_procurement" : "draft_csr" };
    setView({ name: "detail", id: req.id });
    persist([req, ...requests]);
    logAudit("create_request", req.id);
  };

  const handleUpdate = async (updated, opts = {}) => {
    // Determine action for touch log
    let action = "save_draft";
    let detail = "";
    if (opts.silent) {
      if (opts.touchAction) { action = opts.touchAction; detail = opts.touchDetail || ""; }
      else { action = "post_note"; }
    } else if (updated.status === "awaiting_procurement") { action = "submit_to_procurement"; detail = "CSR submitted to Procurement"; }
    else if (updated.status === "awaiting_finance") { action = "submit_to_finance"; detail = "Procurement submitted to Finance"; }
    else if (updated.status === "approved") { action = "approve"; detail = "Finance approved for quoting"; }
    else if (updated.status === "follow_up") { action = "request_followup"; detail = "Finance requested follow-up from Procurement"; }
    else if (updated.status === "revision_csr") { action = "revision_csr"; detail = "Sent back to CSR for revision"; }
    else if (updated.status === "archived") { action = "archive"; detail = "Request archived"; }
    else { detail = "Draft saved"; }

    // Compute field-level diff vs previous saved state
    const prevRequest = requests.find(r => r.id === updated.id);
    const changes = diffRequests(prevRequest, updated);

    // Build change log entry (even if no field changes — milestone events still recorded via touchLog)
    if (changes.length > 0) {
      const changeEntry = {
        id: genRowId(),
        timestamp: new Date().toISOString(),
        user: auth?.name || "Unknown",
        email: auth?.email || "",
        role,
        action,
        changes,
      };
      updated = { ...updated, changeLog: [...(updated.changeLog || []), changeEntry] };
    }

    // Append touch log entry to the request
    const touchEntry = {
      id: genRowId(),
      timestamp: new Date().toISOString(),
      user: auth?.name || "Unknown",
      email: auth?.email || "",
      role,
      action,
      detail,
    };
    updated = { ...updated, touchLog: [...(updated.touchLog || []), touchEntry] };

    let next;
    if (opts.idChange) {
      next = requests.map(r => r.id === opts.idChange.oldId ? { ...updated, id: opts.idChange.newId } : r);
      try {
        await fetch(SUPABASE_URL + "/rest/v1/requests?id=eq." + encodeURIComponent(opts.idChange.oldId), { method: "DELETE", headers: SB_HEADERS });
      } catch {}
      // Update view ID silently — don't call setView as it triggers a full re-render and wipes form state
      setView(v => v.name === "detail" ? { ...v, id: opts.idChange.newId } : v);
    } else {
      next = requests.map(r => r.id === updated.id ? updated : r);
    }
    await persist(next);
    // Global audit (non-login)
    logAudit(action, updated.id);
    if (!opts.silent) {
      if (updated.status === "awaiting_procurement") showToast("Submitted to Procurement");
      else if (updated.status === "awaiting_finance") showToast("Submitted to Finance");
      else if (updated.status === "approved") showToast("Approved — workflow closed");
      else if (updated.status === "follow_up") showToast("Follow-up sent back to Procurement");
      else if (updated.status === "revision_csr") showToast("Sent back to CSR for revision");
      else if (updated.status === "archived") showToast("Request archived");
      else showToast("Draft saved");
    }
  };

  const handleSaveQuote = async (id, quote) => {
    const next = requests.map(r => r.id === id ? { ...r, financeQuote: quote, updatedAt: new Date().toISOString() } : r);
    await persist(next);
    showToast("Quote saved");
    logAudit("save_quote", id);
  };

  const handleDelete = async (id) => {
    if (!confirm("Permanently delete this request? This can't be undone.")) return;
    const next = requests.filter(r => r.id !== id);
    await persist(next);
    setView({ name: "dashboard" });
    logAudit("delete_request", id);
    showToast("Request deleted");
  };

  const handleRestore = async (id) => {
    const next = requests.map(r => r.id === id ? { ...r, status: "approved", updatedAt: new Date().toISOString() } : r);
    await persist(next);
    logAudit("unarchive", id);
    showToast("Restored to Approved");
  };

  if (!loading && !auth) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  const currentRequest = view.name === "detail" ? requests.find(r => r.id === view.id) : null;

  return (
    <div className="app-root">
      <StyleBlock />
      <div className="content-layer">
        <TopBar
          role={role}
          setRole={handleSetRole}
          onNew={handleNew}
          onHome={() => setView({ name: "dashboard" })}
          auth={auth}
          onLogout={handleLogout}
          onAdmin={() => setView({ name: "admin" })}
          onActivity={() => setView({ name: "activity" })}
          onPassword={() => setView({ name: "password" })}
          onAnalytics={() => setView({ name: "analytics" })}
          onArchive={() => setView({ name: "archive" })}
          onQuoteCreation={() => setView({ name: "quote_creation" })}
          onAssumptions={() => setView({ name: "assumptions" })}
        />

        {loading ? (
          <div style={{ padding: 60, textAlign: "center", color: "var(--text-dim)" }}>
            <Loader2 className="spin" size={22} />
          </div>
        ) : view.name === "dashboard" ? (
          <div style={{ maxWidth: 1360, margin: "0 auto" }}>
            <Dashboard role={role} requests={requests} onOpen={(id) => setView({ name: "detail", id })} onNew={handleNew}
              searchQuery={searchQuery} setSearchQuery={setSearchQuery} searchResults={searchResults} onSearch={handleSearch}
              initialTab={view.tab} />
          </div>
        ) : view.name === "admin" && auth?.role === "admin" ? (
          <UserManagement onBack={() => setView({ name: "dashboard" })} auth={auth} />
        ) : view.name === "activity" && auth?.role === "admin" ? (
          <ActivityLog onBack={() => setView({ name: "dashboard" })} />
        ) : view.name === "analytics" && (auth?.role === "admin" || auth?.role === "finance") ? (
          <AnalyticsDashboard requests={requests} onBack={() => setView({ name: "dashboard" })} onOpen={(id) => setView({ name: "detail", id })} />
        ) : view.name === "archive" ? (
          <ArchivePage
            requests={requests}
            onOpen={(id) => setView({ name: "detail", id })}
            onBack={() => setView({ name: "dashboard" })}
            isAdmin={auth?.role === "admin"}
            onRestore={handleRestore}
          />
        ) : view.name === "assumptions" && auth?.role === "admin" ? (
          <DefaultAssumptionsAdmin onBack={() => setView({ name: "dashboard" })} />
        ) : view.name === "quote_creation" && (auth?.role === "admin" || auth?.role === "finance") ? (
          <QuoteCreation
            requests={requests}
            onBack={() => setView({ name: "dashboard" })}
            onBuildQuote={(id) => setView({ name: "quote_builder", id })}
            auth={auth}
          />
        ) : view.name === "quote_builder" && (auth?.role === "admin" || auth?.role === "finance") ? (
          <FinanceQuoteBuilder
            request={requests.find(r => r.id === view.id) || requests[0]}
            onBack={() => setView({ name: "quote_creation" })}
            onSaveQuote={(quote) => handleSaveQuote(view.id, quote)}
            auth={auth}
            isAdmin={auth?.role === "admin"}
          />
        ) : view.name === "password" ? (
          <PasswordChange auth={auth} onBack={() => setView({ name: "dashboard" })} onSuccess={() => logAudit("change_password")} />
        ) : view.name === "search" ? (
          <SearchResults
            query={view.query}
            results={requests}
            onOpen={(id) => setView({ name: "detail", id })}
            onBack={() => setView({ name: "dashboard" })}
          />
        ) : currentRequest ? (
          <ErrorBoundary
            key={view.id}
            requestId={currentRequest.id}
            isAdmin={auth?.role === "admin"}
            onDelete={auth?.role === "admin" ? handleDelete : null}
            onBack={() => setView({ name: "dashboard" })}
          >
            <RequestDetail
              request={currentRequest}
              role={role}
              onBack={() => setView({ name: "dashboard" })}
              onUpdate={handleUpdate}
              onDelete={auth?.role === "admin" ? handleDelete : null}
              userName={auth?.name || ""}
              allRequests={requests}
              isAdmin={auth?.role === "admin"}
            />
          </ErrorBoundary>
        ) : (
          <div style={{ padding: 40, textAlign: "center", color: "var(--text-dim)" }}>
            Request not found.
            <div style={{ marginTop: 12 }}>
              <button className="btn" onClick={() => setView({ name: "dashboard" })}>Back to dashboard</button>
            </div>
          </div>
        )}
      </div>

      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          padding: "10px 16px",
          background: toast.tone === "error" ? "var(--danger)" : "var(--panel-hi)",
          border: `1px solid ${toast.tone === "error" ? "var(--danger)" : "var(--border-hi)"}`,
          color: toast.tone === "error" ? "#1a1407" : "var(--text)",
          fontSize: 13, fontWeight: 500, borderRadius: 3, zIndex: 100,
          animation: "fadeInUp 200ms ease-out both",
          boxShadow: "0 8px 24px rgba(0,0,0,0.4)",
        }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


import { createRoot } from "react-dom/client";
const root = createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

</script></body></html>
