              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// TOUCH LOG — per-quote accountability trail
// ============================================================
const TOUCH_LABELS = {
  save_draft: "Saved draft",
  submit_to_procurement: "Submitted to Procurement",
  submit_to_finance: "Submitted to Finance",
  approve: "Approved",
  request_followup: "Requested follow-up",
  revision_csr: "Sent back to CSR",
  post_note: "Posted note",
  upload_file: "Uploaded file",
  remove_file: "Removed file",
  archive: "Archived",
  create_request: "Created request",
};

function ChangeLogPanel({ request }) {
  const [open, setOpen] = useState(false);
  const [filterField, setFilterField] = useState("");
  const [filterUser, setFilterUser] = useState("");
  const [filterFrom, setFilterFrom] = useState("");
  const [filterTo, setFilterTo] = useState("");

  const log = request.changeLog || [];
  const touchLog = request.touchLog || [];

  // Merge change entries and milestone events into one timeline
  const timeline = [
    ...log.map(e => ({ ...e, _type: "change" })),
    ...touchLog.filter(e => ["submit_to_procurement","submit_to_finance","approve","request_followup","revision_csr","archive","create_request"].includes(e.action))
      .map(e => ({ ...e, _type: "milestone" })),
  ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const totalEvents = timeline.length;
  if (totalEvents === 0) return null;

  // Unique field names and users for filter dropdowns
  const allFields = [...new Set(log.flatMap(e => (e.changes||[]).map(c => c.label)))].sort();
  const allUsers  = [...new Set(timeline.map(e => e.user).filter(Boolean))].sort();

  const filtered = timeline.filter(e => {
    if (filterUser && e.user !== filterUser) return false;
    if (filterFrom && new Date(e.timestamp) < new Date(filterFrom)) return false;
    if (filterTo   && new Date(e.timestamp) > new Date(filterTo + "T23:59:59")) return false;
    if (filterField) {
      if (e._type === "milestone") return false; // milestones don't have field changes
      if (!(e.changes||[]).some(c => c.label === filterField)) return false;
    }
    return true;
  });

  const activeFilters = [filterField, filterUser, filterFrom, filterTo].filter(Boolean).length;

  const MILESTONE_LABELS = {
    create_request:       "Quote created",
    submit_to_procurement:"Submitted to Procurement",
    submit_to_finance:    "Submitted to Finance",
    approve:              "Approved by Finance",
    request_followup:     "Follow-up requested",
    revision_csr:         "Sent back to CSR",
    archive:              "Archived",
  };

  return (
    <Fragment>
      {/* Styled trigger button */}
      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
        <button onClick={() => setOpen(true)} style={{
          display: "flex", alignItems: "center", gap: 7,
          padding: "7px 14px",
          background: "var(--panel-hi)", border: "1px solid var(--border-hi)",
          borderRadius: 3, cursor: "pointer", color: "var(--text-mid)",
          fontSize: 12, fontFamily: "inherit", fontWeight: 500,
          transition: "border-color 140ms, color 140ms",
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent-dim)"; e.currentTarget.style.color = "var(--text)"; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border-hi)"; e.currentTarget.style.color = "var(--text-mid)"; }}>
          <Clock size={12} style={{ color: "var(--accent)" }}/>
          Quote Change Log
          <span style={{
            fontSize: 10, padding: "1px 6px", borderRadius: 2,
            background: "rgba(232,184,78,0.12)", color: "var(--accent)",
            border: "1px solid var(--accent-dim)",
          }}>{totalEvents}</span>
        </button>
      </div>

      {/* Modal */}
      {open && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 200,
          background: "rgba(0,0,0,0.72)", display: "flex", alignItems: "center", justifyContent: "center",
        }} onClick={() => setOpen(false)}>
          <div style={{
            background: "var(--panel)", border: "1px solid var(--border-hi)",
            borderRadius: 6, width: "min(780px, 95vw)", maxHeight: "80vh",
            display: "flex", flexDirection: "column",
            boxShadow: "0 20px 60px rgba(0,0,0,0.6)",
          }} onClick={e => e.stopPropagation()}>

            {/* Header */}
            <div style={{ padding: "20px 24px 14px", borderBottom: "1px solid var(--border)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <Clock size={14} style={{ color: "var(--accent)" }}/>
                <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)" }}>
                  Quote Change Log — <span style={{ color: "var(--accent)", fontFamily: "'Geist Mono', monospace", fontSize: 13 }}>{request.id}</span>
                </div>
                <div style={{ flex: 1 }}/>
                <span style={{ fontSize: 11, color: "var(--text-faint)" }}>{totalEvents} event{totalEvents !== 1 ? "s" : ""}</span>
                <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-dim)", padding: 4 }}>
                  <X size={14}/>
                </button>
              </div>

              {/* Filters */}
              <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr 1fr auto", gap: 8 }}>
                <select className="select" value={filterField} onChange={e => setFilterField(e.target.value)} style={{ fontSize: 11.5, padding: "5px 8px" }}>
                  <option value="">All Fields</option>
                  {allFields.map(f => <option key={f} value={f}>{f}</option>)}
                </select>
                <select className="select" value={filterUser} onChange={e => setFilterUser(e.target.value)} style={{ fontSize: 11.5, padding: "5px 8px" }}>
                  <option value="">All Users</option>
                  {allUsers.map(u => <option key={u} value={u}>{u}</option>)}
                </select>
                <input type="date" className="input" value={filterFrom} onChange={e => setFilterFrom(e.target.value)}
                  style={{ fontSize: 11.5, padding: "5px 8px", colorScheme: "dark" }} placeholder="From date"/>
                <input type="date" className="input" value={filterTo} onChange={e => setFilterTo(e.target.value)}
                  style={{ fontSize: 11.5, padding: "5px 8px", colorScheme: "dark" }} placeholder="To date"/>
                {activeFilters > 0 && (
                  <button className="btn btn-ghost btn-xs" onClick={() => { setFilterField(""); setFilterUser(""); setFilterFrom(""); setFilterTo(""); }}
                    style={{ whiteSpace: "nowrap" }}>
                    <X size={11}/> Clear
                  </button>
                )}
              </div>
            </div>

            {/* Timeline */}
            <div style={{ overflowY: "auto", flex: 1, padding: "0 24px 20px" }}>
              {filtered.length === 0 ? (
                <div style={{ padding: 32, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>
                  No events match your filters.
                </div>
              ) : filtered.map((e, i) => {
                const roleMeta = ROLES.find(r => r.id === e.role);
                if (e._type === "milestone") {
                  return (
                    <div key={e.id || i} style={{
                      display: "flex", alignItems: "center", gap: 12,
                      padding: "12px 0", borderBottom: i < filtered.length-1 ? "1px solid var(--border)" : "none",
                    }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent)", flexShrink: 0 }}/>
                      <div style={{ flex: 1 }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "var(--accent)" }}>
                          {MILESTONE_LABELS[e.action] || e.action}
                        </span>
                        <span style={{ fontSize: 12, color: "var(--text-dim)", marginLeft: 8 }}>by {e.user}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        {roleMeta && <span style={{ fontSize: 9.5, letterSpacing: "0.1em", textTransform: "uppercase", padding: "2px 6px", borderRadius: 2, border: `1px solid ${roleMeta.hue}`, color: roleMeta.hue }}>{roleMeta.label}</span>}
                        <span style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "'Geist Mono', monospace" }}>{fmtDateTime(e.timestamp)}</span>
                      </div>
                    </div>
                  );
                }
                // Change entry
                const changes = (e.changes || []).filter(c => !filterField || c.label === filterField);
                if (changes.length === 0) return null;
                return (
                  <div key={e.id || i} style={{
                    padding: "12px 0", borderBottom: i < filtered.length-1 ? "1px solid var(--border)" : "none",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                      <div style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--border-hi)", flexShrink: 0 }}/>
                      <span style={{ fontSize: 12, fontWeight: 500, color: "var(--text)" }}>{e.user}</span>
                      <span style={{ fontSize: 11.5, color: "var(--text-dim)" }}>saved {changes.length} change{changes.length !== 1 ? "s" : ""}</span>
                      <div style={{ flex: 1 }}/>
                      {roleMeta && <span style={{ fontSize: 9.5, letterSpacing: "0.1em", textTransform: "uppercase", padding: "2px 6px", borderRadius: 2, border: `1px solid ${roleMeta.hue}`, color: roleMeta.hue }}>{roleMeta.label}</span>}
                      <span style={{ fontSize: 11, color: "var(--text-faint)", fontFamily: "'Geist Mono', monospace" }}>{fmtDateTime(e.timestamp)}</span>
                    </div>
                    <div style={{ marginLeft: 16, display: "flex", flexDirection: "column", gap: 5 }}>
                      {changes.map((c, ci) => (
                        <div key={ci} style={{ fontSize: 12, display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
                          <span style={{ color: "var(--text-mid)", fontWeight: 500, minWidth: 160 }}>{c.label}</span>
                          <span style={{ color: "var(--text-faint)", fontFamily: "'Geist Mono', monospace", fontSize: 11, textDecoration: "line-through" }}>{c.from}</span>
                          <span style={{ color: "var(--text-faint)" }}>→</span>
                          <span style={{ color: "var(--text)", fontFamily: "'Geist Mono', monospace", fontSize: 11 }}>{c.to}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </Fragment>
  );
}

// ============================================================
// SHARED ATTACHMENTS — visible to all three parties
// ============================================================
function SharedAttachments({ request, userName, role, onAdd, onRemove }) {
  const fileRef = useRef(null);
  const [lightbox, setLightbox] = useState(null); // { dataUrl, name }
  const attachments = request.sharedAttachments || [];

  const handleFiles = async (files) => {
    const arr = Array.from(files);
    const processed = await Promise.all(arr.map(async (f) => {
      const meta = {
        id: genRowId(),
        name: f.name,
        size: f.size,
        type: f.type,
        dataUrl: null,
        uploadedBy: userName,
        uploadedByRole: role,
        uploadedAt: new Date().toISOString(),
      };
      if (f.size < 5_000_000) {
        try {
          meta.dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = () => rej();
            r.readAsDataURL(f);
          });
        } catch {}
      }
      return meta;
    }));
    onAdd(processed);
  };

  return (
    <div className="panel" style={{ padding: "18px 20px", marginTop: 24 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <Files size={14} style={{ color: "var(--text-dim)" }} />
        <div className="section-title" style={{ margin: 0 }}>Shared Files</div>
        <div style={{ flex: 1 }} />
        <div style={{ fontSize: 10.5, color: "var(--text-faint)", letterSpacing: "0.1em", textTransform: "uppercase" }}>
          Visible to all parties
        </div>
      </div>

      <div
        onClick={() => fileRef.current?.click()}
        onDragOver={(e) => e.preventDefault()}
        onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
        style={{
          border: "1px dashed var(--border-hi)",
          borderRadius: 4,
          padding: "22px 20px",
          textAlign: "center",
          cursor: "pointer",
          background: "var(--bg-2)",
          marginBottom: attachments.length > 0 ? 14 : 0,
        }}
      >
        <Upload size={16} style={{ color: "var(--accent)", marginBottom: 6 }} />
        <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500, marginBottom: 3 }}>
          Drop files here or click to browse
        </div>
        <div style={{ fontSize: 11, color: "var(--text-dim)" }}>
          Photos, PDFs, documents — files up to 5 MB stored and viewable
        </div>
        <input ref={fileRef} type="file" multiple style={{ display: "none" }}
          onChange={(e) => { if (e.target.files) handleFiles(e.target.files); e.target.value = ""; }} />
      </div>

      {attachments.length > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10 }}>
          {attachments.map(a => {
            const roleMeta = ROLES.find(r => r.id === a.uploadedByRole);
            const isImage = a.type?.startsWith("image/");
            const hasData = !!a.dataUrl;
            const handleClick = () => {
              if (!hasData) return;
              if (isImage) {
                setLightbox({ dataUrl: a.dataUrl, name: a.name, uploadedBy: a.uploadedBy, uploadedAt: a.uploadedAt });
              } else {
                // PDFs, docs, etc — open in new tab
                const win = window.open();
                if (win) {
                  if (a.type === "application/pdf") {
                    win.document.write('<html><head><title>' + a.name + '</title></head><body style="margin:0"><iframe src="' + a.dataUrl + '" style="width:100%;height:100vh;border:none"></iframe></body></html>');
                  } else {
                    // Trigger download for other types
                    const link = win.document.createElement("a");
                    link.href = a.dataUrl;
                    link.download = a.name;
                    win.document.body.appendChild(link);
                    link.click();
                    setTimeout(() => win.close(), 500);
                  }
                }
              }
            };
            return (
              <div key={a.id} className="panel-inset" style={{ padding: 10, position: "relative", cursor: hasData ? "pointer" : "default" }}
                onClick={handleClick}>
                {isImage && a.dataUrl ? (
                  <img src={a.dataUrl} alt={a.name} style={{ width: "100%", aspectRatio: "4 / 3", objectFit: "cover", borderRadius: 3, marginBottom: 8, background: "var(--bg)" }} />
                ) : (
                  <div style={{
                    width: "100%", aspectRatio: "4 / 3",
                    borderRadius: 3, marginBottom: 8,
                    background: "var(--bg)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    flexDirection: "column", gap: 6,
                    color: hasData ? "var(--text-mid)" : "var(--text-dim)",
                  }}>
                    <FileText size={22} />
                    <div style={{ fontSize: 9, color: hasData ? "var(--accent)" : "var(--text-faint)" }}>
                      {hasData ? "Click to open" : "Over 5 MB — metadata only"}
                    </div>
                  </div>
                )}
                <div style={{ fontSize: 12, color: "var(--text)", fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={a.name}>
                  {a.name}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 3 }}>
                  <div className="font-mono" style={{ fontSize: 10, color: "var(--text-dim)" }}>
                    {(a.size / 1024).toFixed(1)} KB
                  </div>
                  <div style={{ fontSize: 10, color: roleMeta?.hue || "var(--text-faint)" }}>
                    {a.uploadedBy || "—"}
                  </div>
                </div>
                <button
                  className="btn btn-ghost btn-xs"
                  onClick={(e) => { e.stopPropagation(); onRemove(a.id); }}
                  style={{ position: "absolute", top: 4, right: 4, padding: "3px 5px" }}
                >
                  <X size={11} />
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* Lightbox modal */}
      {lightbox && (
        <div
          onClick={() => setLightbox(null)}
          style={{
            position: "fixed", inset: 0, zIndex: 200,
            background: "rgba(0,0,0,0.88)",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexDirection: "column", gap: 14,
            cursor: "pointer",
            animation: "fadeInUp 150ms ease-out both",
          }}
        >
          <img
            src={lightbox.dataUrl}
            alt={lightbox.name}
            onClick={(e) => e.stopPropagation()}
            style={{
              maxWidth: "90vw", maxHeight: "80vh",
              borderRadius: 4,
              boxShadow: "0 12px 40px rgba(0,0,0,0.6)",
              cursor: "default",
            }}
          />
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 14, color: "var(--text)", fontWeight: 500 }}>{lightbox.name}</div>
            <div style={{ fontSize: 12, color: "var(--text-dim)", marginTop: 4 }}>
              Uploaded by {lightbox.uploadedBy} · {fmtDateTime(lightbox.uploadedAt)}
            </div>
            <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 8 }}>
              Click anywhere to close · <a href={lightbox.dataUrl} download={lightbox.name} onClick={(e) => e.stopPropagation()} style={{ color: "var(--accent)", textDecoration: "underline" }}>Download</a>
            </div>
          </div>
        </div>
      )}
    </div>

// ============================================================
// US MAP COMPONENT — uses D3 + TopoJSON for real state shapes
// ============================================================
function USMap({ locationData, onStateClick, hoveredState, setHoveredState }) {
  const svgRef = useRef(null);
  const [paths, setPaths] = useState([]); // { id, name, d }
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        // Load d3 and topojson from CDN
        const [d3Module, topoModule, usDataResp] = await Promise.all([
          import("https://cdn.jsdelivr.net/npm/d3-geo@3/+esm"),
          import("https://cdn.jsdelivr.net/npm/topojson-client@3/+esm"),
          fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"),
        ]);
        const us = await usDataResp.json();
        if (cancelled) return;

        const { geoAlbersUsa, geoPath } = d3Module;
        const { feature } = topoModule;

        const width = 680, height = 420;
        const projection = geoAlbersUsa().fitSize([width, height], feature(us, us.objects.states));
        const pathGen = geoPath().projection(projection);
        const statesGeo = feature(us, us.objects.states);

        // FIPS to state abbreviation
        const fipsToAbbr = {
          "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT",
          "10":"DE","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN",
          "19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA",
          "26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE","32":"NV",
          "33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND","39":"OH",
          "40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD","47":"TN",
          "48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV","55":"WI",
          "56":"WY","11":"DC",
        };

        const built = statesGeo.features.map(f => {
          const fips = String(f.id).padStart(2,"0");
          const abbr = fipsToAbbr[fips] || fips;
          const d = pathGen(f);
          // Centroid for bubble placement
          const [cx, cy] = pathGen.centroid(f);
          return { id: fips, abbr, d, cx, cy };
        }).filter(p => p.d);

        if (!cancelled) { setPaths(built); setLoaded(true); }
      } catch(e) {
        console.error("Map load failed:", e);
        if (!cancelled) setLoaded("error");
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const W = 680, H = 420;

  if (loaded === "error") return (
    <div style={{ padding:40, textAlign:"center", color:"var(--text-faint)", fontStyle:"italic" }}>
      Map unavailable (requires internet connection)
    </div>
  );

  return (
    <div style={{ position:"relative" }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:"auto" }}>
        {!loaded && (
          <text x={W/2} y={H/2} textAnchor="middle" dominantBaseline="middle"
            style={{ fontSize:12, fill:"#4a4535", fontStyle:"italic" }}>Loading map…</text>
        )}
        {/* State fills */}
        <g>
          {paths.map(p => (
            <path key={p.id} d={p.d}
              fill={hoveredState===p.abbr ? "#2a2820" : "#1e1c16"}
              stroke="#3a3628" strokeWidth="0.8"/>
          ))}
        </g>
        {/* Data bubbles */}
        {paths.map(p => {
          const d = locationData.find(l => l.state === p.abbr);
          if (!d || isNaN(p.cx) || isNaN(p.cy)) return null;
          const r = Math.max(8, Math.min(26, Math.sqrt(d.count)*10));
          const isHov = hoveredState === p.abbr;
          return (
            <g key={p.abbr}
              onClick={() => onStateClick(p.abbr)}
              onMouseEnter={() => setHoveredState(p.abbr)}
              onMouseLeave={() => setHoveredState(null)}
              style={{ cursor:"pointer" }}>
              <circle cx={p.cx} cy={p.cy} r={r+5} fill="rgba(232,184,78,0.08)"/>
              <circle cx={p.cx} cy={p.cy} r={r}
                fill={isHov?"#E8B84E":"rgba(232,184,78,0.6)"}
                stroke="#E8B84E" strokeWidth={1.5}/>
              <text x={p.cx} y={p.cy+0.5} textAnchor="middle" dominantBaseline="middle"
                style={{ fontSize:r>12?9:7, fill:"#1a1407", fontWeight:700, fontFamily:"monospace", pointerEvents:"none" }}>
                {d.count}
              </text>
            </g>
          );
        })}
        {loaded && locationData.length===0 && (
          <text x={W/2} y={H/2} textAnchor="middle" dominantBaseline="middle"
            style={{ fontSize:13, fill:"#4a4535", fontStyle:"italic" }}>No location data in range</text>
        )}
      </svg>

      {hoveredState && (() => {
        const d = locationData.find(l => l.state === hoveredState);
        if (!d) return null;
        return (
          <div style={{ position:"absolute", bottom:10, left:10, background:"#1a1710", border:"1px solid #2a261e", borderRadius:4, padding:"10px 14px", fontSize:12, minWidth:160, zIndex:10, pointerEvents:"none" }}>
            <div style={{ fontWeight:600, color:"var(--accent)", marginBottom:4 }}>{d.state}</div>
            <div style={{ color:"var(--text-mid)" }}>{d.count} quote{d.count!==1?"s":""} · {fmtNum(Math.round(d.sqft))} ft²</div>
            <div style={{ color:"var(--text-dim)", fontSize:11, marginTop:4 }}>
              {d.customers.slice(0,3).join(", ")}{d.customers.length>3?` +${d.customers.length-3} more`:""}
            </div>
            <div style={{ fontSize:10, color:"var(--accent)", marginTop:4 }}>Click to view quotes →</div>
          </div>
        );
      })()}
    </div>
  );
}



function AnalyticsDashboard({ requests, onBack, onOpen }) {
  // Date range — two typed date inputs
  const defaultStart = (() => { const d = new Date(); d.setFullYear(d.getFullYear() - 1); return d.toISOString().slice(0,10); })();
  const defaultEnd = new Date().toISOString().slice(0,10);
  const [startInput, setStartInput] = useState(defaultStart);
  const [endInput, setEndInput] = useState(defaultEnd);
  const [hoveredState, setHoveredState] = useState(null);
  const [filterCustomer, setFilterCustomer] = useState("");
  const [filterState, setFilterState] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [filterSubmittedBy, setFilterSubmittedBy] = useState("");
  const [filterApprovedBy, setFilterApprovedBy] = useState("");
  const [filterFacility, setFilterFacility] = useState("");
  const [drillQuotes, setDrillQuotes] = useState(null); // { title, ids }

  const startDate = new Date(startInput + "T00:00:00").getTime();
  const endDate   = new Date(endInput   + "T23:59:59").getTime();

  const uniqueCustomers  = useMemo(() => [...new Set(requests.map(r => r.csr.customerName).filter(Boolean))].sort(), [requests]);
  const uniqueStates     = useMemo(() => [...new Set(requests.map(r => r.csr.locationState).filter(Boolean))].sort(), [requests]);
  const uniqueStatuses   = useMemo(() => [...new Set(requests.map(r => r.status))].sort(), [requests]);
  const uniqueSubmitters = useMemo(() => [...new Set([...requests.map(r => r.csr.submittedBy), ...requests.map(r => r.procurement?.submittedBy)].filter(Boolean))].sort(), [requests]);
  const uniqueApprovers  = useMemo(() => [...new Set(requests.map(r => r.finance?.decidedBy).filter(Boolean))].sort(), [requests]);
  const uniqueFacilities = useMemo(() => [...new Set(requests.map(r => r.procurement?.facilityName).filter(Boolean))].sort(), [requests]);

  const filtered = useMemo(() => {
    return requests.filter(r => {
      const t = new Date(r.createdAt).getTime();
      if (t < startDate || t > endDate) return false;
      if (filterCustomer && r.csr.customerName !== filterCustomer) return false;
      if (filterState && r.csr.locationState !== filterState) return false;
      if (filterStatus && r.status !== filterStatus) return false;
      if (filterSubmittedBy && r.csr.submittedBy !== filterSubmittedBy && r.procurement?.submittedBy !== filterSubmittedBy) return false;
      if (filterApprovedBy && r.finance?.decidedBy !== filterApprovedBy) return false;
      if (filterFacility && r.procurement?.facilityName !== filterFacility) return false;
      return true;
    });
  }, [requests, startDate, endDate, filterCustomer, filterState, filterStatus, filterSubmittedBy, filterApprovedBy, filterFacility]);

  const activeFilterCount = [filterCustomer, filterState, filterStatus, filterSubmittedBy, filterApprovedBy, filterFacility].filter(Boolean).length;
  const clearFilters = () => { setFilterCustomer(""); setFilterState(""); setFilterStatus(""); setFilterSubmittedBy(""); setFilterApprovedBy(""); setFilterFacility(""); };

  // Metrics
  const totalQuotes   = filtered.length;
  const activeQuotes  = filtered.filter(r => !["approved","archived"].includes(r.status)).length;
  const approvedQuotes = filtered.filter(r => r.status === "approved").length;
  const totalSqft     = filtered.reduce((s, r) => s + (parseFloat(r.procurement?.squareFootage) || 0), 0);
  const avgCycleDays  = (() => {
    const closed = filtered.filter(r => r.status === "approved" && r.finance?.decidedAt);
    if (!closed.length) return null;
    return Math.round(closed.reduce((s, r) => s + (new Date(r.finance.decidedAt) - new Date(r.createdAt)), 0) / closed.length / 86400000);
  })();

  // Charts data
  const byCustomer = useMemo(() => {
    const map = {};
    filtered.forEach(r => { const n = r.csr.customerName || "Unnamed"; map[n] = (map[n]||0)+1; });
    return Object.entries(map).map(([name,count]) => ({ name: name.length>18?name.slice(0,16)+"…":name, count, fullName: name }))
      .sort((a,b) => b.count - a.count).slice(0,12);
  }, [filtered]);

  const spaceByCustomer = useMemo(() => {
    const map = {};
    filtered.forEach(r => { const n = r.csr.customerName||"Unnamed"; map[n]=(map[n]||0)+totalFootprint(r.csr.items||[]); });
    return Object.entries(map).map(([name,sqft]) => ({ name: name.length>18?name.slice(0,16)+"…":name, sqft: Math.round(sqft), fullName: name }))
      .sort((a,b) => b.sqft - a.sqft).slice(0,12);
  }, [filtered]);

  const statusDist = useMemo(() => {
    const map = {};
    filtered.forEach(r => { const l = STATUS_META[r.status]?.label||r.status; map[l]=(map[l]||0)+1; });
    return Object.entries(map).map(([name,value]) => ({ name, value }));
  }, [filtered]);

  // Volume over time — line chart, grouped by week
  const volumeOverTime = useMemo(() => {
    if (!filtered.length) return [];
    const weeks = {};
    filtered.forEach(r => {
      const d = new Date(r.createdAt);
      const ws = new Date(d); ws.setDate(d.getDate()-d.getDay());
      const key = ws.toISOString().slice(0,10);
      weeks[key] = (weeks[key]||0)+1;
    });
    return Object.entries(weeks).sort((a,b)=>a[0].localeCompare(b[0]))
      .map(([date,count]) => ({ date: new Date(date).toLocaleDateString("en-US",{month:"short",day:"numeric"}), count }));
  }, [filtered]);

  // Location map
  const locationData = useMemo(() => {
    const map = {};
    filtered.forEach(r => {
      const st = r.csr.locationState;
      if (!st || !STATE_COORDS[st]) return;
      if (!map[st]) map[st] = { state:st, count:0, sqft:0, customers:new Set(), coords:STATE_COORDS[st] };
      map[st].count++; map[st].sqft+=totalFootprint(r.csr.items||[]); map[st].customers.add(r.csr.customerName||"Unnamed");
    });
    return Object.values(map).map(d => ({ ...d, customers:[...d.customers] }));
  }, [filtered]);

  // Pipeline timing — DAYS not hours
  const pipelineTiming = useMemo(() => {
    const stages = { "CSR → Procurement":[], "Procurement → Finance":[], "Finance → Decision":[] };
    filtered.forEach(r => {
      if (r.csr.submittedAt && r.createdAt)
        stages["CSR → Procurement"].push((new Date(r.csr.submittedAt)-new Date(r.createdAt))/86400000);
      if (r.procurement?.submittedAt && r.csr.submittedAt)
        stages["Procurement → Finance"].push((new Date(r.procurement.submittedAt)-new Date(r.csr.submittedAt))/86400000);
      if (r.finance?.decidedAt && r.procurement?.submittedAt)
        stages["Finance → Decision"].push((new Date(r.finance.decidedAt)-new Date(r.procurement.submittedAt))/86400000);
    });
    return Object.entries(stages).map(([name,times]) => ({
      name, days: times.length ? Math.round((times.reduce((a,b)=>a+b,0)/times.length)*10)/10 : 0
    }));
  }, [filtered]);

  // US Map geometry — real SVG paths (simplified state outlines)
  // Map projection handled inside USMap component

  // Drill-down: get quotes for a customer
  const drillToCustomer = (fullName) => {
    const ids = filtered.filter(r => r.csr.customerName === fullName).map(r => r.id);
    setDrillQuotes({ title: `Quotes for ${fullName}`, ids });

    const ids = filtered.filter(r => r.csr.locationState === state).map(r => r.id);
    setDrillQuotes({ title: `Quotes in ${state}`, ids });
  };
  const drillToStatus = (statusLabel) => {
    const statusKey = Object.keys(STATUS_META).find(k => STATUS_META[k].label === statusLabel);
    const ids = filtered.filter(r => r.status === statusKey).map(r => r.id);
    setDrillQuotes({ title: `Quotes — ${statusLabel}`, ids });
  };

  // Drill list modal

    const drillList = requests.filter(r => drillQuotes.ids.includes(r.id));
    return (
      <div className="fade-in" style={{ padding:"32px 28px", maxWidth:1100, margin:"0 auto" }}>
        <button className="btn btn-ghost btn-xs" onClick={() => setDrillQuotes(null)} style={{ marginBottom:16 }}>
          <ChevronLeft size={13}/> Back to Analytics
        </button>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
          <BarChart3 size={18} style={{ color:"var(--accent)" }}/>
          <h1 className="font-display" style={{ fontSize:28, margin:0, fontWeight:400 }}>{drillQuotes.title}</h1>
          <div style={{ flex:1 }}/>
          <span className="font-mono" style={{ fontSize:12, color:"var(--text-dim)" }}>{drillList.length} quote{drillList.length!==1?"s":""}</span>
        </div>
        <div className="panel" style={{ padding:0, overflow:"hidden" }}>
          <div className="data-row data-head" style={{ gridTemplateColumns:"140px 1.4fr 1fr 0.9fr 160px 110px" }}>
            <div className="data-cell-head" style={{ padding:"9px 14px" }}>Project ID</div>
            <div className="data-cell-head" style={{ padding:"9px 14px" }}>Customer</div>
            <div className="data-cell-head" style={{ padding:"9px 14px" }}>Location</div>
            <div className="data-cell-head" style={{ padding:"9px 14px" }}>Window</div>
            <div className="data-cell-head" style={{ padding:"9px 14px" }}>Status</div>
            <div className="data-cell-head" style={{ padding:"9px 14px", justifyContent:"flex-end" }}>Age</div>
          </div>

      <div className="panel" style={{ padding:"16px 20px", marginBottom:16 }}>

          <Calendar size={14} style={{ color:"var(--accent)" }}/>
          <div className="eyebrow-bright" style={{ whiteSpace:"nowrap" }}>Date Range</div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <label style={{ fontSize:12, color:"var(--text-dim)", whiteSpace:"nowrap" }}>From</label>
            <input type="date" className="input" value={startInput} onChange={e=>setStartInput(e.target.value)}
              style={{ fontSize:12, padding:"5px 10px", width:150, colorScheme:"dark" }}/>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <label style={{ fontSize:12, color:"var(--text-dim)", whiteSpace:"nowrap" }}>To</label>
            <input type="date" className="input" value={endInput} onChange={e=>setEndInput(e.target.value)}
              style={{ fontSize:12, padding:"5px 10px", width:150, colorScheme:"dark" }}/>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {[["7d","Last 7 days"],["30d","Last 30 days"],["90d","Last 90 days"],["1y","Last year"],["all","All time"]].map(([k,label]) => (
              <button key={k} className="btn btn-ghost btn-xs" onClick={() => {
                const now = new Date(); const e = now.toISOString().slice(0,10);
                const s = new Date(now);
                if (k==="7d")  s.setDate(now.getDate()-7);
                else if (k==="30d") s.setDate(now.getDate()-30);
                else if (k==="90d") s.setDate(now.getDate()-90);
                else if (k==="1y") s.setFullYear(now.getFullYear()-1);
                else { s.setFullYear(2020); }
                setStartInput(s.toISOString().slice(0,10)); setEndInput(e);
              }} style={{ fontSize:11 }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Filters */}
      <div className="panel" style={{ padding:"14px 20px", marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div className="eyebrow-bright" style={{ whiteSpace:"nowrap" }}>Filters</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:8, flex:1 }}>
            <select className="select" value={filterCustomer} onChange={e=>setFilterCustomer(e.target.value)} style={{ fontSize:11.5, padding:"5px 8px" }}>
              <option value="">All Customers</option>
              {uniqueCustomers.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <select className="select" value={filterState} onChange={e=>setFilterState(e.target.value)} style={{ fontSize:11.5, padding:"5px 8px" }}>
              <option value="">All States</option>
              {uniqueStates.map(s=><option key={s} value={s}>{s}</option>)}

            <select className="select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{ fontSize:11.5, padding:"5px 8px" }}>
              <option value="">All Statuses</option>
              {uniqueStatuses.map(s=><option key={s} value={s}>{STATUS_META[s]?.label||s}</option>)}

            <select className="select" value={filterSubmittedBy} onChange={e=>setFilterSubmittedBy(e.target.value)} style={{ fontSize:11.5, padding:"5px 8px" }}>
              <option value="">All Submitters</option>
              {uniqueSubmitters.map(u=><option key={u} value={u}>{u}</option>)}

            <select className="select" value={filterApprovedBy} onChange={e=>setFilterApprovedBy(e.target.value)} style={{ fontSize:11.5, padding:"5px 8px" }}>

              <X size={12}/> Clear {activeFilterCount} filter{activeFilterCount>1?"s":""}

        </div>
      </div>

      {/* Metric strip */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12, marginBottom:24 }}>

          { label:"Approved",        value:approvedQuotes,color:"var(--success)" },

      {/* Row 1: Quotes by Customer + Status Donut */}
      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:16, marginBottom:16 }}>
        <div className="panel" style={{ padding:20 }}>

          {byCustomer.length>0 ? (
            <ResponsiveContainer width="100%" height={280}>
              <BarChart data={byCustomer} layout="vertical" margin={{ left:10, right:20 }}

            <ResponsiveContainer width="100%" height={280}>

                </Pie>
                <Tooltip contentStyle={customTooltipStyle}/>
                <Legend wrapperStyle={{ fontSize:11, color:"#8a7f6e" }}/>

            </ResponsiveContainer>
          ) : <div style={{ padding:40, textAlign:"center", color:"var(--text-faint)", fontStyle:"italic" }}>No data in range</div>}

      {/* Row 2: Space by Customer + Volume Line Chart */}

        <div className="panel" style={{ padding:20 }}>

                <Bar dataKey="sqft" name="Sq Ft" fill="#8DB4C9" radius={[0,3,3,0]} style={{ cursor:"pointer" }}/>
              </BarChart>
            </ResponsiveContainer>
          ) : <div style={{ padding:40, textAlign:"center", color:"var(--text-faint)", fontStyle:"italic" }}>No footprint data in range</div>}
        </div>

        <div className="panel" style={{ padding:20 }}>

            <ResponsiveContainer width="100%" height={260}>
              <AreaChart data={volumeOverTime} margin={{ left:-10, right:10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2a261e"/>
                <XAxis dataKey="date" tick={{ fill:"#8a7f6e", fontSize:10 }} axisLine={{ stroke:"#2a261e" }}/>

          ) : <div style={{ padding:40, textAlign:"center", color:"var(--text-faint)", fontStyle:"italic" }}>Not enough data for timeline</div>}
        </div>
      </div>

      {/* Row 3: Real US Map + Pipeline Timing in Days */}
      <div style={{ display:"grid", gridTemplateColumns:"1.5fr 1fr", gap:16 }}>
        <div className="panel" style={{ padding:20 }}>
          <div className="eyebrow-bright" style={{ marginBottom:12 }}>Storage Locations <span style={{ fontSize:10, color:"var(--text-faint)", fontWeight:400, letterSpacing:0 }}>— click state to drill</span></div>
          <div style={{ position:"relative" }}>
            <USMap

              onStateClick={drillToState}
              hoveredState={hoveredState}

            {hoveredState && (() => {
              const d = locationData.find(l=>l.state===hoveredState);
              if (!d) return null;
              return (
                <div style={{ position:"absolute", bottom:10, left:10, background:"#1a1710", border:"1px solid #2a261e", borderRadius:4, padding:"10px 14px", fontSize:12, minWidth:160, zIndex:10 }}>

                  <div style={{ color:"var(--text-mid)" }}>{d.count} quote{d.count!==1?"s":""} · {fmtNum(Math.round(d.sqft))} ft²</div>

        </div>

        <div className="panel" style={{ padding:20 }}>
          <div className="eyebrow-bright" style={{ marginBottom:16 }}>Avg Pipeline Timing (days)</div>
          {pipelineTiming.some(p=>p.days>0) ? (
            <ResponsiveContainer width="100%" height={280}>
              <BarChart data={pipelineTiming} margin={{ left:-10, right:10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2a261e"/>
                <XAxis dataKey="name" tick={{ fill:"#8a7f6e", fontSize:10 }} axisLine={{ stroke:"#2a261e" }}/>
                <YAxis tick={{ fill:"#8a7f6e", fontSize:11 }} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={customTooltipStyle} formatter={v=>[v+" days","Avg Time"]}/>
                <Bar dataKey="days" name="Days" radius={[3,3,0,0]}>
                  {pipelineTiming.map((_,i) => <Cell key={i} fill={["#E8B84E","#8DB4C9","#A8D5B9"][i]}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          ) : <div style={{ padding:40, textAlign:"center", color:"var(--text-faint)", fontStyle:"italic" }}>Not enough completed quotes to measure timing</div>}
        </div>
      </div>
    </div>
  );
}

function SearchResults({ query, results, onOpen, onBack }) {
  const [filter, setFilter] = useState(query);
  const filtered = results.filter(r => {
    const q = filter.toLowerCase();
    return (
      r.id.toLowerCase().includes(q) ||
      (r.csr.customerName || "").toLowerCase().includes(q) ||
      (r.csr.locationCity || "").toLowerCase().includes(q) ||
      (r.csr.locationState || "").toLowerCase().includes(q)
    );
  });

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1200, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13} /> Back to Dashboard
      </button>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <Hash size={18} style={{ color: "var(--accent)" }} />
        <h1 className="font-display" style={{ fontSize: 32, margin: 0, lineHeight: 1.1, fontWeight: 400 }}>
          Search Results
        </h1>
      </div>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 20 }}>
        {filtered.length} result{filtered.length === 1 ? "" : "s"} matching "{filter}"
      </p>

      <div style={{ marginBottom: 20 }}>
        <input
          type="text"
          className="input"
          value={filter}
          onChange={e => setFilter(e.target.value)}
          placeholder="Refine search — customer name, project ID, city, or state"
          style={{ maxWidth: 500, fontSize: 13 }}
          autoFocus
        />
      </div>

      <div className="panel" style={{ padding: 0, overflow: "hidden" }}>
        <div className="data-row data-head" style={{ gridTemplateColumns: "140px 1.4fr 1fr 0.8fr 160px 100px" }}>
          <div className="data-cell-head" style={{ padding: "9px 14px" }}>Project ID</div>
          <div className="data-cell-head" style={{ padding: "9px 14px" }}>Customer</div>
          <div className="data-cell-head" style={{ padding: "9px 14px" }}>Location</div>
          <div className="data-cell-head" style={{ padding: "9px 14px" }}>Window</div>
          <div className="data-cell-head" style={{ padding: "9px 14px" }}>Status</div>
          <div className="data-cell-head" style={{ padding: "9px 14px", justifyContent: "flex-end" }}>Age</div>

        {filtered.length === 0 ? (
          <div style={{ padding: 28, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>

            key={r.id}

            style={{ gridTemplateColumns: "140px 1.4fr 1fr 0.8fr 160px 100px" }}

          >
            <div className="data-cell font-mono" style={{ padding: "9px 14px", fontSize: 12, color: "var(--accent)" }}>{r.id}</div>
            <div className="data-cell" style={{ padding: "9px 14px", fontSize: 13, color: "var(--text)", fontWeight: 500 }}>
              {r.csr.customerName || <span style={{ color: "var(--text-faint)", fontStyle: "italic" }}>Unnamed</span>}
            </div>
            <div className="data-cell" style={{ padding: "9px 14px", fontSize: 12.5, color: "var(--text-mid)" }}>
              {r.csr.locationCity ? `${r.csr.locationCity}${r.csr.locationState ? ", " + r.csr.locationState : ""}` : "—"}
            </div>
            <div className="data-cell font-mono" style={{ padding: "9px 14px", fontSize: 12, color: "var(--text-mid)" }}>
              {fmtDate(r.csr.storageStartDate)} → {fmtDate(r.csr.storageEndDate)}
            </div>
            <div className="data-cell" style={{ padding: "9px 14px" }}><StatusBadge status={r.status} /></div>
            <div className="data-cell font-mono" style={{ padding: "9px 14px", fontSize: 12, color: "var(--text-dim)", justifyContent: "flex-end" }}>
              {fmtDuration(r.createdAt)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// PASSWORD CHANGE (self-service)
// ============================================================
function PasswordChange({ auth, onBack, onSuccess }) {
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  const handleChange = async () => {
    if (!currentPw || !newPw || !confirmPw) { setError("All fields are required."); return; }
    if (newPw !== confirmPw) { setError("New passwords don't match."); return; }
    if (newPw.length < 4) { setError("Password must be at least 4 characters."); return; }
    // Verify current password
    const result = await authenticateUser(auth.email, currentPw);
    if (result === "bad_password" || !result) { setError("Current password is incorrect."); return; }
    // Save new password to Supabase (creates or updates user row)
    await saveManagedUser({ email: auth.email, role: auth.role, name: auth.name, password: newPw });
    setDone(true);
    setError("");
    if (onSuccess) onSuccess();
  };

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 500, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13} /> Back
      </button>

      <h1 className="font-display" style={{ fontSize: 28, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        Change Password
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Logged in as <span style={{ color: "var(--text)", fontWeight: 500 }}>{auth.name}</span> ({auth.email})
      </p>

      {done ? (
        <div className="panel" style={{ padding: 28, textAlign: "center" }}>
          <CheckCircle2 size={24} style={{ color: "var(--success)", marginBottom: 10 }} />
          <div style={{ fontSize: 15, fontWeight: 500, color: "var(--success)", marginBottom: 6 }}>Password updated</div>
          <div style={{ fontSize: 13, color: "var(--text-mid)" }}>Your new password is active. Use it next time you log in.</div>
          <button className="btn" onClick={onBack} style={{ marginTop: 16 }}>Back to Dashboard</button>
        </div>
      ) : (
        <div className="panel" style={{ padding: 24 }}>
          <div style={{ marginBottom: 14 }}>
            <div className="field-label field-label-required">Current Password</div>
            <input type="password" className="input" value={currentPw}
              onChange={e => { setCurrentPw(e.target.value); setError(""); }}
              placeholder="••••••••" />
          </div>
          <div style={{ marginBottom: 14 }}>
            <div className="field-label field-label-required">New Password</div>
            <input type="password" className="input" value={newPw}
              onChange={e => { setNewPw(e.target.value); setError(""); }}
              placeholder="At least 4 characters" />
          </div>
          <div style={{ marginBottom: 14 }}>
            <div className="field-label field-label-required">Confirm New Password</div>
            <input type="password" className="input" value={confirmPw}
              onChange={e => { setConfirmPw(e.target.value); setError(""); }}
              onKeyDown={e => { if (e.key === "Enter") handleChange(); }}
              placeholder="Type again to confirm" />
          </div>
          {error && (
            <div style={{ padding: "10px 12px", fontSize: 12.5, color: "var(--warning)", border: "1px solid var(--warning-dim)", borderRadius: 3, background: "rgba(232,155,111,0.06)", marginBottom: 14 }}>
              {error}
            </div>
          )}
          <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={handleChange}>
            Update Password
          </button>
        </div>
      )}
    </div>
  );
}

function QuoteCreation({ requests, onBack, onBuildQuote, auth }) {
  const approved = requests.filter(r => r.status === "approved");
  const needsQuote = approved.filter(r => !r.financeQuote);
  const quoteBuilt = approved.filter(r => !!r.financeQuote);
  const [tab, setTab] = useState("needs");

  const active = tab === "needs" ? needsQuote : quoteBuilt;

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1200, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13}/> Back to Dashboard
      </button>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <DollarSign size={18} style={{ color: "var(--accent)" }}/>
        <h1 className="font-display" style={{ fontSize: 32, margin: 0, lineHeight: 1.1, fontWeight: 400 }}>
          Quote Creation
        </h1>
        <div style={{ flex: 1 }}/>
        <span className="font-mono" style={{ fontSize: 12, color: "var(--text-dim)" }}>
          {approved.length} approved quote{approved.length !== 1 ? "s" : ""}
        </span>
      </div>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: "0 0 24px" }}>
        Build customer-facing quote documents from approved requests.
      </p>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, borderBottom: "1px solid var(--border-mid)", marginBottom: 20 }}>
        {[
          { id: "needs", label: "Needs Quote", count: needsQuote.length },
          { id: "built", label: "Quote Built", count: quoteBuilt.length },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: "12px 20px", background: "transparent", border: "none",
            borderBottom: `2px solid ${tab === t.id ? "var(--accent)" : "transparent"}`,
            color: tab === t.id ? "var(--text)" : "var(--text-dim)",
            fontFamily: "inherit", fontSize: 13, fontWeight: 500, cursor: "pointer", marginBottom: -1,
            display: "flex", alignItems: "center", gap: 8,
          }}>
            {t.label}
            <span style={{
              fontFamily: "'Geist Mono', monospace", fontSize: 11,
              padding: "1px 6px", border: "1px solid var(--border-mid)", borderRadius: 2,
              color: tab === t.id && t.id === "needs" ? "var(--warning)" : "var(--text-dim)",
              borderColor: tab === t.id && t.id === "needs" ? "var(--warning-dim)" : "var(--border-mid)",
            }}>{t.count}</span>
          </button>
        ))}
      </div>

      {active.length === 0 ? (
        <div className="panel" style={{ padding: 40, textAlign: "center" }}>
          <EmptyState
            icon={tab === "needs" ? CheckCircle2 : FileText}
            title={tab === "needs" ? "All quotes are built" : "No quotes built yet"}
            body={tab === "needs" ? "Every approved quote already has a customer document." : "Approve quotes and build them here."}
          />

function RequestDetail({ request: rawRequest, role, onBack, onUpdate, onDelete, userName, allRequests, isAdmin }) {
  // Normalize old quotes missing fields added in later schema versions
  const request = {
    ...rawRequest,
    changeLog: rawRequest.changeLog || [],
    touchLog: rawRequest.touchLog || [],
    sharedNotes: rawRequest.sharedNotes || [],
    sharedAttachments: rawRequest.sharedAttachments || [],
    csr: {
      locationLat: null, locationLng: null, locationInternational: false,
      ...rawRequest.csr,
      items: (rawRequest.csr?.items || []).map(it => ({ handlingRequired: "", outboundHandling: "", itemsPerShipment: "", ...it })),
    },
    procurement: {
      facilityCity: "", facilityState: "", facilityLat: null, facilityLng: null, facilityInternational: false,
      handlingCosts: [], attachments: [],
      ...rawRequest.procurement,
    },
    finance: { decision: null, followUpNotes: "", decidedBy: "", decidedAt: null, ...rawRequest.finance },
  };
  const status = request.status;

  const handleUpdateId = async (newId) => {
    if (newId === request.id) return;
    await onUpdate({ ...request, id: newId, updatedAt: new Date().toISOString() }, { silent: true, idChange: { oldId: request.id, newId } });
  };

  const handleAddNote = async (note) => {
    const nextNotes = [...(request.sharedNotes || []), note];
    await onUpdate({ ...request, sharedNotes: nextNotes, updatedAt: new Date().toISOString() }, { silent: true, touchAction: "post_note", touchDetail: "Posted a shared note" });
  };

  const handleAddAttachments = async (files) => {
    const next = [...(request.sharedAttachments || []), ...files];
    const names = files.map(f => f.name).join(", ");
    await onUpdate({ ...request, sharedAttachments: next, updatedAt: new Date().toISOString() }, { silent: true, touchAction: "upload_file", touchDetail: "Uploaded: " + names });
  };

  const handleRemoveAttachment = async (id) => {
    const removed = (request.sharedAttachments || []).find(a => a.id === id);
    const next = (request.sharedAttachments || []).filter(a => a.id !== id);
    await onUpdate({ ...request, sharedAttachments: next, updatedAt: new Date().toISOString() }, { silent: true, touchAction: "remove_file", touchDetail: "Removed: " + (removed?.name || "file") });
  };

  const handleCsrSaveDraft = async (csrData, pendingId) => {
    const opts = pendingId && pendingId !== request.id
      ? { idChange: { oldId: request.id, newId: pendingId } }
      : {};
    await onUpdate({ ...request, id: pendingId || request.id, csr: csrData, status: "draft_csr", updatedAt: new Date().toISOString() }, opts);
  };
  const handleCsrSubmit = async (csrData, pendingId) => {
    const opts = pendingId && pendingId !== request.id
      ? { idChange: { oldId: request.id, newId: pendingId } }
      : {};
    await onUpdate({
      ...request,
      id: pendingId || request.id,
      csr: { ...csrData, submittedAt: new Date().toISOString() },
      status: "awaiting_procurement",
      updatedAt: new Date().toISOString(),
    }, opts);
  };
  const handleProcSaveDraft = async (procData) => {
    await onUpdate({ ...request, procurement: procData, status: "draft_procurement", updatedAt: new Date().toISOString() });
  };
  const handleProcSubmit = async (procData) => {
    await onUpdate({
      ...request,
      procurement: { ...procData, submittedAt: new Date().toISOString() },
      status: "awaiting_finance",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleApprove = async ({ decidedBy }) => {
    await onUpdate({
      ...request,
      finance: { decision: "approved", followUpNotes: "", decidedBy, decidedAt: new Date().toISOString() },
      status: "approved",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleFollowUp = async ({ decidedBy, followUpNotes }) => {
    await onUpdate({
      ...request,
      finance: { decision: "follow_up", followUpNotes, decidedBy, decidedAt: new Date().toISOString() },
      status: "follow_up",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleRevisionCsr = async ({ requestedBy, requestedByRole, notes }) => {
    await onUpdate({
      ...request,
      csrRevision: { requestedBy, requestedAt: new Date().toISOString(), requestedByRole, notes },
      status: "revision_csr",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleArchive = async () => {
    await onUpdate({
      ...request,
      status: "archived",
      updatedAt: new Date().toISOString(),
    });
  };
  const handleUnarchive = async () => {
    await onUpdate({
      ...request,
      status: "approved",
      updatedAt: new Date().toISOString(),
    });
  };
  const collabProps = { userName, onAddNote: handleAddNote, onAddAttachments: handleAddAttachments, onRemoveAttachment: handleRemoveAttachment, onDelete: onDelete ? () => onDelete(request.id) : null, allRequests, onUpdateId: handleUpdateId, isAdmin };

  // ---- Approved — CSR and Procurement see pending message ----
  if (status === "approved" && role !== "finance" && !isAdmin) {
    return (
      <div className="fade-in" style={{ padding: "48px 28px", maxWidth: 600, margin: "0 auto", textAlign: "center" }}>
        <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 32, display: "block", margin: "0 auto 32px" }}>
          <ChevronLeft size={13}/> Back to Dashboard
        </button>
        <div className="panel" style={{ padding: "48px 40px" }}>
          <div style={{ width: 52, height: 52, borderRadius: "50%", background: "rgba(232,184,78,0.12)", border: "1px solid var(--accent-dim)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
            <CheckCircle2 size={24} style={{ color: "var(--accent)" }}/>
          </div>
          <div className="font-display" style={{ fontSize: 22, fontWeight: 400, color: "var(--text)", marginBottom: 10 }}>
            Pending Finalized Quote Documentation
          </div>
          <div style={{ fontSize: 14, color: "var(--text-mid)", lineHeight: 1.7, marginBottom: 24 }}>
            This request has been approved by Finance. Final quote documentation is being prepared and will be delivered to the team outside of this system.
          </div>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", alignItems: "center" }}>
            <StatusBadge status={status}/>
            <span className="font-mono" style={{ fontSize: 12, color: "var(--text-faint)" }}>{request.id}</span>
          </div>
          {request.csr?.customerName && (
            <div style={{ marginTop: 12, fontSize: 13, color: "var(--text-dim)" }}>
              {request.csr.customerName}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---- Archived — everyone sees tracker, only admin can restore ----
  if (status === "archived") {
    return <TrackerView request={request} role={role} onBack={onBack}
      onUnarchive={isAdmin ? handleUnarchive : null} {...collabProps} />;
  }

  // ---- CSR view ----
  if (role === "csr") {
    if (["draft_csr", "revision_csr"].includes(status)) {
      return <CSRForm request={request} onSaveDraft={handleCsrSaveDraft} onSubmit={handleCsrSubmit} onBack={onBack} role={role} {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
  }

  // ---- Procurement view ----
  if (role === "procurement") {
    if (["awaiting_procurement", "draft_procurement", "follow_up"].includes(status)) {
      return <ProcurementForm request={request} onSaveDraft={handleProcSaveDraft} onSubmit={handleProcSubmit} onRevisionCsr={handleRevisionCsr} onBack={onBack} role={role} {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
  }

  // ---- Finance view — sees everything, full controls ----
  if (role === "finance") {
    if (status === "awaiting_finance") {
      return <FinanceReview request={request} onApprove={handleApprove} onFollowUp={handleFollowUp} onRevisionCsr={handleRevisionCsr} onBack={onBack} role={role} {...collabProps} />;
    }
    if (status === "approved") {
      return <TrackerView request={request} role={role} onBack={onBack}
        onArchive={isAdmin ? handleArchive : null}
        {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
  }

  // ---- Admin view — full access everywhere ----
  if (isAdmin) {
    if (status === "awaiting_finance") {
      return <FinanceReview request={request} onApprove={handleApprove} onFollowUp={handleFollowUp} onRevisionCsr={handleRevisionCsr} onBack={onBack} role={role} {...collabProps} />;
    }
    if (["draft_csr", "revision_csr"].includes(status)) {
      return <CSRForm request={request} onSaveDraft={handleCsrSaveDraft} onSubmit={handleCsrSubmit} onBack={onBack} role={role} {...collabProps} />;
    }
    if (["awaiting_procurement", "draft_procurement", "follow_up"].includes(status)) {
      return <ProcurementForm request={request} onSaveDraft={handleProcSaveDraft} onSubmit={handleProcSubmit} onRevisionCsr={handleRevisionCsr} onBack={onBack} role={role} {...collabProps} />;
    }
    return <TrackerView request={request} role={role} onBack={onBack}
      onArchive={handleArchive} onUnarchive={handleUnarchive} {...collabProps} />;
  }

  return <TrackerView request={request} role={role} onBack={onBack} {...collabProps} />;
}
