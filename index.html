function ProcurementForm({ request, onSaveDraft, onSubmit, onRevisionCsr, onBack, readOnly, role, userName, onAddNote, onAddAttachments, onRemoveAttachment, onDelete }) {
  const [data, setData] = useState(request.procurement);
  const [csrRevNotes, setCsrRevNotes] = useState("");
  const [showCsrRev, setShowCsrRev] = useState(false);
  const submitter = request.procurement.submittedBy || userName || "";
  const fileInputRef = useRef(null);

  const setField = (k, v) => setData(d => ({ ...d, [k]: v }));
  const setHandling = (id, patch) => setData(d => ({
    ...d,
    handlingCosts: d.handlingCosts.map(r => r.id === id ? { ...r, ...patch } : r),
  }));
  const addHandling = () => setData(d => ({ ...d, handlingCosts: [...d.handlingCosts, blankHandling()] }));
  const removeHandling = (id) => setData(d => ({
    ...d,
    handlingCosts: d.handlingCosts.length > 1 ? d.handlingCosts.filter(r => r.id !== id) : d.handlingCosts,
  }));

  const handleFiles = async (files) => {
    const arr = Array.from(files);
    const processed = await Promise.all(arr.map(async (f) => {
      const meta = {
        id: genRowId(),
        name: f.name,
        size: f.size,
        type: f.type,
        dataUrl: null,
      };
      // Only inline small images as data URLs for preview
      if (f.type.startsWith("image/") && f.size < 400_000) {
        try {
          meta.dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = () => rej();
            r.readAsDataURL(f);
          });
        } catch { /* ignore */ }
      }
      return meta;
    }));
    setData(d => ({ ...d, attachments: [...d.attachments, ...processed] }));
  };

  const removeAttachment = (id) => setData(d => ({
    ...d,
    attachments: d.attachments.filter(a => a.id !== id),
  }));

  const validate = () => {
    const errs = [];
    if (!data.facilityName.trim()) errs.push("Facility name");
    if (!data.facilityLocation.trim()) errs.push("Facility location");
    if (!data.squareFootage) errs.push("Square footage");
    if (!data.storageCosts) errs.push("Storage cost");
    if (!data.insuranceCostPer1000) errs.push("Insurance cost per $1000");
    if (!data.meetsRequirements) errs.push("Meets requirements answer");
    if (!data.capacityConfirmed) errs.push("Capacity confirmation");
    if (!submitter.trim()) errs.push("Your name");
    return errs;
  };
  const errors = validate();
  const canSubmit = errors.length === 0 && !readOnly;

  const buildPayload = () => ({
    ...data,
    submittedBy: submitter,
  });

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <button className="btn btn-ghost btn-xs" onClick={onBack}>
          <ChevronLeft size={13} /> Back
        </button>
        {onDelete && (
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        )}
      </div>

      <div style={{ marginBottom: 8 }}>
        <StageMarker num={2} label="Procurement Quote" />
      </div>
      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        {readOnly ? "Procurement Offer" : "Facility Offer & Costs"}
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Submit the facility you're offering and the rate structure. Finance will use this to build the final customer quote.
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* Follow-up alert from Finance */}
      {request.status === "follow_up" && request.finance.followUpNotes && (
        <div className="panel" style={{
          padding: 20, marginBottom: 18,
          borderColor: "var(--warning-dim)",
          background: "linear-gradient(180deg, rgba(232,155,111,0.08) 0%, rgba(232,155,111,0.02) 100%)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <AlertCircle size={16} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>Finance Requested Follow-up</div>
            <div style={{ flex: 1 }} />
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
              {request.finance.decidedBy} · {fmtDateTime(request.finance.decidedAt)}
            </span>
          </div>
          <div style={{ fontSize: 13.5, color: "var(--text)", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>
            {request.finance.followUpNotes}
          </div>
          <div style={{ marginTop: 10, fontSize: 12, color: "var(--text-mid)" }}>
            Update the offer below and resubmit to send back to Finance.
          </div>
        </div>
      )}

      {/* CSR snapshot */}
      <CsrSnapshot request={request} />

      {/* Facility */}
      <div className="panel" style={{ padding: 20, marginBottom: 18, marginTop: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <Building2 size={15} style={{ color: "var(--cool)" }} />
          <div className="eyebrow-bright">Facility Details</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1.2fr 0.8fr", gap: 14 }}>
          <div>
            <div className="field-label field-label-required">Facility Name</div>
            <input className="input" value={data.facilityName} disabled={readOnly}
              onChange={e => setField("facilityName", e.target.value)}
              placeholder="e.g. Northside Logistics – Building 4" />
          </div>
          <div>
            <div className="field-label field-label-required">Facility Location</div>
            <input className="input" value={data.facilityLocation} disabled={readOnly}
              onChange={e => setField("facilityLocation", e.target.value)}
              placeholder="City, State (or full address)" />
          </div>
          <div>
            <div className="field-label field-label-required">SqFt Available</div>
            <input type="number" min="0" className="input input-mono" value={data.squareFootage} disabled={readOnly}
              onChange={e => setField("squareFootage", e.target.value)}
              placeholder="0" />
          </div>
        </div>
        <div style={{ marginTop: 14 }}>
          <div className="field-label field-label-required">Your Name (Submitter)</div>
          <input className="input" value={submitter} disabled
            placeholder="e.g. Sam Patel" style={{ maxWidth: 360 }} />
        </div>
      </div>

      {/* Handling Costs */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <Truck size={15} style={{ color: "var(--cool)" }} />
          <div className="eyebrow-bright">Handling Costs</div>
          <div style={{ flex: 1 }} />
          <span className="font-mono" style={{ fontSize: 11.5, color: "var(--text-dim)" }}>
            {data.handlingCosts.length} line{data.handlingCosts.length === 1 ? "" : "s"}
          </span>
        </div>

        <div className="panel-inset" style={{ overflow: "hidden" }}>
          <div className="data-row data-head" style={{ gridTemplateColumns: "1.4fr 1fr 1fr 40px" }}>
            <div className="data-cell-head">Equipment / Service</div>
            <div className="data-cell-head">Rate (USD)</div>
            <div className="data-cell-head">Unit</div>
            <div className="data-cell-head" />
          </div>
          {data.handlingCosts.map((row) => (
            <div key={row.id} className="data-row" style={{ gridTemplateColumns: "1.4fr 1fr 1fr 40px" }}>
              <div className="data-cell" style={{ padding: "8px 12px" }}>
                <input className="input" value={row.equipment} disabled={readOnly}
                  onChange={e => setHandling(row.id, { equipment: e.target.value })}
                  list={`eq-${row.id}`}
                  placeholder="e.g. Forklift" />
                <datalist id={`eq-${row.id}`}>
                  {EQUIPMENT_PRESETS.map(p => <option key={p} value={p} />)}
                </datalist>
              </div>
              <div className="data-cell" style={{ padding: "8px 12px" }}>
                <input type="number" min="0" step="0.01" className="input input-mono"
                  disabled={readOnly}
                  value={row.rate}
                  onChange={e => setHandling(row.id, { rate: e.target.value })}
                  placeholder="0.00" />
              </div>
              <div className="data-cell" style={{ padding: "8px 12px" }}>
                <select className="select" disabled={readOnly}
                  value={row.unit}
                  onChange={e => setHandling(row.id, { unit: e.target.value })}>
                  <option value="per_unit">per unit</option>
                  <option value="per_truckload">per truckload</option>
                  <option value="per_hour">per hour</option>
                  <option value="per_day">per day</option>
                  <option value="flat">flat fee</option>
                </select>
              </div>
              <div className="data-cell" style={{ padding: "8px 12px", justifyContent: "center" }}>
                {!readOnly && data.handlingCosts.length > 1 && (
                  <button className="btn btn-ghost btn-xs" onClick={() => removeHandling(row.id)}>
                    <Trash2 size={12} />
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>

        {!readOnly && (
          <button className="btn btn-xs" style={{ marginTop: 10 }} onClick={addHandling}>
            <Plus size={12} /> Add handling line
          </button>
        )}
      </div>

      {/* Storage & Insurance */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
        <div className="panel" style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <Warehouse size={14} style={{ color: "var(--cool)" }} />
            <div className="eyebrow-bright">Storage Costs</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1.2fr", gap: 12 }}>
            <div>
              <div className="field-label field-label-required">Rate (USD)</div>
              <input type="number" min="0" step="0.01" className="input input-mono"
                disabled={readOnly}
                value={data.storageCosts}
                onChange={e => setField("storageCosts", e.target.value)}
                placeholder="0.00" />
            </div>
            <div>
              <div className="field-label">Basis</div>
              <select className="select" disabled={readOnly}
                value={data.storageCostsUnit}
                onChange={e => setField("storageCostsUnit", e.target.value)}>
                <option value="per_sqft_month">per sqft / month</option>
                <option value="per_pallet_month">per pallet / month</option>
                <option value="per_sqft_day">per sqft / day</option>
                <option value="per_pallet_day">per pallet / day</option>
                <option value="flat_month">flat / month</option>
              </select>
            </div>
          </div>
        </div>

        <div className="panel" style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <DollarSign size={14} style={{ color: "var(--cool)" }} />
            <div className="eyebrow-bright">Insurance</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <div className="field-label">Coverage Limit (USD)</div>
              <input type="number" min="0" className="input input-mono"
                disabled={readOnly}
                value={data.insuranceLimit}
                onChange={e => setField("insuranceLimit", e.target.value)}
                placeholder="e.g. 100000" />
            </div>
            <div>
              <div className="field-label field-label-required">Cost per $1,000 Value</div>
              <input type="number" min="0" step="0.01" className="input input-mono"
                disabled={readOnly}
                value={data.insuranceCostPer1000}
                onChange={e => setField("insuranceCostPer1000", e.target.value)}
                placeholder="0.00" />
            </div>
          </div>
        </div>
      </div>

      {/* Capacity Check */}
      {(() => {
        const items = request.csr.items || [];
        const totalFp = totalFootprint(items);
        const sqft = parseFloat(data.squareFootage) || 0;
        const utilization = totalFp > 0 && sqft > 0 ? (totalFp / sqft) * 100 : null;
        const comfortable = utilization !== null && utilization <= 80;
        const tight = utilization !== null && utilization > 80 && utilization <= 100;
        const overflow = utilization !== null && utilization > 100;

        return (
          <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
              <Ruler size={15} style={{ color: "var(--cool)" }} />
              <div className="eyebrow-bright">Capacity Check</div>
              <div style={{ flex: 1 }} />
              <div style={{ fontSize: 10.5, color: "var(--text-faint)", letterSpacing: "0.1em", textTransform: "uppercase" }}>
                Procurement to confirm
              </div>
            </div>

            {/* Quick-read numbers */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: "1px solid var(--border)", borderRadius: 3, marginBottom: 14, overflow: "hidden" }}>
              <div style={{ padding: "12px 14px", borderRight: "1px solid var(--border)" }}>
                <div className="eyebrow" style={{ marginBottom: 5 }}>Items to Store</div>
                <div className="font-mono" style={{ fontSize: 15, color: "var(--text)" }}>
                  {items.length} <span style={{ color: "var(--text-dim)", fontSize: 11 }}>line{items.length === 1 ? "" : "s"}</span>
                </div>
              </div>
              <div style={{ padding: "12px 14px", borderRight: "1px solid var(--border)" }}>
                <div className="eyebrow" style={{ marginBottom: 5 }}>Total Footprint</div>
                <div className="font-mono" style={{ fontSize: 15, color: "var(--text)" }}>
                  {totalFp > 0 ? totalFp.toFixed(1) : "—"} <span style={{ color: "var(--text-dim)", fontSize: 11 }}>ft²</span>
                </div>
              </div>
              <div style={{ padding: "12px 14px" }}>
                <div className="eyebrow" style={{ marginBottom: 5 }}>Facility Sq Ft</div>
                <div className="font-mono" style={{ fontSize: 15, color: sqft > 0 ? "var(--text)" : "var(--text-faint)" }}>
                  {sqft > 0 ? fmtNum(sqft) : "enter above"} <span style={{ color: "var(--text-dim)", fontSize: 11 }}>{sqft > 0 ? "ft²" : ""}</span>
                </div>
              </div>
            </div>

            {/* Utilization readout */}
            <div style={{ marginBottom: 14 }}>
              <div className="field-label">Utilization</div>
              {utilization !== null ? (
                <div className="panel-inset" style={{ padding: "10px 14px" }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                    <span className="font-mono" style={{ fontSize: 15, color: "var(--text)" }}>
                      {fmtNum(Math.ceil(totalFp))} ft² of {fmtNum(sqft)} ft²
                    </span>
                    <span style={{
                      fontSize: 11,
                      padding: "2px 8px",
                      borderRadius: 2,
                      letterSpacing: "0.1em",
                      textTransform: "uppercase",
                      fontWeight: 500,
                      color: comfortable ? "var(--success)" : tight ? "var(--warning)" : "var(--danger)",
                      border: `1px solid ${comfortable ? "var(--success)" : tight ? "var(--warning)" : "var(--danger)"}`,
                    }}>
                      {utilization.toFixed(0)}% used · {comfortable ? "comfortable" : tight ? "tight" : "overflow"}
                    </span>
                  </div>
                  <div style={{ marginTop: 10, height: 5, background: "var(--bg-2)", borderRadius: 999, overflow: "hidden" }}>
                    <div style={{
                      width: `${Math.min(utilization, 100)}%`,
                      height: "100%",
                      background: comfortable ? "var(--success)" : tight ? "var(--warning)" : "var(--danger)",
                      transition: "width 180ms ease-out",
                    }} />
                  </div>
                  <div style={{ marginTop: 8, fontSize: 11, color: "var(--text-faint)", fontStyle: "italic" }}>
                    Raw footprint only — doesn't account for aisles, pallet geometry, or how items actually lay out. Use judgment.
                  </div>
                </div>
              ) : (
                <div className="panel-inset" style={{ padding: "10px 14px", color: "var(--text-faint)", fontStyle: "italic", fontSize: 12.5 }}>
                  Enter facility sq ft above to see utilization against item footprint. You can still confirm capacity based on your own judgment.
                </div>
              )}
            </div>

            <div className="field-label field-label-required">Can this facility accommodate the full item footprint?</div>
            <div style={{ display: "flex", gap: 8 }}>
              {[
                { v: "yes", label: "Yes — fits comfortably", color: "var(--success)", Icon: CheckCircle2 },
                { v: "no",  label: "No — insufficient space", color: "var(--warning)", Icon: AlertCircle },
              ].map(opt => (
                <button
                  key={opt.v}
                  disabled={readOnly}
                  onClick={() => setField("capacityConfirmed", opt.v)}
                  className="btn"
                  style={{
                    flex: 1,
                    justifyContent: "center",
                    padding: "12px",
                    borderColor: data.capacityConfirmed === opt.v ? opt.color : "var(--border-mid)",
                    background: data.capacityConfirmed === opt.v ? "rgba(241,227,197,0.03)" : "transparent",
                    color: data.capacityConfirmed === opt.v ? opt.color : "var(--text-mid)",
                  }}
                >
                  <opt.Icon size={15} />
                  {opt.label}
                </button>
              ))}
            </div>
            <div style={{ marginTop: 8, fontSize: 11.5, color: "var(--text-faint)" }}>
              Your attestation. Surfaces on Finance review and the final approval screen.
            </div>
          </div>
        );
      })()}

      {/* Requirements + Notes */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <AlertCircle size={15} style={{ color: "var(--cool)" }} />
          <div className="eyebrow-bright">Fit Assessment & Notes</div>
        </div>

        <div className="field-label field-label-required">Does this location meet all special handling & storage needs?</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {[
            { v: "yes", label: "Yes — all needs met", color: "var(--success)", Icon: CheckCircle2 },
            { v: "no",  label: "No — has gaps",        color: "var(--warning)", Icon: AlertCircle },
          ].map(opt => (
            <button
              key={opt.v}
              disabled={readOnly}
              onClick={() => setField("meetsRequirements", opt.v)}
              className="btn"
              style={{
                flex: 1,
                justifyContent: "center",
                padding: "12px",
                borderColor: data.meetsRequirements === opt.v ? opt.color : "var(--border-mid)",
                background: data.meetsRequirements === opt.v ? "rgba(241,227,197,0.03)" : "transparent",
                color: data.meetsRequirements === opt.v ? opt.color : "var(--text-mid)",
              }}
            >
              <opt.Icon size={15} />
              {opt.label}
            </button>
          ))}
        </div>

        <div className="field-label">Notes for Finance</div>
        <textarea
          className="textarea"
          style={{ minHeight: 90 }}
          disabled={readOnly}
          value={data.notes}
          onChange={e => setField("notes", e.target.value)}
          placeholder="Anything Finance needs to know — gaps, alternatives, workarounds, negotiation room, carrier details…"
        />
      </div>

      {/* Attachments */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          <Files size={15} style={{ color: "var(--cool)" }} />
          <div className="eyebrow-bright">Attachments</div>
          <div style={{ flex: 1 }} />
          <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
            Insurance certs, rate cards, carrier emails
          </span>
        </div>

        {!readOnly && (
          <div
            onClick={() => fileInputRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); }}
            onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
            style={{
              border: "1px dashed var(--border-hi)",
              borderRadius: 4,
              padding: "28px 20px",
              textAlign: "center",
              cursor: "pointer",
              background: "var(--bg-2)",
              transition: "background 140ms, border-color 140ms",
            }}
          >
            <Upload size={18} style={{ color: "var(--cool)", marginBottom: 8 }} />
            <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500, marginBottom: 4 }}>
              Drop files here or click to browse
            </div>
            <div style={{ fontSize: 11.5, color: "var(--text-dim)" }}>
              Images preview inline · PDFs, emails, and other types tracked by name
            </div>
            <input
              ref={fileInputRef}
              type="file"
              multiple
              style={{ display: "none" }}
              onChange={(e) => { if (e.target.files) handleFiles(e.target.files); e.target.value = ""; }}
            />
          </div>
        )}

        {data.attachments.length > 0 && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10, marginTop: readOnly ? 0 : 14 }}>
            {data.attachments.map(a => (
              <div key={a.id} className="panel-inset" style={{ padding: 10, position: "relative" }}>
                {a.dataUrl ? (
                  <img src={a.dataUrl} alt={a.name} style={{ width: "100%", aspectRatio: "4 / 3", objectFit: "cover", borderRadius: 3, marginBottom: 8, background: "var(--bg)" }} />
                ) : (
                  <div style={{
                    width: "100%", aspectRatio: "4 / 3",
                    borderRadius: 3, marginBottom: 8,
                    background: "var(--bg)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "var(--text-dim)",
                  }}>
                    {a.type?.startsWith("image/") ? <ImageIcon size={22} /> : <FileText size={22} />}
                  </div>
                )}
                <div style={{ fontSize: 12, color: "var(--text)", fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={a.name}>
                  {a.name}
                </div>
                <div className="font-mono" style={{ fontSize: 10.5, color: "var(--text-dim)", marginTop: 2 }}>
                  {(a.size / 1024).toFixed(1)} KB
                </div>
                {!readOnly && (
                  <button
                    className="btn btn-ghost btn-xs"
                    onClick={() => removeAttachment(a.id)}
                    style={{ position: "absolute", top: 4, right: 4, padding: "3px 5px" }}
                  >
                    <X size={11} />
                  </button>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {!readOnly && errors.length > 0 && (
        <div className="panel-inset" style={{ padding: "12px 16px", marginBottom: 14, display: "flex", gap: 10, alignItems: "flex-start", borderColor: "var(--warning-dim)" }}>
          <AlertTriangle size={15} style={{ color: "var(--warning)", flexShrink: 0, marginTop: 1 }} />
          <div>
            <div style={{ fontSize: 12.5, color: "var(--warning)", fontWeight: 500, marginBottom: 4 }}>
              {errors.length} field{errors.length === 1 ? "" : "s"} still needed to submit
            </div>
            <div style={{ fontSize: 12, color: "var(--text-mid)" }}>{errors.join(" · ")}</div>
          </div>
        </div>
      )}

      {!readOnly && (
        <div style={{ paddingTop: 8 }}>
          {showCsrRev && (
            <div className="panel-inset" style={{ padding: 16, marginBottom: 12, borderColor: "var(--warning-dim)" }}>
              <div className="field-label field-label-required">What does CSR need to revise?</div>
              <textarea className="textarea" rows={3} value={csrRevNotes} onChange={e => setCsrRevNotes(e.target.value)}
                placeholder="Describe what's missing or needs to change in the CSR submission…" />
              <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
                <button className="btn btn-ghost btn-sm" onClick={() => setShowCsrRev(false)}>Cancel</button>
                <button className="btn btn-sm" disabled={!csrRevNotes.trim()}
                  style={{ borderColor: "var(--warning)", color: "var(--warning)" }}
                  onClick={() => onRevisionCsr({ requestedBy: submitter, requestedByRole: "procurement", notes: csrRevNotes })}>
                  <Send size={12} /> Send Back to CSR
                </button>
              </div>
            </div>
          )}
          <div style={{ display: "flex", gap: 10, justifyContent: "space-between" }}>
            <button className="btn" onClick={() => setShowCsrRev(true)} style={{ color: "var(--warning)", borderColor: "var(--warning-dim)" }}>
              <ChevronLeft size={14} /> Send Back to CSR
            </button>
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn" onClick={() => onSaveDraft(buildPayload())}>
                <Save size={14} /> Save Draft
              </button>
              <button className="btn btn-primary" onClick={() => onSubmit(buildPayload())} disabled={!canSubmit}>
                Submit to Finance <Send size={14} />
              </button>
            </div>
          </div>
        </div>
      )}

      <SharedAttachments request={request} userName={userName} role={role} onAdd={onAddAttachments} onRemove={onRemoveAttachment} />
      <SharedNotesPanel request={request} role={role} userName={userName} onAddNote={onAddNote} />
    </div>
  );
}

// Compact read-only CSR snapshot shown to procurement + finance
function CsrSnapshot({ request }) {
  const { csr } = request;
  const totalUnits = csr.items.reduce((s, i) => s + (parseFloat(i.quantity) || 0), 0);
  const totalValue = csr.items.reduce((s, i) => s + (parseFloat(i.quantity) || 0) * (parseFloat(i.value) || 0), 0);
  const totalFp = csr.items.reduce((s, i) => {
    const fp = footprintSqft(i.dimL, i.dimW);
    return s + (fp || 0) * (parseFloat(i.quantity) || 0);
  }, 0);

  return (
    <div className="panel bracket-corners" style={{ padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <StageMarker num={1} label="CSR Request Summary" />
        <div style={{ flex: 1 }} />
        <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
          Submitted {fmtDateTime(csr.submittedAt)} by {csr.submittedBy || "—"}
        </span>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 0, border: "1px solid var(--border)", borderRadius: 4, overflow: "hidden" }}>
        <SnapshotStat label="Customer" value={csr.customerName || "—"} />
        <SnapshotStat label="Preferred Location" value={`${csr.locationCity || "—"}${csr.locationState ? ", " + csr.locationState : ""}`} />
        <SnapshotStat label="Storage Window" value={`${fmtDate(csr.storageStartDate)} → ${fmtDate(csr.storageEndDate)}`} mono />
        <SnapshotStat label="Totals" value={`${csr.items.length} item${csr.items.length === 1 ? "" : "s"} · ${fmtNum(totalUnits)} units`} mono last />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: "1px solid var(--border)", borderTop: "none", borderRadius: "0 0 4px 4px" }}>
        <SnapshotStat label="Total Footprint" value={totalFp ? `${totalFp.toFixed(1)} ft²` : "—"} mono />
        <SnapshotStat label="Total Declared Value" value={totalValue ? fmtMoney(totalValue) : "—"} mono />
        <SnapshotStat label="Storage Types" value={[...new Set(csr.items.map(i => i.storageType))].join(" / ")} last />
      </div>

      {/* Items detail */}
      <details style={{ marginTop: 14 }}>
        <summary style={{ cursor: "pointer", fontSize: 12, color: "var(--text-mid)", userSelect: "none", padding: "4px 0" }}>
          Show all {csr.items.length} item{csr.items.length === 1 ? "" : "s"} →
        </summary>
        <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
          {csr.items.map((it, i) => (
            <div key={it.id} className="panel-inset" style={{ padding: 12, fontSize: 12.5 }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 8, paddingBottom: 8, borderBottom: "1px dashed var(--border)" }}>
                <span className="font-mono" style={{ color: "var(--accent)", fontSize: 11 }}>#{i + 1}</span>
                <span style={{ color: "var(--text)", fontWeight: 500, fontSize: 13 }}>{it.name || <em style={{ color: "var(--text-dim)", fontWeight: 400 }}>untitled</em>}</span>
              </div>
              <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 6 }}>
                <span style={{ color: "var(--text-mid)" }}>Qty <span className="font-mono" style={{ color: "var(--text)" }}>{fmtNum(it.quantity)}</span></span>
                <span style={{ color: "var(--text-mid)" }}>Dims <span className="font-mono" style={{ color: "var(--text)" }}>{it.dimL}×{it.dimW}×{it.dimH}</span> in</span>
                <span style={{ color: "var(--text-mid)" }}>Wt <span className="font-mono" style={{ color: "var(--text)" }}>{fmtNum(it.weight)}</span> lb</span>
                <span style={{ color: "var(--text-mid)" }}>Value <span className="font-mono" style={{ color: "var(--text)" }}>{fmtMoney(it.value)}</span>/ea</span>
                <span style={{ color: "var(--text-mid)" }}>Storage <span style={{ color: "var(--text)" }}>{it.storageType}</span></span>
                <span style={{ color: "var(--text-mid)" }}>Arrives <span className="font-mono" style={{ color: "var(--text)" }}>{fmtDate(it.arrivalDate)}</span></span>
                {it.expectedDeparture && <span style={{ color: "var(--text-mid)" }}>Departs <span className="font-mono" style={{ color: "var(--text)" }}>{fmtDate(it.expectedDeparture)}</span></span>}
              </div>
              {(it.specialHandling || it.specialStoring) && (
                <div style={{ borderTop: "1px dashed var(--border)", paddingTop: 8, marginTop: 6, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {it.specialHandling && <div><span className="eyebrow">Handling</span><div style={{ color: "var(--text-mid)", marginTop: 3 }}>{it.specialHandling}</div></div>}
                  {it.specialStoring && <div><span className="eyebrow">Storing</span><div style={{ color: "var(--text-mid)", marginTop: 3 }}>{it.specialStoring}</div></div>}
                </div>
              )}
            </div>
          ))}
        </div>
      </details>
    </div>
  );
}

function SnapshotStat({ label, value, mono, last }) {
  return (
    <div style={{
      padding: "10px 14px",
      borderRight: last ? "none" : "1px solid var(--border)",
    }}>
      <div className="eyebrow" style={{ marginBottom: 4 }}>{label}</div>
      <div style={{
        fontSize: 13,
        color: "var(--text)",
        fontFamily: mono ? "'Geist Mono', monospace" : "inherit",
      }}>{value}</div>
    </div>
  );
}

// ============================================================
// FINANCE REVIEW
// ============================================================
function FinanceReview({ request, onApprove, onFollowUp, onRevisionCsr, onBack, role, userName, onAddNote, onAddAttachments, onRemoveAttachment, onDelete }) {
  const [mode, setMode] = useState(null); // null | "approve" | "follow_up" | "revision_csr"
  const [notes, setNotes] = useState("");
  const [csrRevNotes, setCsrRevNotes] = useState("");
  const submitter = userName || "";

  const { csr, procurement } = request;

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1280, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <button className="btn btn-ghost btn-xs" onClick={onBack}>
          <ChevronLeft size={13} /> Back
        </button>
        {onDelete && (
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        )}
      </div>

      <div style={{ marginBottom: 8 }}>
        <StageMarker num={3} label="Finance Review" />
      </div>
      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        Aligned review
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Customer ask on the left, facility offer on the right. Decide whether to release this to Finance for quoting, or request revisions from Procurement.
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* Aligned view */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <div className="panel bracket-corners" style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <StageMarker num={1} label="CSR Ask" />
          </div>
          <AlignBlock label="Customer" value={csr.customerName} />
          <AlignBlock label="Preferred Location" value={`${csr.locationCity || "—"}${csr.locationState ? ", " + csr.locationState : ""}`} />
          <AlignBlock label="Storage Window" value={`${fmtDate(csr.storageStartDate)} → ${fmtDate(csr.storageEndDate)}`} mono />
          <AlignBlock label="Submitted by" value={`${csr.submittedBy || "—"}`} small />
        </div>

        <div className="panel" style={{ padding: 20, borderColor: "var(--cool-dim)" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <StageMarker num={2} label="Procurement Offer" />
          </div>
          <AlignBlock label="Facility" value={procurement.facilityName} />
          <AlignBlock label="Facility Location" value={procurement.facilityLocation} highlight={
            cityStateMatch(csr.locationCity, csr.locationState, procurement.facilityLocation) ? "match" : "mismatch"
          } />
          <AlignBlock label="SqFt Available" value={procurement.squareFootage ? `${fmtNum(procurement.squareFootage)} sqft` : "—"} mono />
          <AlignBlock label="Submitted by" value={`${procurement.submittedBy || "—"}`} small />
        </div>
      </div>

      {/* Items + cost tables side by side */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <div className="panel" style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <Package size={14} style={{ color: "var(--accent)" }} />
            <div className="eyebrow-bright">Items Summary</div>
          </div>
          <ItemsCompactTable items={csr.items} />
        </div>

        <div className="panel" style={{ padding: 20, borderColor: "var(--cool-dim)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <DollarSign size={14} style={{ color: "var(--cool)" }} />
            <div className="eyebrow-bright">Cost Structure</div>
          </div>
          <CostStructure procurement={procurement} />
        </div>
      </div>

      {/* Fit & Notes */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 14, marginBottom: 20 }}>
        <div className="panel" style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <AlertCircle size={14} style={{ color: procurement.meetsRequirements === "yes" ? "var(--success)" : "var(--warning)" }} />
            <div className="eyebrow-bright">Fit Assessment</div>
          </div>

          {/* Capacity row */}
          {(() => {
            const totalFp = totalFootprint(csr.items);
            const sqft = parseFloat(procurement.squareFootage) || 0;
            const utilization = totalFp > 0 && sqft > 0 ? (totalFp / sqft) * 100 : null;
            const okCap = procurement.capacityConfirmed === "yes";
            const noCap = procurement.capacityConfirmed === "no";
            const color = okCap ? "var(--success)" : noCap ? "var(--warning)" : "var(--text-dim)";
            return (
              <div style={{ paddingBottom: 12, marginBottom: 12, borderBottom: "1px dashed var(--border)" }}>
                <div className="eyebrow" style={{ marginBottom: 6 }}>Capacity</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 500, marginBottom: 4 }}>
                  {okCap ? <Check size={13} style={{ color }} /> : <AlertTriangle size={13} style={{ color }} />}
                  <span style={{ color }}>
                    {okCap ? "Fits per Procurement" : noCap ? "Insufficient per Procurement" : "Not confirmed"}
                  </span>
                </div>
                <div className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
                  {totalFp > 0 ? `${totalFp.toFixed(1)} ft²` : "— ft²"} in {sqft > 0 ? `${fmtNum(sqft)} ft²` : "— ft²"}
                  {utilization !== null ? ` · ${utilization.toFixed(0)}% used` : ""}
                </div>
              </div>
            );
          })()}

          {/* Special-needs row */}
          <div className="eyebrow" style={{ marginBottom: 6 }}>Special Needs</div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>
            {procurement.meetsRequirements === "yes"
              ? <span style={{ color: "var(--success)" }}>Meets all stated needs</span>
              : procurement.meetsRequirements === "no"
                ? <span style={{ color: "var(--warning)" }}>Has gaps — see notes</span>
                : <span style={{ color: "var(--text-dim)" }}>Not yet answered</span>}
          </div>
          <div style={{ fontSize: 11, color: "var(--text-dim)" }}>
            Per Procurement, against special handling & storing instructions.
          </div>
        </div>

        <div className="panel" style={{ padding: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <FileText size={14} style={{ color: "var(--cool)" }} />
            <div className="eyebrow-bright">Procurement Notes</div>
          </div>
          <div style={{ fontSize: 13, color: "var(--text)", whiteSpace: "pre-wrap", minHeight: 20 }}>
            {procurement.notes || <span style={{ color: "var(--text-faint)", fontStyle: "italic" }}>No notes provided.</span>}
          </div>

          {procurement.attachments?.length > 0 && (
            <>
              <div style={{ borderTop: "1px dashed var(--border-mid)", margin: "14px 0" }} />
              <div className="eyebrow" style={{ marginBottom: 8 }}>Attachments ({procurement.attachments.length})</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {procurement.attachments.map(a => (
                  <div key={a.id} style={{
                    display: "flex", alignItems: "center", gap: 8,
                    padding: "6px 10px",
                    border: "1px solid var(--border-mid)",
                    borderRadius: 3,
                    fontSize: 12,
                    background: "var(--bg-2)",
                  }}>
                    {a.type?.startsWith("image/") ? <ImageIcon size={12} style={{ color: "var(--cool)" }} /> : <FileText size={12} style={{ color: "var(--cool)" }} />}
                    <span style={{ color: "var(--text)" }}>{a.name}</span>
                    <span className="font-mono" style={{ color: "var(--text-dim)", fontSize: 11 }}>{(a.size / 1024).toFixed(0)} KB</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      {/* Decision */}
      <div className="panel" style={{ padding: 20, borderColor: "var(--accent-dim)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <CircleDot size={14} style={{ color: "var(--accent)" }} strokeWidth={3} />
          <div className="eyebrow-bright">Finance Decision</div>
        </div>

        <p style={{ fontSize: 13, color: "var(--text-mid)", marginTop: 0, marginBottom: 16 }}>
          Finance calculates the final quote offline using the data above. Choose an outcome:
        </p>

        {!mode && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            <button
              className="btn"
              onClick={() => setMode("approve")}
              style={{
                justifyContent: "flex-start",
                padding: "16px 18px",
                borderColor: "var(--success-dim)",
                flexDirection: "column", alignItems: "flex-start",
                gap: 6,
                height: "auto",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--success)", fontSize: 14, fontWeight: 600 }}>
                <CheckCircle2 size={15} /> Approve for quoting
              </div>
              <div style={{ fontSize: 12, color: "var(--text-mid)", whiteSpace: "normal", textAlign: "left", lineHeight: 1.4 }}>
                Data is complete. Finance will build the quote offline.
              </div>
            </button>

            <button
              className="btn"
              onClick={() => setMode("follow_up")}
              style={{
                justifyContent: "flex-start",
                padding: "16px 18px",
                borderColor: "var(--warning-dim)",
                flexDirection: "column", alignItems: "flex-start",
                gap: 6,
                height: "auto",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--warning)", fontSize: 14, fontWeight: 600 }}>
                <AlertCircle size={15} /> Follow-up → Procurement
              </div>
              <div style={{ fontSize: 12, color: "var(--text-mid)", whiteSpace: "normal", textAlign: "left", lineHeight: 1.4 }}>
                Send back to Procurement with questions or revisions needed.
              </div>
            </button>

            <button
              className="btn"
              onClick={() => setMode("revision_csr")}
              style={{
                justifyContent: "flex-start",
                padding: "16px 18px",
                borderColor: "var(--cool-dim)",
                flexDirection: "column", alignItems: "flex-start",
                gap: 6,
                height: "auto",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--cool)", fontSize: 14, fontWeight: 600 }}>
                <ChevronLeft size={15} /> Revise → CSR
              </div>
              <div style={{ fontSize: 12, color: "var(--text-mid)", whiteSpace: "normal", textAlign: "left", lineHeight: 1.4 }}>
                The original intake needs corrections before quoting can proceed.
              </div>
            </button>
          </div>
        )}

        {mode && (
          <div style={{ display: "grid", gap: 12 }}>
            <div>
              <div className="field-label field-label-required">Your Name</div>
              <input className="input" value={submitter} disabled
                placeholder="e.g. Morgan Lee" style={{ maxWidth: 400 }} />
            </div>

            {mode === "follow_up" && (
              <div>
                <div className="field-label field-label-required">Follow-up Notes for Procurement</div>
                <textarea
                  className="textarea"
                  value={notes}
                  onChange={e => setNotes(e.target.value)}
                  placeholder="What needs to change? Missing data? Pricing questions? Alternative facility?"
                  style={{ minHeight: 110 }}
                />
              </div>
            )}

            {mode === "revision_csr" && (
              <div>
                <div className="field-label field-label-required">Revision Notes for CSR</div>
                <textarea
                  className="textarea"
                  value={csrRevNotes}
                  onChange={e => setCsrRevNotes(e.target.value)}
                  placeholder="What does CSR need to fix? Wrong dimensions? Missing items? Incorrect dates?"
                  style={{ minHeight: 110 }}
                />
              </div>
            )}

            {mode === "approve" && (
              <div className="panel-inset" style={{ padding: "12px 14px", fontSize: 12.5, color: "var(--text-mid)" }}>
                Approving will mark this request as <StatusBadge status="approved" /> and close the workflow loop.
              </div>
            )}

            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 4 }}>
              <button className="btn btn-ghost" onClick={() => { setMode(null); setNotes(""); setCsrRevNotes(""); }}>Cancel</button>
              {mode === "approve" ? (
                <button
                  className="btn btn-success"
                  disabled={!submitter.trim()}
                  onClick={() => onApprove({ decidedBy: submitter })}
                >
                  <Check size={14} /> Confirm Approval
                </button>
              ) : mode === "follow_up" ? (
                <button
                  className="btn btn-primary"
                  disabled={!submitter.trim() || !notes.trim()}
                  onClick={() => onFollowUp({ decidedBy: submitter, followUpNotes: notes })}
                >
                  <Send size={14} /> Send Follow-up
                </button>
              ) : (
                <button
                  className="btn"
                  disabled={!submitter.trim() || !csrRevNotes.trim()}
                  style={{ borderColor: "var(--cool)", color: "var(--cool)" }}
                  onClick={() => onRevisionCsr({ requestedBy: submitter, requestedByRole: "finance", notes: csrRevNotes })}
                >
                  <Send size={14} /> Send to CSR
                </button>
              )}
            </div>
          </div>
        )}
      </div>

      <SharedAttachments request={request} userName={userName} role={role} onAdd={onAddAttachments} onRemove={onRemoveAttachment} />
      <SharedNotesPanel request={request} role={role} userName={userName} onAddNote={onAddNote} />
    </div>
  );
}

function AlignBlock({ label, value, mono, small, highlight }) {
  const color = highlight === "match" ? "var(--success)"
               : highlight === "mismatch" ? "var(--warning)"
               : "var(--text)";
  const icon = highlight === "match" ? <Check size={11} style={{ color: "var(--success)" }} />
             : highlight === "mismatch" ? <AlertTriangle size={11} style={{ color: "var(--warning)" }} />
             : null;
  return (
    <div style={{
      padding: "11px 0",
      borderBottom: "1px dashed var(--border)",
      display: "flex", alignItems: "baseline", gap: 14,
    }}>
      <div className="eyebrow" style={{ width: 150, flexShrink: 0 }}>{label}</div>
      <div style={{
        flex: 1,
        fontSize: small ? 12 : 14,
        color,
        fontFamily: mono ? "'Geist Mono', monospace" : "inherit",
        display: "flex", alignItems: "center", gap: 6,
      }}>
        {icon}
        {value || <span style={{ color: "var(--text-faint)", fontStyle: "italic" }}>—</span>}
      </div>
    </div>
  );
}

function cityStateMatch(city, state, facilityLocation) {
  if (!city || !facilityLocation) return false;
  const hay = facilityLocation.toLowerCase();
  const cityMatch = hay.includes(city.trim().toLowerCase());
  const stateMatch = !state || hay.includes(state.toLowerCase());
  return cityMatch && stateMatch;
}

function ItemsCompactTable({ items }) {
  const cols = "30px 1.4fr 0.6fr 0.9fr 0.7fr 0.7fr";
  return (
    <div className="panel-inset" style={{ overflow: "hidden" }}>
      <div className="data-row data-head" style={{ gridTemplateColumns: cols }}>
        <div className="data-cell-head" style={{ padding: "9px 10px" }}>#</div>
        <div className="data-cell-head" style={{ padding: "9px 10px" }}>Item</div>
        <div className="data-cell-head" style={{ padding: "9px 10px" }}>Qty</div>
        <div className="data-cell-head" style={{ padding: "9px 10px" }}>Dims (in)</div>
        <div className="data-cell-head" style={{ padding: "9px 10px" }}>Weight</div>
        <div className="data-cell-head" style={{ padding: "9px 10px" }}>Value</div>
      </div>
      {items.map((it, i) => (
        <div key={it.id} className="data-row" style={{ gridTemplateColumns: cols }}>
          <div className="data-cell font-mono" style={{ padding: "9px 10px", fontSize: 12, color: "var(--accent)" }}>{i + 1}</div>
          <div className="data-cell" style={{ padding: "9px 10px", fontSize: 12.5, color: it.name ? "var(--text)" : "var(--text-dim)", fontStyle: it.name ? "normal" : "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={it.name || "untitled"}>{it.name || "untitled"}</div>
          <div className="data-cell font-mono" style={{ padding: "9px 10px", fontSize: 12.5 }}>{fmtNum(it.quantity)}</div>
          <div className="data-cell font-mono" style={{ padding: "9px 10px", fontSize: 12.5 }}>{it.dimL}×{it.dimW}×{it.dimH}</div>
          <div className="data-cell font-mono" style={{ padding: "9px 10px", fontSize: 12.5 }}>{fmtNum(it.weight)} lb</div>
          <div className="data-cell font-mono" style={{ padding: "9px 10px", fontSize: 12.5 }}>{fmtMoney(it.value)}</div>
        </div>
      ))}
    </div>
  );
}

function CostStructure({ procurement }) {
  const unitLabel = {
    per_sqft_month: "/ sqft / month",
    per_pallet_month: "/ pallet / month",
    per_sqft_day: "/ sqft / day",
    per_pallet_day: "/ pallet / day",
    flat_month: "flat / month",
  }[procurement.storageCostsUnit] || "";

  const handlingUnitLabel = {
    per_unit: "/ unit",
    per_truckload: "/ truckload",
    per_hour: "/ hour",
    per_day: "/ day",
    flat: "flat",
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div className="panel-inset" style={{ padding: "10px 14px" }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>Storage</div>
        <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 14, color: "var(--text)" }}>
          {fmtMoney(procurement.storageCosts)} <span style={{ color: "var(--text-dim)", fontSize: 12 }}>{unitLabel}</span>
        </div>
      </div>

      <div className="panel-inset" style={{ padding: "10px 14px" }}>
        <div className="eyebrow" style={{ marginBottom: 4 }}>Insurance</div>
        <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 14, color: "var(--text)" }}>
          {fmtMoney(procurement.insuranceCostPer1000)} <span style={{ color: "var(--text-dim)", fontSize: 12 }}>per $1,000 value</span>
        </div>
        {procurement.insuranceLimit && (
          <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 11.5, color: "var(--text-dim)", marginTop: 2 }}>
            Limit: {fmtMoney(procurement.insuranceLimit)}
          </div>
        )}
      </div>

      <div className="panel-inset" style={{ padding: "10px 14px" }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>Handling</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {procurement.handlingCosts.filter(h => h.equipment).map(h => (
            <div key={h.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5 }}>

// ============================================================
// SHARED ATTACHMENTS — visible to all three parties
// ============================================================
function SharedAttachments({ request, userName, role, onAdd, onRemove }) {
  const fileRef = useRef(null);
  const [lightbox, setLightbox] = useState(null); // { dataUrl, name }
  const attachments = request.sharedAttachments || [];

  const handleFiles = async (files) => {
    const arr = Array.from(files);
    const processed = await Promise.all(arr.map(async (f) => {
      const meta = {
        id: genRowId(),
        name: f.name,
        size: f.size,
        type: f.type,
        dataUrl: null,
        uploadedBy: userName,
        uploadedByRole: role,
        uploadedAt: new Date().toISOString(),
      };
      if (f.type.startsWith("image/") && f.size < 400_000) {
        try {
          meta.dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = () => rej();
            r.readAsDataURL(f);
          });
        } catch {}
      }
      return meta;
    }));
    onAdd(processed);
  };

  return (
    <div className="panel" style={{ padding: "18px 20px", marginTop: 24 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <Files size={14} style={{ color: "var(--text-dim)" }} />
        <div className="section-title" style={{ margin: 0 }}>Shared Files</div>
        <div style={{ flex: 1 }} />
        <div style={{ fontSize: 10.5, color: "var(--text-faint)", letterSpacing: "0.1em", textTransform: "uppercase" }}>
          Visible to all parties
        </div>
      </div>

      <div
        onClick={() => fileRef.current?.click()}
        onDragOver={(e) => e.preventDefault()}
        onDrop={(e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); }}
        style={{
          border: "1px dashed var(--border-hi)",
          borderRadius: 4,
          padding: "22px 20px",
          textAlign: "center",
          cursor: "pointer",
          background: "var(--bg-2)",
          marginBottom: attachments.length > 0 ? 14 : 0,
        }}
      >
        <Upload size={16} style={{ color: "var(--accent)", marginBottom: 6 }} />
        <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500, marginBottom: 3 }}>
          Drop files here or click to browse
        </div>
        <div style={{ fontSize: 11, color: "var(--text-dim)" }}>
          Photos, emails, documents — images under 400 KB preview inline
        </div>
        <input ref={fileRef} type="file" multiple style={{ display: "none" }}
          onChange={(e) => { if (e.target.files) handleFiles(e.target.files); e.target.value = ""; }} />
      </div>

      {attachments.length > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10 }}>
          {attachments.map(a => {
            const roleMeta = ROLES.find(r => r.id === a.uploadedByRole);
            const clickable = !!a.dataUrl;
            return (
              <div key={a.id} className="panel-inset" style={{ padding: 10, position: "relative", cursor: clickable ? "pointer" : "default" }}
                onClick={() => clickable && setLightbox({ dataUrl: a.dataUrl, name: a.name, uploadedBy: a.uploadedBy, uploadedAt: a.uploadedAt })}>
                {a.dataUrl ? (
                  <img src={a.dataUrl} alt={a.name} style={{ width: "100%", aspectRatio: "4 / 3", objectFit: "cover", borderRadius: 3, marginBottom: 8, background: "var(--bg)" }} />
                ) : (
                  <div style={{
                    width: "100%", aspectRatio: "4 / 3",
                    borderRadius: 3, marginBottom: 8,
                    background: "var(--bg)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    flexDirection: "column", gap: 6,
                    color: "var(--text-dim)",
                  }}>
                    {a.type?.startsWith("image/") ? <ImageIcon size={22} /> : <FileText size={22} />}
                    <div style={{ fontSize: 9, color: "var(--text-faint)" }}>Preview not available</div>
                  </div>
                )}
                <div style={{ fontSize: 12, color: "var(--text)", fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={a.name}>
                  {a.name}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 3 }}>
                  <div className="font-mono" style={{ fontSize: 10, color: "var(--text-dim)" }}>
                    {(a.size / 1024).toFixed(1)} KB
                  </div>
                  <div style={{ fontSize: 10, color: roleMeta?.hue || "var(--text-faint)" }}>
                    {a.uploadedBy || "—"}
                  </div>
                </div>
                <button
                  className="btn btn-ghost btn-xs"
                  onClick={(e) => { e.stopPropagation(); onRemove(a.id); }}
                  style={{ position: "absolute", top: 4, right: 4, padding: "3px 5px" }}
                >
                  <X size={11} />
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* Lightbox modal */}
      {lightbox && (
        <div
          onClick={() => setLightbox(null)}
          style={{
            position: "fixed", inset: 0, zIndex: 200,
            background: "rgba(0,0,0,0.88)",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexDirection: "column", gap: 14,
            cursor: "pointer",
            animation: "fadeInUp 150ms ease-out both",
          }}
        >
          <img
            src={lightbox.dataUrl}
            alt={lightbox.name}
            onClick={(e) => e.stopPropagation()}
            style={{
              maxWidth: "90vw", maxHeight: "80vh",
              borderRadius: 4,
              boxShadow: "0 12px 40px rgba(0,0,0,0.6)",
              cursor: "default",
            }}
          />
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 14, color: "var(--text)", fontWeight: 500 }}>{lightbox.name}</div>
            <div style={{ fontSize: 12, color: "var(--text-dim)", marginTop: 4 }}>
              Uploaded by {lightbox.uploadedBy} · {fmtDateTime(lightbox.uploadedAt)}
            </div>
            <div style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 8 }}>
              Click anywhere to close · <a href={lightbox.dataUrl} download={lightbox.name} onClick={(e) => e.stopPropagation()} style={{ color: "var(--accent)", textDecoration: "underline" }}>Download</a>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// PASSWORD CHANGE (self-service)
// ============================================================
function PasswordChange({ auth, onBack, onSuccess }) {
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  const handleChange = async () => {
    if (!currentPw || !newPw || !confirmPw) { setError("All fields are required."); return; }
    if (newPw !== confirmPw) { setError("New passwords don't match."); return; }
    if (newPw.length < 4) { setError("Password must be at least 4 characters."); return; }
    // Verify current password
    const result = await authenticateUser(auth.email, currentPw);
    if (result === "bad_password" || !result) { setError("Current password is incorrect."); return; }
    // Save new password to Supabase (creates or updates user row)
    await saveManagedUser({ email: auth.email, role: auth.role, name: auth.name, password: newPw });
    setDone(true);
    setError("");
    if (onSuccess) onSuccess();
  };

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 500, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13} /> Back
      </button>

      <h1 className="font-display" style={{ fontSize: 28, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        Change Password
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Logged in as <span style={{ color: "var(--text)", fontWeight: 500 }}>{auth.name}</span> ({auth.email})
      </p>

      {done ? (
        <div className="panel" style={{ padding: 28, textAlign: "center" }}>
          <CheckCircle2 size={24} style={{ color: "var(--success)", marginBottom: 10 }} />
          <div style={{ fontSize: 15, fontWeight: 500, color: "var(--success)", marginBottom: 6 }}>Password updated</div>
          <div style={{ fontSize: 13, color: "var(--text-mid)" }}>Your new password is active. Use it next time you log in.</div>
          <button className="btn" onClick={onBack} style={{ marginTop: 16 }}>Back to Dashboard</button>
        </div>
      ) : (
        <div className="panel" style={{ padding: 24 }}>
          <div style={{ marginBottom: 14 }}>
            <div className="field-label field-label-required">Current Password</div>
            <input type="password" className="input" value={currentPw}
              onChange={e => { setCurrentPw(e.target.value); setError(""); }}
              placeholder="••••••••" />
          </div>
          <div style={{ marginBottom: 14 }}>
            <div className="field-label field-label-required">New Password</div>
            <input type="password" className="input" value={newPw}
              onChange={e => { setNewPw(e.target.value); setError(""); }}
              placeholder="At least 4 characters" />
          </div>
          <div style={{ marginBottom: 14 }}>
            <div className="field-label field-label-required">Confirm New Password</div>
            <input type="password" className="input" value={confirmPw}
              onChange={e => { setConfirmPw(e.target.value); setError(""); }}
              onKeyDown={e => { if (e.key === "Enter") handleChange(); }}
              placeholder="Type again to confirm" />
          </div>
          {error && (
            <div style={{ padding: "10px 12px", fontSize: 12.5, color: "var(--warning)", border: "1px solid var(--warning-dim)", borderRadius: 3, background: "rgba(232,155,111,0.06)", marginBottom: 14 }}>
              {error}
            </div>
          )}
          <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={handleChange}>
            Update Password
          </button>
        </div>
      )}
    </div>
  );
}
