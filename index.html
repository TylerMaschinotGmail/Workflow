async function loadAll() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/requests?select=id,data&order=updated_at.desc", { headers: SB_HEADERS });
    if (!res.ok) return [];
    const rows = await res.json();
    return rows.map(r => r.data).filter(Boolean);
  } catch { return []; }
}

async function saveAll(list) {
  try {
    // Upsert all current requests
    if (list.length > 0) {
      const rows = list.map(r => ({ id: r.id, data: r, updated_at: new Date().toISOString() }));
      await fetch(SUPABASE_URL + "/rest/v1/requests", {
        method: "POST",
        headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
        body: JSON.stringify(rows),
      });
    }
    // Find and delete rows no longer in the list
    const curRes = await fetch(SUPABASE_URL + "/rest/v1/requests?select=id", { headers: SB_HEADERS });
    if (curRes.ok) {
      const curRows = await curRes.json();
      const keepIds = new Set(list.map(r => r.id));
      const toDelete = curRows.filter(r => !keepIds.has(r.id));
      for (const r of toDelete) {
        await fetch(SUPABASE_URL + "/rest/v1/requests?id=eq." + encodeURIComponent(r.id), {
          method: "DELETE", headers: SB_HEADERS,
        });
      }
    }
    return true;
  } catch (e) { console.error("save failed", e); return false; }
}

async function authenticateUser(email, password) {
  const e = email.trim().toLowerCase();
  // Check Supabase users table first (includes password overrides)
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/users?email=eq." + encodeURIComponent(e) + "&select=*", { headers: SB_HEADERS });
    if (res.ok) {
      const rows = await res.json();
      if (rows.length > 0) {
        if (rows[0].password !== password) return "bad_password";
        return { role: rows[0].role, name: rows[0].name };
      }
    }
  } catch {}
  // Fall back to hardcoded ROLE_MAP
  const hardcoded = ROLE_MAP[e];
  if (hardcoded) {
    if (hardcoded.password !== password) return "bad_password";
    return { role: hardcoded.role, name: hardcoded.name };
  }
  return null;
}

const fmtMoney = (n) => {
  const v = parseFloat(n);
  if (isNaN(v)) return "—";
  return v.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 });
};

const fmtNum = (n) => {
  const v = parseFloat(n);
  if (isNaN(v)) return "—";
  return v.toLocaleString("en-US");
};

const fmtDate = (d) => {
  if (!d) return "—";
  try {
    return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  } catch { return "—"; }
};

const fmtDateTime = (d) => {
  if (!d) return "—";
  try {
    return new Date(d).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  } catch { return "—"; }
};

const fmtDuration = (startISO) => {
  if (!startISO) return "—";
  const ms = Date.now() - new Date(startISO).getTime();
  if (ms < 0) return "—";
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + "m";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h " + (mins % 60) + "m";
  const days = Math.floor(hrs / 24);
  return days + "d " + (hrs % 24) + "h";
};

const footprintSqft = (l, w) => {
  const a = parseFloat(l) || 0, b = parseFloat(w) || 0;
  if (!a || !b) return null;
  return (a * b) / 144;
};

const totalFootprint = (items) => {
  return (items || []).reduce((acc, it) => {
    const perUnit = footprintSqft(it.dimL, it.dimW);
    const qty = parseFloat(it.quantity) || 0;
    if (perUnit === null || !qty) return acc;
    return acc + perUnit * qty;
  }, 0);
};

function StatusBadge({ status }) {

    neutral: "badge-neutral",

  return <span className={`badge ${cls}`}><CircleDot size={9} strokeWidth={3} />{meta.label}</span>;

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleLogin = async () => {
    const e = email.trim().toLowerCase();
    if (!e || !e.includes("@")) {
      setError("Enter a valid email address.");
      return;
    }
    if (!password) {
      setError("Enter your password.");
      return;
    }
    const result = await authenticateUser(e, password);
    if (result === "bad_password") {
      setError("Incorrect password.");
      return;
    }
    if (!result) {
      setError("Access denied — this email isn't authorized. Ask a Finance admin to add you.");
      return;
    }
    const auth = { email: e, role: result.role, name: result.name };
    try { localStorage.setItem(AUTH_KEY, JSON.stringify(auth)); } catch {}
    onLogin(auth);
  };

  return (
    <div className="app-root">
      <StyleBlock />
      <div className="content-layer" style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        minHeight: "100vh", padding: 28,
      }}>
        <div style={{ width: "100%", maxWidth: 400 }}>
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div style={{
              width: 48, height: 48, borderRadius: 5,
              background: "var(--accent)",
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              color: "#1a1407", marginBottom: 14,
            }}>
              <Warehouse size={24} strokeWidth={2.5} />
            </div>
            <div className="font-display" style={{ fontSize: 28, letterSpacing: "0.05em" }}>
              SOLVR<span className="font-italic-serif" style={{ color: "var(--accent)" }}>.</span>
            </div>
            <div className="eyebrow" style={{ marginTop: 6 }}>Warehouse Quote Pipeline</div>
          </div>

          <div className="panel" style={{ padding: 28 }}>
            <div style={{ fontSize: 15, color: "var(--text)", fontWeight: 500, marginBottom: 4 }}>
              Sign in
            </div>
            <div style={{ fontSize: 13, color: "var(--text-dim)", marginBottom: 20 }}>
              Enter your email to access your workflow area.
            </div>

            <div className="field-label">Email</div>
            <input
              type="email"
              className="input"
              value={email}
              onChange={e => { setEmail(e.target.value); setError(""); }}
              onKeyDown={e => { if (e.key === "Enter") document.getElementById("solvr-pw")?.focus(); }}
              placeholder="you@company.com"
              autoFocus
            />

            <div className="field-label" style={{ marginTop: 12 }}>Password</div>
            <input
              id="solvr-pw"
              type="password"
              className="input"
              value={password}
              onChange={e => { setPassword(e.target.value); setError(""); }}
              onKeyDown={e => { if (e.key === "Enter") handleLogin(); }}
              placeholder="••••••••"
            />

            {error && (
              <div style={{
                marginTop: 10, padding: "10px 12px",
                fontSize: 12.5, color: "var(--warning)",
                border: "1px solid var(--warning-dim)",
                borderRadius: 3,
                background: "rgba(232,155,111,0.06)",
              }}>
                {error}
              </div>
            )}

            <button
              className="btn btn-primary"
              style={{ width: "100%", justifyContent: "center", marginTop: 16, padding: "12px" }}
              onClick={handleLogin}
            >
              Continue
            </button>
          </div>

          <div style={{ textAlign: "center", marginTop: 16, fontSize: 11.5, color: "var(--text-faint)" }}>
            Don't have access? Ask your Finance admin to add your email.
            <br />
            Finance users can view all areas. CSR and Procurement are restricted to their lane.
          </div>
        </div>
      </div>
    </div>
  );
}

function UserManagement({ onBack }) {
  const [users, setUsers] = useState([]);
  const [loadingUsers, setLoadingUsers] = useState(true);
  const [newEmail, setNewEmail] = useState("");
  const [newName, setNewName] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [newRole, setNewRole] = useState("csr");
  const [error, setError] = useState("");

  const refresh = async () => {
    const list = await loadManagedUsers();
    setUsers(list);
    setLoadingUsers(false);
  };

  useEffect(() => { refresh(); }, []);

  const handleAdd = async () => {
    const e = newEmail.trim().toLowerCase();
    if (!e || !e.includes("@")) { setError("Enter a valid email address."); return; }
    if (!newName.trim()) { setError("Enter a display name for this user."); return; }
    if (!newPassword.trim()) { setError("Set a password for this user."); return; }
    if (users.some(u => u.email === e)) { setError("This email is already in the list. Remove it first to change details."); return; }
    await saveManagedUser({ email: e, role: newRole, name: newName.trim(), password: newPassword });
    setNewEmail(""); setNewName(""); setNewPassword(""); setNewRole("csr"); setError("");
    refresh();
  };

  const handleRemove = async (email) => {
    await deleteManagedUser(email);
    refresh();
  };

  const handleChangeRole = async (email, role) => {
    const u = users.find(x => x.email === email);
    if (u) { await saveManagedUser({ ...u, role }); refresh(); }
  };

  const handleChangePassword = async (email, newPw) => {
    const u = users.find(x => x.email === email);
    if (u) { await saveManagedUser({ ...u, password: newPw }); refresh(); }
  };

  const hardcoded = Object.entries(ROLE_MAP)
    .filter(([email]) => !users.some(u => u.email === email))
    .map(([email, info]) => ({ email, role: info.role, name: info.name, locked: true }));

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 800, margin: "0 auto" }}>
      <button className="btn btn-ghost btn-xs" onClick={onBack} style={{ marginBottom: 16 }}>
        <ChevronLeft size={13} /> Back to Dashboard
      </button>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <Layers size={18} style={{ color: "var(--accent)" }} />
        <h1 className="font-display" style={{ fontSize: 32, margin: 0, lineHeight: 1.1, fontWeight: 400 }}>
          User Access
        </h1>
      </div>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 28 }}>
        Manage who can log in and which workflow area they access. Only Finance users can see this page.
      </p>

      {/* Add user */}
      <div className="panel" style={{ padding: 20, marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <Plus size={15} style={{ color: "var(--accent)" }} />
          <div className="eyebrow-bright">Add User</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
          <div>
            <div className="field-label">Email</div>
            <input
              type="email"
              className="input"
              value={newEmail}
              onChange={e => { setNewEmail(e.target.value); setError(""); }}
              placeholder="person@company.com"
            />
          </div>
          <div>
            <div className="field-label">Display Name</div>
            <input
              type="text"
              className="input"
              value={newName}
              onChange={e => { setNewName(e.target.value); setError(""); }}
              placeholder="e.g. Jordan Rivera"
            />
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 10, alignItems: "end" }}>
          <div>
            <div className="field-label">Password</div>
            <input
              type="text"
              className="input"
              value={newPassword}
              onChange={e => { setNewPassword(e.target.value); setError(""); }}
              placeholder="Set a password"
            />
          </div>
          <div>
            <div className="field-label">Role</div>
            <select className="select" value={newRole} onChange={e => setNewRole(e.target.value)}>
              <option value="csr">CSR / Ops</option>
              <option value="procurement">Procurement</option>
              <option value="finance">Finance (full access)</option>
            </select>
          </div>
          <button className="btn btn-primary" onClick={handleAdd} style={{ height: 36 }}>
            <Plus size={14} /> Add
          </button>
        </div>
        {error && (
          <div style={{
            marginTop: 10, padding: "10px 12px",
            fontSize: 12.5, color: "var(--warning)",
            border: "1px solid var(--warning-dim)",
            borderRadius: 3,
            background: "rgba(232,155,111,0.06)",
          }}>
            {error}
          </div>
        )}
      </div>

      {/* User list */}
      <div className="panel" style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10 }}>
          <UserCircle size={15} style={{ color: "var(--accent)" }} />
          <div className="eyebrow-bright">Active Users ({hardcoded.length + users.length})</div>
        </div>

        {/* Hardcoded admins */}
        {hardcoded.map(u => (
          <div key={u.email} style={{
            display: "grid", gridTemplateColumns: "2fr 1fr auto",
            alignItems: "center", gap: 14,
            padding: "12px 20px",
            borderBottom: "1px solid var(--border)",
          }}>
            <div>
              <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{u.name}</div>
              <div style={{ fontSize: 11.5, color: "var(--text-dim)" }}>{u.email}</div>
              <div style={{ fontSize: 10.5, color: "var(--text-faint)", marginTop: 2 }}>Hardcoded admin — cannot be changed here</div>
            </div>
            <div>
              <span style={{
                fontSize: 10.5, letterSpacing: "0.12em", textTransform: "uppercase",
                padding: "3px 8px", borderRadius: 2,
                border: `1px solid ${ROLES.find(r => r.id === u.role)?.hue || "var(--border)"}`,
                color: ROLES.find(r => r.id === u.role)?.hue || "var(--text-dim)",
              }}>
                {ROLES.find(r => r.id === u.role)?.label || u.role}
              </span>
            </div>
            <div style={{ width: 32 }} />
          </div>
        ))}

        {/* Managed users */}
        {users.map(u => (
          <div key={u.email} style={{
            display: "grid", gridTemplateColumns: "2fr 1fr auto",
            alignItems: "center", gap: 14,
            padding: "12px 20px",
            borderBottom: "1px solid var(--border)",
          }}>
            <div>
              <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{u.name}</div>
              <div style={{ fontSize: 11.5, color: "var(--text-dim)" }}>{u.email}</div>
            </div>
            <div>
              <select
                className="select"
                value={u.role}
                onChange={e => handleChangeRole(u.email, e.target.value)}
                style={{ fontSize: 12, padding: "4px 8px" }}
              >
                <option value="csr">CSR / Ops</option>
                <option value="procurement">Procurement</option>
                <option value="finance">Finance</option>
              </select>
            </div>
            <button
              className="btn btn-ghost btn-xs"
              onClick={() => {
                const pw = prompt("New password for " + u.name + ":");
                if (pw && pw.trim()) handleChangePassword(u.email, pw.trim());
              }}
              title="Reset password"
              style={{ color: "var(--cool)" }}
            >
              <Hash size={13} />
            </button>
            <button
              className="btn btn-ghost btn-xs"
              onClick={() => handleRemove(u.email)}
              title="Remove user"
              style={{ color: "var(--warning)" }}
            >
              <Trash2 size={13} />
            </button>
          </div>
        ))}

        {users.length === 0 && hardcoded.length === 0 && (
          <div style={{ padding: 28, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>
            No users configured yet. Add someone above.
          </div>
        )}
        {users.length === 0 && hardcoded.length > 0 && (
          <div style={{ padding: 20, textAlign: "center", color: "var(--text-faint)", fontStyle: "italic", fontSize: 13 }}>
            No additional users added yet. Use the form above to invite team members.
          </div>
        )}
      </div>

      <div style={{ marginTop: 16, fontSize: 12, color: "var(--text-faint)", lineHeight: 1.6 }}>
        Changes take effect on next login. If someone is already logged in, they'll keep their current session until they sign out.
        User list is stored in this browser's local storage — it won't sync across devices until you move to a hosted backend.
      </div>
    </div>
  );
}

        <MetricCard label={tabs.actionable} value={groups.actionable.length} icon={Inbox} tone={groups.actionable.length > 0 ? "accent" : "neutral"} />
        <MetricCard label="In Flight" value={groups.inflight.length} icon={Clock} />
        <MetricCard label="Approved" value={groups.closed.length} icon={CheckCircle2} tone="success" />
      </div>

      {/* Tabs */}
      <div style={{
        display: "flex",
        gap: 0,
        marginBottom: 0,
        borderBottom: "1px solid var(--border-mid)",
      }}>
        {[
          { id: "actionable", label: tabs.actionable, count: groups.actionable.length },
          { id: "inflight",   label: tabs.inflight,   count: groups.inflight.length },
          { id: "closed",     label: tabs.closed,     count: groups.closed.length },
        ].map(t => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              padding: "12px 20px",
              background: "transparent",
              border: "none",
              borderBottom: `2px solid ${tab === t.id ? "var(--accent)" : "transparent"}`,
              color: tab === t.id ? "var(--text)" : "var(--text-dim)",
              fontFamily: "inherit",
              fontSize: 13,
              fontWeight: 500,
              cursor: "pointer",
              marginBottom: -1,
              transition: "color 140ms",
              display: "flex", alignItems: "center", gap: 8,
            }}
          >
            {t.label}
            <span style={{
              fontFamily: "'Geist Mono', monospace",
              fontSize: 11,
              padding: "1px 6px",
              border: "1px solid var(--border-mid)",
              borderRadius: 2,
              color: "var(--text-dim)",
            }}>{t.count}</span>
          </button>
        ))}
      </div>

      {/* List */}
      {active.length === 0 ? (
        <div className="panel" style={{ marginTop: 20 }}>
          <EmptyState
            icon={Inbox}
            title={role === "csr" && tab === "actionable" ? "No drafts or follow-ups" : "Nothing here yet"}
            body={
              role === "csr" && tab === "actionable"
                ? "When you start a new request, it'll appear here until you submit it to Procurement."
                : tab === "actionable"
                  ? "When work arrives for your team, it'll show up in this queue."
                  : "Requests will appear here once they reach this stage."
            }
            action={role === "csr" && requests.length === 0 ? (
              <button className="btn btn-primary" onClick={onNew}><Plus size={14} /> Create first request</button>
            ) : null}
          />
        </div>
      ) : (
        <div className="panel" style={{ marginTop: 20, overflow: "hidden" }}>
          <div className="data-row data-head" style={{ gridTemplateColumns: "130px 1.4fr 1fr 0.9fr 170px 120px" }}>
            <div className="data-cell-head">Request</div>
            <div className="data-cell-head">Customer</div>
            <div className="data-cell-head">Preferred Location</div>
            <div className="data-cell-head">Storage Window</div>
            <div className="data-cell-head">Status</div>
            <div className="data-cell-head" style={{ justifyContent: "flex-end" }}>Age / Stage</div>
          </div>
          {active.map(r => (
            <div
              key={r.id}
              className="data-row clickable"
              style={{ gridTemplateColumns: "130px 1.4fr 1fr 0.9fr 170px 120px" }}
              onClick={() => onOpen(r.id)}
            >
              <div className="data-cell font-mono" style={{ color: "var(--text-mid)", fontSize: 12.5 }}>{r.id}</div>
              <div className="data-cell" style={{ color: "var(--text)" }}>
                {r.csr.customerName || <span style={{ color: "var(--text-faint)", fontStyle: "italic" }}>Unnamed</span>}
              </div>
              <div className="data-cell" style={{ color: "var(--text-mid)" }}>
                {r.csr.locationCity ? `${r.csr.locationCity}${r.csr.locationState ? ", " + r.csr.locationState : ""}` : "—"}
              </div>
              <div className="data-cell font-mono" style={{ fontSize: 12.5, color: "var(--text-mid)" }}>
                {fmtDate(r.csr.storageStartDate)} → {fmtDate(r.csr.storageEndDate)}
              </div>
              <div className="data-cell"><StatusBadge status={r.status} /></div>
              <div className="data-cell" style={{ justifyContent: "flex-end", textAlign: "right" }}>
                <div className="font-mono" style={{ fontSize: 12, color: "var(--text-mid)" }}>{fmtDuration(r.createdAt)}</div>
                <div className="font-mono" style={{ fontSize: 10.5, color: "var(--text-faint)" }}>stage {fmtDuration(r.updatedAt)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MetricCard({ label, value, icon: Icon, tone = "neutral" }) {
  const color = {
    neutral: "var(--text-mid)",
    accent: "var(--accent)",
    success: "var(--success)",
  }[tone];
  return (
    <div className="panel" style={{ padding: "16px 18px", position: "relative" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div className="eyebrow-bright">{label}</div>
        <Icon size={13} style={{ color: "var(--text-dim)" }} />
      </div>
      <div className="font-display" style={{ fontSize: 32, lineHeight: 1, color }}>
        {value}
      </div>
    </div>
  );
}

// ============================================================
function CSRForm({ request, onSaveDraft, onSubmit, onBack, readOnly, role, userName, onAddNote, onAddAttachments, onRemoveAttachment, onDelete }) {
  const [data, setData] = useState(request.csr);
  const submitter = request.csr.submittedBy || userName || "";

  const setField = (k, v) => setData(d => ({ ...d, [k]: v }));
  const setItem = (id, patch) => setData(d => ({
    ...d,
    items: d.items.map(it => it.id === id ? { ...it, ...patch } : it),
  }));
  const addItem = () => setData(d => ({ ...d, items: [...d.items, blankItem()] }));
  const removeItem = (id) => setData(d => ({
    ...d,
    items: d.items.length > 1 ? d.items.filter(it => it.id !== id) : d.items,
  }));

  const validate = () => {
    const errs = [];
    if (!data.customerName.trim()) errs.push("Customer name");
    if (!data.storageStartDate) errs.push("Storage start date");
    if (!data.storageEndDate) errs.push("Storage end date");
    if (!data.locationCity.trim()) errs.push("Preferred city");
    if (!data.locationState) errs.push("Preferred state");
    if (!submitter.trim()) errs.push("Your name");
    data.items.forEach((it, i) => {
      if (!it.name.trim() || !it.arrivalDate || !it.quantity || !it.dimL || !it.dimW || !it.dimH || !it.weight) {
        errs.push(`Item ${i + 1} is incomplete`);
      }
    });
    return errs;
  };

  const errors = validate();
  const canSubmit = errors.length === 0 && !readOnly;

  const buildPayload = () => ({
    ...data,
    submittedBy: submitter,
  });

  return (
    <div className="fade-in" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <button className="btn btn-ghost btn-xs" onClick={onBack}>
          <ChevronLeft size={13} /> Back
        </button>
        {onDelete && (
          <button className="btn btn-ghost btn-xs" onClick={onDelete} style={{ color: "var(--text-dim)" }}>
            <Trash2 size={12} /> Delete request
          </button>
        )}
      </div>

      <div style={{ marginBottom: 8 }}>
        <StageMarker num={1} label="CSR / Customer-Facing Submission" />
      </div>
      <h1 className="font-display" style={{ fontSize: 36, margin: 0, lineHeight: 1.1, fontWeight: 400, marginBottom: 6 }}>
        {readOnly ? "CSR Request" : "New Warehouse Request"}
      </h1>
      <p style={{ color: "var(--text-mid)", fontSize: 14, margin: 0, marginBottom: 24 }}>
        Capture what the customer needs. Procurement will use this to source a facility and quote the job.
      </p>

      <StakeholdersBar request={request} role={role} />

      {/* CSR Revision alert */}
      {request.status === "revision_csr" && request.csrRevision?.notes && (
        <div className="panel" style={{
          padding: 20, marginBottom: 18,
          borderColor: "var(--warning-dim)",
          background: "linear-gradient(180deg, rgba(232,155,111,0.08) 0%, rgba(232,155,111,0.02) 100%)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <AlertCircle size={16} style={{ color: "var(--warning)" }} />
            <div className="eyebrow-bright" style={{ color: "var(--warning)" }}>
              {request.csrRevision.requestedByRole === "finance" ? "Finance" : "Procurement"} Requested Revisions
            </div>
            <div style={{ flex: 1 }} />
            <span className="font-mono" style={{ fontSize: 11, color: "var(--text-dim)" }}>
              {request.csrRevision.requestedBy} · {fmtDateTime(request.csrRevision.requestedAt)}
            </span>
          </div>
          <div style={{ fontSize: 13.5, color: "var(--text)", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>
            {request.csrRevision.notes}
          </div>
        </div>
      )}

      {/* Meta info */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <UserCircle size={15} style={{ color: "var(--accent)" }} />
          <div className="eyebrow-bright">Customer & Engagement</div>
          <div style={{ flex: 1 }} />
          <div className="font-mono" style={{ fontSize: 11.5, color: "var(--text-dim)" }}>{request.id}</div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 14 }}>
          <div>
            <div className="field-label field-label-required">Customer Name</div>
            <input className="input" value={data.customerName} disabled={readOnly}
              onChange={e => setField("customerName", e.target.value)}
              placeholder="e.g. Acme Industrial Co." />
          </div>
          <div>
            <div className="field-label field-label-required">Storage Start</div>
            <input type="date" className="input input-mono" value={data.storageStartDate} disabled={readOnly}
              onChange={e => setField("storageStartDate", e.target.value)} />
          </div>
          <div>
            <div className="field-label field-label-required">Storage End</div>
            <input type="date" className="input input-mono" value={data.storageEndDate} disabled={readOnly}
              onChange={e => setField("storageEndDate", e.target.value)} />
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 14, marginTop: 14 }}>
          <div>
            <div className="field-label field-label-required">Preferred City</div>
            <input className="input" value={data.locationCity} disabled={readOnly}
              onChange={e => setField("locationCity", e.target.value)}
              placeholder="City" />
          </div>
          <div>
            <div className="field-label field-label-required">State</div>
            <select className="select" value={data.locationState} disabled={readOnly}
              onChange={e => setField("locationState", e.target.value)}>
              <option value="">—</option>
              {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <div className="field-label field-label-required">Your Name (Submitter)</div>
            <input className="input" value={submitter} disabled
              placeholder="e.g. Jane Doe" />
          </div>
        </div>
      </div>

      {/* Items */}
      <div className="panel" style={{ padding: 20, marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <Package size={15} style={{ color: "var(--accent)" }} />
          <div className="eyebrow-bright">Item Breakdown</div>
          <div style={{ flex: 1 }} />
          <span className="font-mono" style={{ fontSize: 11.5, color: "var(--text-dim)" }}>
            {data.items.length} {data.items.length === 1 ? "item" : "items"}
          </span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {data.items.map((it, idx) => (
            <ItemCard
              key={it.id}
              item={it}
              index={idx}
              onChange={(patch) => setItem(it.id, patch)}
              onRemove={() => removeItem(it.id)}
              canRemove={data.items.length > 1}
              readOnly={readOnly}
            />
          ))}
        </div>

        {!readOnly && (
          <button className="btn btn-xs" style={{ marginTop: 12 }} onClick={addItem}>
            <Plus size={12} /> Add item
          </button>
        )}
      </div>

      {/* Errors */}
      {!readOnly && errors.length > 0 && (
        <div className="panel-inset" style={{ padding: "12px 16px", marginBottom: 14, display: "flex", gap: 10, alignItems: "flex-start", borderColor: "var(--warning-dim)" }}>
          <AlertTriangle size={15} style={{ color: "var(--warning)", flexShrink: 0, marginTop: 1 }} />
          <div>
            <div style={{ fontSize: 12.5, color: "var(--warning)", fontWeight: 500, marginBottom: 4 }}>
              {errors.length} field{errors.length === 1 ? "" : "s"} still needed to submit
            </div>
            <div style={{ fontSize: 12, color: "var(--text-mid)" }}>
              {errors.slice(0, 4).join(" · ")}{errors.length > 4 ? ` · +${errors.length - 4} more` : ""}
            </div>
            <div style={{ fontSize: 11.5, color: "var(--text-dim)", marginTop: 6 }}>
              You can still <span className="kbd">Save Draft</span> to keep your progress.
            </div>
          </div>
        </div>
      )}

      {/* Actions */}
      {!readOnly && (
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 8 }}>
          <button className="btn" onClick={() => onSaveDraft(buildPayload())}>
            <Save size={14} /> Save Draft
          </button>
          <button className="btn btn-primary" onClick={() => onSubmit(buildPayload())} disabled={!canSubmit}>
            Submit to Procurement <Send size={14} />
          </button>
        </div>
      )}

      <SharedAttachments request={request} userName={userName} role={role} onAdd={onAddAttachments} onRemove={onRemoveAttachment} />
      <SharedNotesPanel request={request} role={role} userName={userName} onAddNote={onAddNote} />
    </div>
  );
}

        onClick={() => setOpen(o => !o)}

          display: "flex", alignItems: "center", gap: 10,
          padding: "10px 14px",
          cursor: "pointer",
          background: open ? "var(--panel-hi)" : "transparent",
          transition: "background 140ms",
        }}

        <div style={{
          width: 22, height: 22,
          display: "flex", alignItems: "center", justifyContent: "center",
          background: "var(--bg-2)",
          border: "1px solid var(--border-mid)",
          borderRadius: 3,
          fontFamily: "'Geist Mono', monospace",

                onChange={e => onChange({ expectedDeparture: e.target.value })} />
            </div>
            <div>
              <div className="field-label">Storage Type</div>
              <select className="select" value={item.storageType} disabled={readOnly}
                onChange={e => onChange({ storageType: e.target.value })}>
                <option value="indoor">Indoor</option>
                <option value="outdoor">Outdoor</option>
                <option value="either">Either</option>
              </select>
            </div>
            <div>
              <div className="field-label">Handling Required</div>
              <select className="select" value={item.handlingRequired || ""} disabled={readOnly}
                onChange={e => onChange({ handlingRequired: e.target.value })}>
                <option value="">None / TBD</option>
                {EQUIPMENT_PRESETS.map(eq => <option key={eq} value={eq}>{eq}</option>)}

              <div className="field-label">Value per Unit <span style={{ color: "var(--text-faint)", fontWeight: 400, letterSpacing: 0 }}>(USD)</span></div>
              <input type="number" min="0" step="0.01" className="input input-mono" value={item.value} disabled={readOnly}
                onChange={e => onChange({ value: e.target.value })} placeholder="0.00" />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12 }}>
            <div>
              <div className="field-label">Special Handling Instructions</div>
              <textarea className="textarea" value={item.specialHandling} disabled={readOnly}
                onChange={e => onChange({ specialHandling: e.target.value })}
                placeholder="e.g. fragile, top-heavy, requires 2-person lift, hazmat class 3…" />
            </div>
            <div>
              <div className="field-label">Special Storing Instructions</div>
              <textarea className="textarea" value={item.specialStoring} disabled={readOnly}
                onChange={e => onChange({ specialStoring: e.target.value })}
                placeholder="e.g. climate controlled, no direct sunlight, rack vs floor, segregate from X…" />
            </div>
          </div>

          {fp !== null && (
            <div style={{
              marginTop: 12, paddingTop: 12, borderTop: "1px dashed var(--border-mid)",
              display: "flex", gap: 18, fontSize: 11.5,
              color: "var(--text-dim)",
              fontFamily: "'Geist Mono', monospace",
            }}>
              <span>Footprint per unit: <span style={{ color: "var(--text-mid)" }}>{fp.toFixed(2)} ft²</span></span>
              {item.quantity && <span>Total footprint: <span style={{ color: "var(--text-mid)" }}>{(fp * parseFloat(item.quantity || 0)).toFixed(2)} ft²</span></span>}
              {item.quantity && item.weight && <span>Total weight: <span style={{ color: "var(--text-mid)" }}>{fmtNum(parseFloat(item.weight) * parseFloat(item.quantity))} lb</span></span>}
              {item.quantity && item.value && <span>Total value: <span style={{ color: "var(--text-mid)" }}>{fmtMoney(parseFloat(item.value) * parseFloat(item.quantity))}</span></span>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
